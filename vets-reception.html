function TooltipTourReception({onDone}){
  var [idx,setIdx]=useState(0);
  var [pos,setPos]=useState(null);
  var step=TOUR_STEPS_RECEPTION[idx];
  useEffect(function(){
    var el=document.getElementById(step.id);
    if(!el){setPos(null);return;}
    el.scrollIntoView({block:"nearest",inline:"nearest"});
    function measure(){var r=el.getBoundingClientRect();setPos({top:r.top,left:r.left,width:r.width,height:r.height,placement:step.placement});}
    var t=setTimeout(measure,60);
    window.addEventListener("resize",measure);
    return function(){clearTimeout(t);window.removeEventListener("resize",measure);};
  },[idx]);
  if(!pos)return null;
  var TW=300,PAD=16;
  var tLeft=pos.left,tTop=pos.top;
  if(pos.placement==="bottom"){tTop=pos.top+pos.height+PAD;tLeft=pos.left+(pos.width/2)-(TW/2);}
  else if(pos.placement==="right"){tLeft=pos.left+pos.width+PAD;tTop=pos.top+(pos.height/2)-80;}
  else if(pos.placement==="left"){tLeft=pos.left-TW-PAD;tTop=pos.top+(pos.height/2)-80;}
  else{tTop=pos.top-160-PAD;tLeft=pos.left+(pos.width/2)-(TW/2);}
  tLeft=Math.max(10,Math.min(tLeft,window.innerWidth-TW-10));
  tTop=Math.max(10,Math.min(tTop,window.innerHeight-180));
  return(
    <div style={{position:"fixed",inset:0,zIndex:9000,pointerEvents:"none"}}>
      <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}} xmlns="http://www.w3.org/2000/svg">
        <defs><mask id="rcTourMask"><rect width="100%" height="100%" fill="white"/><rect x={pos.left-6} y={pos.top-6} width={pos.width+12} height={pos.height+12} rx="10" fill="black"/></mask></defs>
        <rect width="100%" height="100%" fill="rgba(10,25,47,0.62)" mask="url(#rcTourMask)"/>
      </svg>
      <div style={{position:"absolute",left:pos.left-6,top:pos.top-6,width:pos.width+12,height:pos.height+12,borderRadius:10,boxShadow:"0 0 0 3px #2563A8,0 0 0 6px rgba(37,99,168,0.22)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",left:tLeft,top:tTop,width:TW,background:"#fff",borderRadius:14,boxShadow:"0 8px 32px rgba(0,0,0,0.22)",padding:"18px 18px 14px",pointerEvents:"all",fontFamily:"'Outfit',sans-serif"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontSize:10,fontWeight:700,color:"#94A3B8",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase"}}>{idx+1} / {TOUR_STEPS_RECEPTION.length}</span>
          <button onClick={onDone} style={{background:"none",border:"none",fontSize:14,color:"#94A3B8",cursor:"pointer",padding:"2px 4px"}}>✕</button>
        </div>
        <div style={{display:"flex",gap:5,marginBottom:10}}>
          {TOUR_STEPS_RECEPTION.map(function(_,i){return <div key={i} style={{width:i===idx?18:6,height:6,borderRadius:99,background:i===idx?"#2563A8":"#E2E7EF",transition:"width 0.2s,background 0.2s"}}/>;}) }
        </div>
        <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:5,fontFamily:"Sora,sans-serif"}}>{step.title}</div>
        <div style={{fontSize:12,color:"#475569",lineHeight:1.55,marginBottom:14}}>{step.desc}</div>
        <div style={{display:"flex",gap:8}}>
          {idx>0&&<button onClick={function(){setIdx(function(i){return i-1;});setPos(null);}} style={{flex:1,padding:"7px",background:"#F4F6F9",color:"#475569",border:"1px solid #E2E7EF",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>← Back</button>}
          <button onClick={function(){if(idx<TOUR_STEPS_RECEPTION.length-1){setIdx(function(i){return i+1;});setPos(null);}else{onDone();}}} style={{flex:2,padding:"8px",background:"#2563A8",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>
            {idx<TOUR_STEPS_RECEPTION.length-1?"Next →":"Finish Tour ✓"}
          </button>
        </div>
      </div>
    </div>
  );
}

                                onMouseLeave={function(e){e.currentTarget.style.background="transparent";}}>
                                <div>
                                  <div style={{fontSize:12,fontWeight:600,color:C.tx,...sora}}>{c.name}</div>
                                  <div style={{fontSize:10,...mono,color:C.t3}}>
                                    {c.pets.map(function(p){return p.name;}).join(", ")}
                                  </div>
                                </div>
                                <div style={{fontSize:10,...mono,color:C.t2}}>{c.phone}</div>
                              </div>
                            );})}
                          </div>
                        )}
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                      <div>
                        <div style={{fontSize:10,...mono,fontWeight:700,color:C.t3,
                          letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>
                          Pet Name
                        </div>
                        {selClient&&selClient.pets&&selClient.pets.length>0
                          ? <select value={newProcDraft.pet} onChange={set("pet")} style={inp}>
                              <option value="">Select pet…</option>
                              {selClient.pets.map(function(p){return(
                                <option key={p.name} value={p.name}>{p.name} — {p.breed}</option>
                              );})}
                            </select>
                          : <input value={newProcDraft.pet} onChange={set("pet")} placeholder="e.g. Snoopy" style={inp}/>
                        }
                      </div>
                      <div>
                        <div style={{fontSize:10,...mono,fontWeight:700,color:C.t3,
                          letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:5}}>
                          Phone
                        </div>
                        <input value={newProcDraft.phone} onChange={set("phone")}
                          placeholder="050-0000000" style={inp}/>
                      </div>
                    </div>

                    {/* Procedure */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                      {field("Procedure Type",(
                        <select value={newProcDraft.type} onChange={set("type")} style={inp}>
                          {["Surgery","Ultrasound","Dental","Blood Test","Other"].map(function(t){return <option key={t} value={t}>{t}</option>;})}
                        </select>
                      ))}
                      {field("Specific Procedure",<input value={newProcDraft.subtype} onChange={set("subtype")} placeholder="e.g. Tumor Excision" style={inp}/>)}
                    </div>
                    {field("Goal / Diagnosis",(
                      <textarea value={newProcDraft.goal} onChange={set("goal")}
                        placeholder="Describe the clinical goal and findings..." rows={2}
                        style={Object.assign({},inp,{resize:"none",lineHeight:1.5})}/>
                    ))}

                    {/* Scheduling */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
                      {field("Time",<input type="time" value={newProcDraft.time} onChange={set("time")} style={inp}/>)}
                      {field("Est. Duration",(
                        <select value={newProcDraft.dur} onChange={set("dur")} style={inp}>
                          {["20m","30m","45m","60m","90m","120m","180m"].map(function(d){return <option key={d} value={d}>{d}</option>;})}
                        </select>
                      ))}
                      {field("Room",(
                        <select value={newProcDraft.room} onChange={set("room")} style={inp}>
                          {["OR","Room 1","Room 2"].map(function(r){return <option key={r} value={r}>{r}</option>;})}
                        </select>
                      ))}
                    </div>

                    {/* Vet */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                      {field("Performing Vet",(
                        <select value={newProcDraft.vet} onChange={set("vet")} style={inp}>
                          {["Dr. Cohen","Dr. Levy","Dr. Sharon"].map(function(v){return <option key={v} value={v}>{v}</option>;})}
                        </select>
                      ))}
                      {field("Anesthesia",(
                        <select value={newProcDraft.anesthesia} onChange={set("anesthesia")} style={inp}>
                          {[["none","None"],["local","Local"],["partial","Sedation"],["general","General"]].map(function(a){return <option key={a[0]} value={a[0]}>{a[1]}</option>;})}
                        </select>
                      ))}
                    </div>

                    {/* External vet */}
                    <div style={{marginBottom:14}}>
                      <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:8}}>
                        <input type="checkbox" checked={newProcDraft.hasExtVet} onChange={tog("hasExtVet")}/>
                        <span style={{fontSize:12,color:C.tx}}>External vet performing / assisting</span>
                      </label>
                      {newProcDraft.hasExtVet&&(
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                          <input value={newProcDraft.extVetName} onChange={set("extVetName")} placeholder="Name" style={inp}/>
                          <input value={newProcDraft.extVetSpec} onChange={set("extVetSpec")} placeholder="Specialty" style={inp}/>
                        </div>
                      )}
                    </div>

                    {/* Last weight + blood test */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                      {field("Last Weight (kg)",<input type="number" value={newProcDraft.lastWeight} onChange={set("lastWeight")} placeholder="0.0" step="0.1" style={inp}/>)}
                      {field("Blood Test",(
                        <div style={{display:"flex",flexDirection:"column",gap:5}}>
                          <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer"}}>
                            <input type="checkbox" checked={newProcDraft.bloodTestRequired} onChange={tog("bloodTestRequired")}/>
                            <span style={{fontSize:12,color:C.tx}}>Required</span>
                          </label>
                          {newProcDraft.bloodTestRequired&&(
                            <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",marginLeft:4}}>
                              <input type="checkbox" checked={newProcDraft.bloodTestDone} onChange={tog("bloodTestDone")}/>
                              <span style={{fontSize:12,color:C.tx}}>Completed</span>
                            </label>
                          )}
                        </div>
                      ))}
                    </div>

                    {/* Checklist */}
                    <div style={{display:"flex",gap:20,marginBottom:14}}>
                      <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer"}}>
                        <input type="checkbox" checked={newProcDraft.consentSigned} onChange={tog("consentSigned")}/>
                        <span style={{fontSize:12,color:C.tx}}>Consent signed</span>
                      </label>
                      <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer"}}>
                        <input type="checkbox" checked={newProcDraft.fastingConfirmed} onChange={tog("fastingConfirmed")}/>
                        <span style={{fontSize:12,color:C.tx}}>Fasting confirmed</span>
                      </label>
                    </div>

                    {/* Notes */}
                    {field("Additional Notes",(
                      <textarea value={newProcDraft.notes} onChange={set("notes")}
                        placeholder="Any special instructions or concerns..." rows={2}
                        style={Object.assign({},inp,{resize:"none",lineHeight:1.5})}/>
                    ))}

                    {/* Submit */}
                    <div style={{display:"flex",gap:8,marginTop:6}}>
                      <button onClick={function(){setShowNewProc(false);setAcQuery("");setAcOpen(false);}}
                        style={{flex:1,padding:"11px",borderRadius:8,border:"1px solid "+C.br,
                          background:C.off,color:C.t2,fontSize:12,cursor:"pointer",...out}}>
                        Cancel
                      </button>
                      <button onClick={function(){
                          if(!newProcDraft.client||!newProcDraft.pet||!newProcDraft.subtype){
                            showToast("Please fill in client, pet and procedure name");return;
                          }
                          var newP={
                            id:"PR-"+Date.now(),
                            client:newProcDraft.client,pet:newProcDraft.pet,
                            breed:"",phone:newProcDraft.phone,
                            type:newProcDraft.type,subtype:newProcDraft.subtype,
                            goal:newProcDraft.goal,time:newProcDraft.time,dur:newProcDraft.dur,
                            vet:newProcDraft.vet,
                            externalVet:newProcDraft.hasExtVet&&newProcDraft.extVetName
                              ?{name:newProcDraft.extVetName,specialty:newProcDraft.extVetSpec}
                              :null,
                            anesthesia:newProcDraft.anesthesia,
                            bloodTestRequired:newProcDraft.bloodTestRequired,
                            bloodTestDone:newProcDraft.bloodTestDone,
                            lastWeight:parseFloat(newProcDraft.lastWeight)||0,
                            room:newProcDraft.room,
                            consentSigned:newProcDraft.consentSigned,
                            fastingConfirmed:newProcDraft.fastingConfirmed,
                            status:"pre-op",notes:newProcDraft.notes,
                            admissionWeight:"",areaChecked:false,allergiesVerified:false,
                            xrayRequired:false,xrayDone:false,
                            sedationGiven:false,sedationTime:"",ivCatheter:false,
                            anesthesiaActual:"",postMeds:"",followUpDate:"",
                            duringNotes:"",intraCharges:[],catheterRemoved:false,petAwake:false,
                          };
                          setProcedures(function(prev){
                            var next=prev.concat([newP]);
                            try{localStorage.setItem("vets_proc_sync",JSON.stringify(next));}catch(e){}
                            return next;
                          });
                          setExtraSchedItems(function(prev){return prev.concat([{
                            time:newP.time,dur:newP.dur,vet:newP.vet,
                            client:newP.client,pet:newP.pet,breed:newP.breed,
                            type:"Procedure",color:C.am,status:"upcoming",
                          }]);});
                          setShowNewProc(false);
                          setNewProcDraft({client:"",pet:"",phone:"",type:"Surgery",subtype:"",goal:"",time:"",dur:"60m",vet:"Dr. Cohen",hasExtVet:false,extVetName:"",extVetSpec:"",anesthesia:"general",bloodTestRequired:false,bloodTestDone:false,lastWeight:"",room:"OR",consentSigned:false,fastingConfirmed:false,notes:"",admissionWeight:"",areaChecked:false,allergiesVerified:false,xrayRequired:false,xrayDone:false,sedationGiven:false,sedationTime:"",ivCatheter:false,anesthesiaActual:"",postMeds:"",followUpDate:"",duringNotes:"",intraCharges:[],catheterRemoved:false,petAwake:false});
                          setAcQuery("");setAcOpen(false);
                          showToast("Procedure added — "+newP.subtype+" for "+newP.pet+" ✓");
                        }}
                        style={{flex:2,padding:"11px",borderRadius:8,border:"none",
                          background:"linear-gradient(135deg,#2563A8,#1a4a8a)",color:"#fff",
                          fontSize:12,fontWeight:700,cursor:"pointer",...out,
                          boxShadow:"0 3px 12px rgba(37,99,168,0.35)"}}>
                        Add Procedure →
                      </button>
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>
        </div>
      )}

      {/* ══ SIDEBAR ══ */}
      <aside style={{background:C.sb,display:"flex",flexDirection:"column",
        position:"relative",overflow:"hidden",flexShrink:0,
        width:sideCollapsed?58:216,transition:"width 0.22s ease"}}>
        <div style={{position:"absolute",inset:0,
          background:"radial-gradient(ellipse at 20% 10%,rgba(37,99,168,0.12) 0%,transparent 55%)",
          pointerEvents:"none"}}/>

        {/* Logo */}
        <div style={{height:58,padding:"0 20px",display:"flex",alignItems:"center",gap:11,
          borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0,
          justifyContent:sideCollapsed?"center":"flex-start",overflow:"hidden"}}>
          <div style={{width:32,height:32,borderRadius:8,flexShrink:0,
            background:"linear-gradient(135deg,#2563A8,#1a4a8a)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🐾</div>
          {!sideCollapsed&&(
            <div style={{minWidth:0}}>
              <div style={{fontSize:15,fontWeight:700,color:"#fff",letterSpacing:"0.05em",...sora}}>VETS</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",letterSpacing:"0.1em",...mono,marginTop:1}}>RECEPTION</div>
            </div>
          )}
        </div>

        {/* User — receptionist switcher */}
        <div style={{position:"relative",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
          <button onClick={e=>{e.stopPropagation();setStaffOpen(o=>!o);}}
            style={{width:"100%",padding:sideCollapsed?"10px 0":"12px 20px",
              display:"flex",alignItems:"center",gap:10,justifyContent:sideCollapsed?"center":"flex-start",
              background:"transparent",border:"none",cursor:"pointer",textAlign:"left"}}>
            <div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,
              background:"linear-gradient(135deg,#2563A8,#3B82C4)",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:12,fontWeight:600,color:"#fff"}}>
              {activeStaff.initials}
            </div>
            {!sideCollapsed&&(
              <>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.92)",...sora}}>
                    {activeStaff.name}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.32)",marginTop:1}}>
                    {activeStaff.role}</div>
                </div>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.25)",transition:"transform 0.2s",
                  display:"inline-block",transform:staffOpen?"rotate(180deg)":"none"}}>▼</span>
              </>
            )}
          </button>

          {staffOpen&&(
            <div style={{background:"#0a1929",border:"1px solid rgba(255,255,255,0.08)",
              borderRadius:12,margin:"0 8px 8px",overflow:"hidden"}}>
              <div style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.22)",
                letterSpacing:"0.1em",textTransform:"uppercase",...mono,padding:"8px 12px 4px"}}>
                Switch Staff
              </div>
              {STAFF.filter(s=>s.id!==activeStaff.id).map(s=>(
                <button key={s.id}
                  onClick={e=>{e.stopPropagation();setPendingStaff(s);setStaffOpen(false);setShowPinModal(true);}}
                  style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"8px 12px",
                    background:"transparent",border:"none",cursor:"pointer",textAlign:"left",
                    transition:"background 0.12s",...out}}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.06)"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:s.color,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:11,fontWeight:600,color:"#fff",flexShrink:0}}>
                    {s.initials}
                  </div>
                  <div>
                    <div style={{fontSize:12,color:"rgba(255,255,255,0.8)",...out}}>{s.name}</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{s.role}</div>
                  </div>
                </button>
              ))}
            </div>
          )}
        </div>

        {/* Nav */}
        <nav style={{padding:"10px 10px",flex:1,display:"flex",flexDirection:"column",gap:2,overflowY:"auto"}}>
          {NAV.map(item=>{
            const on=nav===item.lbl;
            return(
              <button key={item.lbl} className="sb-btn"
                onClick={()=>{if(item.href)window.location.href=item.href;else setNav(item.lbl);}}
                title={sideCollapsed?item.lbl:""}
                style={{display:"flex",alignItems:"center",gap:9,
                  padding:sideCollapsed?"9px 0":"9px 11px",borderRadius:8,
                  justifyContent:sideCollapsed?"center":"flex-start",
                  fontSize:12,fontWeight:on?600:400,cursor:"pointer",border:"none",width:"100%",
                  textAlign:"left",position:"relative",transition:"all 0.15s",...out,
                  background:on?C.sbA:"transparent",color:on?"#fff":"rgba(255,255,255,0.48)"}}>
                {on&&<div style={{position:"absolute",left:0,top:7,bottom:7,width:3,
                  background:C.aLt,borderRadius:"0 3px 3px 0"}}/>}
                <span style={{width:17,textAlign:"center",fontSize:13,flexShrink:0}}>{item.ico}</span>
                {!sideCollapsed&&item.lbl}
                {!sideCollapsed&&item.badge&&<span style={{marginLeft:"auto",background:C.er,color:"#fff",
                  fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:8,...mono}}>{item.badge}</span>}
                {!sideCollapsed&&item.right&&!item.badge&&<span style={{marginLeft:"auto",fontSize:10,
                  color:"rgba(255,255,255,0.18)",...mono}}>{item.right}</span>}
                {sideCollapsed&&item.badge&&<div style={{width:6,height:6,borderRadius:"50%",
                  background:C.er,position:"absolute",top:6,right:6}}/>}
              </button>
            );
          })}

          <div style={{marginTop:5,position:"relative"}}>
            <button className="sb-btn" onClick={e=>{e.stopPropagation();setMore(o=>!o);}}
              title={sideCollapsed?"More":""}
              style={{display:"flex",alignItems:"center",gap:9,
                padding:sideCollapsed?"9px 0":"9px 11px",borderRadius:8,
                justifyContent:sideCollapsed?"center":"flex-start",
                fontSize:12,fontWeight:400,cursor:"pointer",border:"none",width:"100%",...out,
                background:"transparent",color:"rgba(255,255,255,0.48)"}}>
              <span style={{width:17,textAlign:"center",fontSize:10,flexShrink:0}}>•••</span>
              {!sideCollapsed&&"More"}
              {!sideCollapsed&&<span style={{marginLeft:"auto",fontSize:10,color:"rgba(255,255,255,0.2)",
                display:"inline-block",transition:"transform 0.2s",
                transform:more?"rotate(180deg)":"none"}}>▼</span>}
            </button>
            {more&&(
              <div style={{background:"#0a1929",border:"1px solid rgba(255,255,255,0.08)",
                borderRadius:12,marginTop:3,overflow:"hidden",maxHeight:260,overflowY:"auto"}}>
                {Object.entries(MORE).map(([sec,items])=>(
                  <div key={sec}>
                    <div style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.2)",
                      letterSpacing:"0.12em",textTransform:"uppercase",...mono,
                      padding:"9px 13px 3px"}}>{sec}</div>
                    {items.map(it=><div key={it} className="more-item"
                      style={{padding:"7px 13px",fontSize:11,color:"rgba(255,255,255,0.46)",
                        cursor:"pointer",transition:"all 0.12s"}}>{it}</div>)}
                  </div>
                ))}
              </div>
            )}
          </div>
        </nav>

        <div style={{padding:"10px 10px",borderTop:"1px solid rgba(255,255,255,0.07)"}}>
          <button className="sb-btn" title={sideCollapsed?"▶ Start Demo":""} onClick={function(){setShowDemo(true);}}
            style={{display:"flex",alignItems:"center",gap:9,padding:sideCollapsed?"9px 0":"9px 11px",borderRadius:8,fontSize:12,cursor:"pointer",border:"1px solid rgba(99,179,237,0.25)",justifyContent:sideCollapsed?"center":"flex-start",width:"100%",marginBottom:4,...out,background:"rgba(99,179,237,0.08)",color:"rgba(147,210,255,0.9)"}}>
            <span style={{width:17,textAlign:"center",flexShrink:0,fontSize:13}}>▶</span>
            {!sideCollapsed&&"Start Demo"}
          </button>
          <button onClick={function(){try{localStorage.clear();}catch(e){}location.reload();}} title="Reset prototype to initial state"
            style={{display:"flex",alignItems:"center",gap:9,padding:sideCollapsed?"9px 0":"9px 11px",borderRadius:8,fontSize:11,cursor:"pointer",border:"1px solid rgba(220,38,38,0.25)",justifyContent:sideCollapsed?"center":"flex-start",width:"100%",marginBottom:4,...out,background:"rgba(220,38,38,0.08)",color:"rgba(252,165,165,0.9)"}}>
            <span style={{width:17,textAlign:"center",flexShrink:0,fontSize:13}}>🔄</span>
            {!sideCollapsed&&"Reset Demo"}
          </button>
          <button className="sb-btn" title={sideCollapsed?"Sign Out":""} onClick={function(){window.location.href="vets-login.html";}}
            style={{display:"flex",alignItems:"center",gap:9,
              padding:sideCollapsed?"9px 0":"9px 11px",borderRadius:8,fontSize:12,cursor:"pointer",border:"none",
              justifyContent:sideCollapsed?"center":"flex-start",
              width:"100%",...out,background:"transparent",color:"rgba(255,255,255,0.28)"}}>
            <span style={{width:17,textAlign:"center",flexShrink:0}}>↩</span>
            {!sideCollapsed&&"Sign Out"}
          </button>
        </div>
      </aside>

      {/* ══ HANDLE ══ */}
      <div style={{width:0,flexShrink:0,position:"relative",zIndex:30}}>
        <button onClick={function(e){e.stopPropagation();setSideCollapsed(function(v){return !v;});}}
          title={sideCollapsed?"Expand menu":"Collapse menu"}
          style={{position:"absolute",left:-13,top:"50%",transform:"translateY(-50%)",
            width:26,height:26,borderRadius:"50%",
            background:C.sb,border:"1px solid rgba(255,255,255,0.12)",
            boxShadow:"0 2px 10px rgba(0,0,0,0.22)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:11,color:"rgba(255,255,255,0.75)",lineHeight:1,
            cursor:"pointer",transition:"box-shadow 0.15s,color 0.15s"}}>
          {sideCollapsed?"›":"‹"}
        </button>
      </div>

      {/* ══ MAIN ══ */}
      <main style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>

        {/* Progress Bar */}
        {prog&&(
          <div style={{background:C.sb,borderBottom:"2px solid rgba(37,99,168,0.4)",
            padding:"11px 26px 13px",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
              <span style={{fontSize:13,fontWeight:500,color:"#fff",flex:1}}>{prog.task}</span>
              <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",...mono}}>⏱ {prog.time}</span>
              <button onClick={()=>{T.current.forEach(clearTimeout);setProg(null);}}
                style={{cursor:"pointer",color:"rgba(255,255,255,0.35)",fontSize:14,
                  background:"none",border:"none",paddingLeft:8}}>✕</button>
            </div>
            <div style={{height:5,background:"rgba(255,255,255,0.08)",borderRadius:12,overflow:"hidden"}}>
              <div style={{height:"100%",background:"linear-gradient(90deg,#3B82C4,#60A5FA)",
                width:`${prog.pct}%`,borderRadius:12,transition:"width 0.6s ease"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
              {prog.dots.map((p,i)=><div key={i} style={{width:5,height:5,borderRadius:"50%",
                transition:"background 0.3s",
                background:p?"rgba(96,165,250,0.8)":"rgba(255,255,255,0.1)"}}/>)}
            </div>
          </div>
        )}

        {/* Topbar */}
        <div style={{height:58,padding:"0 28px",display:"flex",alignItems:"center",
          justifyContent:"space-between",borderBottom:`1px solid ${C.br}`,
          background:C.wh,flexShrink:0,position:"relative"}}>
          <div>
            <div style={{fontSize:15,fontWeight:600,color:C.tx,...sora}}>{`Good morning, ${activeStaff.name.split(" ")[0]}`}</div>
            <div style={{fontSize:11,color:C.t3,marginTop:1,...mono}}>{SCHED.length} appointments today · {totalRemaining} remaining</div>
          </div>

          {/* Clock — center */}
          {(function(){
            var h=nowTime.getHours();
            var m=nowTime.getMinutes();
            var s=nowTime.getSeconds();
            var ampm=h>=12?"PM":"AM";
            var hh=h%12||12;
            var mm=String(m).padStart(2,"0");
            var ss=String(s).padStart(2,"0");
            return(
              <div style={{position:"absolute",left:"50%",transform:"translateX(-50%)",
                display:"flex",alignItems:"center",pointerEvents:"none",
                background:C.off,border:`1px solid ${C.br}`,borderRadius:12,
                padding:"5px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>

                                {item.pet}<span style={{color:C.t2}}> · {item.breed}</span>

                {/* PROCEDURES tab */}
                {tab==="proc"&&(function(){
                  var AN={"none":"None","local":"Local","partial":"Sedation","general":"General"};
                  var ST={
                    "pre-op":     {label:"Pre-Op",      color:C.acc,     bg:"#EFF6FF", br:"rgba(37,99,168,0.2)"},

                    "sedation":   {label:"Sedation",    color:"#4F46E5", bg:"#EEF2FF", br:"rgba(79,70,229,0.25)"},
                    "in-progress":{label:"In Progress", color:"#D97706", bg:"#FFFBEB", br:"rgba(217,119,6,0.3)"},
                    "recovery":   {label:"Recovery",    color:"#16A34A", bg:"#F0FDF4", br:"rgba(22,163,74,0.25)"},
                    "discharged": {label:"Discharged",  color:"#64748B", bg:"#F8FAFC", br:"rgba(0,0,0,0.1)"},
                  };
                  var PRICE_LIST=[
                    {id:"exam",    label:"Exam Fee",         price:120},
                    {id:"blood",   label:"Blood Panel",      price:95},
                    {id:"xray",    label:"X-Ray",            price:150},
                    {id:"anest",   label:"Anesthesia",       price:280},
                    {id:"iv",      label:"IV Fluids",        price:85},
                    {id:"meds",    label:"Medications",      price:60},
                    {id:"culture", label:"Culture & Sensitivity",price:130},
                    {id:"biopsy",  label:"Biopsy",           price:200},
                    {id:"drain",   label:"Drain Placement",  price:110},
                    {id:"catheter",label:"Catheter",         price:75},
                    {id:"bandage", label:"Bandaging",        price:45},
                    {id:"consult", label:"Specialist Consult",price:180},
                  ];
                  function updProc(id,patch){
                    setProcedures(function(prev){
                      var next=prev.map(function(p){return p.id===id?Object.assign({},p,patch):p;});
                      try{localStorage.setItem("vets_proc_sync",JSON.stringify(next));}catch(e){}
                      return next;
                    });
                  }
                  function addIntraCharge(id,item){
                    setProcedures(function(prev){
                      var next=prev.map(function(p){
                        if(p.id!==id)return p;
                        var existing=(p.intraCharges||[]).find(function(c){return c.label===item.label;});
                        var newCharges=existing
                          ?(p.intraCharges||[]).map(function(c){
                              if(c.label!==item.label)return c;
                              var q=(c.qty||1)+1;return Object.assign({},c,{qty:q,amount:item.price*q});
                            })
                          :(p.intraCharges||[]).concat([{label:item.label,amount:item.price,qty:1}]);
                        return Object.assign({},p,{intraCharges:newCharges});
                      });
                      try{localStorage.setItem("vets_proc_sync",JSON.stringify(next));}catch(e){}
                      return next;
                    });
                  }
                  function removeIntraCharge(id,label){
                    setProcedures(function(prev){
                      var next=prev.map(function(p){
                        if(p.id!==id)return p;
                        return Object.assign({},p,{intraCharges:(p.intraCharges||[]).filter(function(c){return c.label!==label;})});
                      });
                      try{localStorage.setItem("vets_proc_sync",JSON.stringify(next));}catch(e){}
                      return next;
                    });
                  }
                  var _SORD={"in-progress":1,"recovery":2,"sedation":3,"pre-op":4,"admission":5,"discharged":6};
                  var displayedProcs=procedures.slice().sort(function(a,b){return (_SORD[a.status]||99)-(_SORD[b.status]||99);}).slice(0,5);
                  var inProg=displayedProcs.filter(function(p){return p.status==="in-progress";}).length;
                  var admCount=displayedProcs.filter(function(p){return p.status==="admission"||p.status==="sedation";}).length;
                  var preOp=displayedProcs.filter(function(p){return p.status==="pre-op";}).length;
                  return(
                    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>

                            <span style={{fontSize:11,color:C.t3,...mono}}>
                              {inProg>0&&<span style={{color:"#D97706",fontWeight:600}}>{inProg} in OR · </span>}
                              {admCount>0&&<span style={{color:"#0284C7",fontWeight:600}}>{admCount} admission · </span>}
                              {preOp} waiting
                            </span>
                          </div>
                        </div>
                        <button onClick={function(){setShowNewProc(true);}}

                            background:C.acc,color:"#fff",fontSize:11,fontWeight:700,
                            cursor:"pointer",...sora,display:"flex",alignItems:"center",gap:5,
                            boxShadow:"0 2px 8px rgba(37,99,168,0.3)"}}>

                      {/* Cards — scrollable area */}
                      <div data-proc-scroll="1" style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",minHeight:0,padding:"10px 14px"}}>
                      {/* sorted: in-progress first, then recovery, then others, discharged last — max 5 */}
                      {displayedProcs.map(function(p){
                        var isExp=expandedProc===p.id;
                        var st=ST[p.status]||ST["pre-op"];
                        var isActive=p.status==="in-progress";
                        var warns=[];
                        if(p.bloodTestRequired&&!p.bloodTestDone) warns.push("Blood test pending");
                        if(!p.consentSigned) warns.push("Consent not signed");
                        if(!p.fastingConfirmed) warns.push("Fasting unconfirmed");

                            boxShadow:isActive
                              ?"0 4px 18px rgba(217,119,6,0.22),0 1px 4px rgba(0,0,0,0.06)"
                              :p.status==="sedation"?"0 4px 16px rgba(79,70,229,0.18),0 1px 4px rgba(0,0,0,0.06)"
                              :isExp?"0 4px 20px rgba(0,0,0,0.10)":"0 1px 5px rgba(0,0,0,0.06)",
                            border:"1px solid "+(st.br||C.br),
                            borderLeft:"4px solid "+st.color,
                            overflow:"clip",transition:"box-shadow 0.2s,border-color 0.2s"}}>

                                  var prevTop=card.getBoundingClientRect().top;
                                  var prevScroll=scroller.scrollTop;
                                  ReactDOM.flushSync(function(){setExpandedProc(p.id);});
                                  var newTop=card.getBoundingClientRect().top;
                                  scroller.scrollTop=prevScroll+(newTop-prevTop);

                                }

                                  <span style={{fontSize:11,color:C.t3}}>·</span>
                                  <span style={{fontSize:12,fontWeight:600,color:C.tx,...sora}}>{p.subtype||p.type}</span>
                                </div>
                                <div style={{fontSize:12,fontWeight:600,color:C.tx,...sora,marginBottom:2}}>

                                </div>
                                <div style={{fontSize:10,color:C.t3,...mono}}>
                                  {p.vet}{p.externalVet?" + ext: "+p.externalVet.name:""}

                                </div>
                              </div>
                              {p.status==="pre-op"&&(
                                <button onClick={function(e){e.stopPropagation();updProc(p.id,{status:"admission"});showUndoToast(p.id,p.status,p.pet+" → Admission  ·  Undo to revert");}}
                                  style={{flexShrink:0,padding:"6px 12px",borderRadius:8,border:"none",
                                    background:"linear-gradient(135deg,#2563A8,#1D4ED8)",color:"#fff",
                                    fontSize:10,fontWeight:700,cursor:"pointer",...sora,
                                    boxShadow:"0 2px 6px rgba(37,99,168,0.35)"}}>
                                  Admit →
                                </button>

                              {p.status==="admission"&&(
                                <button onClick={function(e){e.stopPropagation();
                                    if(p.areaChecked&&p.allergiesVerified){

                                      updProc(p.id,{status:"sedation",sedationGiven:true,sedationTime:_hh+":"+_mm});
                                      showUndoToast(p.id,p.status,p.pet+" → Sedation  ·  Undo to revert");
                                    }else{showToast("Complete admission checklist first");}

                                    background:p.areaChecked&&p.allergiesVerified?"linear-gradient(135deg,#0284C7,#0369A1)":"#CBD5E1",
                                    color:"#fff",fontSize:10,fontWeight:700,
                                    cursor:p.areaChecked&&p.allergiesVerified?"pointer":"not-allowed",...sora,
                                    boxShadow:p.areaChecked&&p.allergiesVerified?"0 2px 6px rgba(2,132,199,0.3)":"none"}}>
                                  Sedate →
                                </button>
                              )}
                              {p.status==="sedation"&&(
                                <button onClick={function(e){e.stopPropagation();
                                    if(p.ivCatheter){updProc(p.id,{status:"in-progress"});showUndoToast(p.id,p.status,p.pet+" → In Progress  ·  Undo to revert");}
                                    else{showToast("Insert IV catheter first");}
                                  }}
                                  style={{flexShrink:0,padding:"6px 12px",borderRadius:8,border:"none",
                                    background:p.ivCatheter?"linear-gradient(135deg,#4F46E5,#4338CA)":"#CBD5E1",
                                    color:"#fff",fontSize:10,fontWeight:700,
                                    cursor:p.ivCatheter?"pointer":"not-allowed",...sora,
                                    boxShadow:p.ivCatheter?"0 2px 6px rgba(79,70,229,0.3)":"none"}}>
                                  ▶ Start
                                </button>
                              )}
                              {p.status==="in-progress"&&(
                                <button onClick={function(e){e.stopPropagation();updProc(p.id,{status:"recovery"});showUndoToast(p.id,p.status,p.pet+" → Recovery  ·  Undo to revert");}}
                                  style={{flexShrink:0,padding:"6px 12px",borderRadius:8,border:"none",
                                    background:"linear-gradient(135deg,#D97706,#B45309)",color:"#fff",
                                    fontSize:10,fontWeight:700,cursor:"pointer",...sora,
                                    boxShadow:"0 2px 6px rgba(217,119,6,0.3)"}}>
                                  ✓ Done
                                </button>

                              {p.status==="recovery"&&(
                                <button onClick={function(e){e.stopPropagation();updProc(p.id,{status:"discharged"});showUndoToast(p.id,p.status,p.pet+" → Discharged  ·  Undo to revert");}}
                                  style={{flexShrink:0,padding:"6px 12px",borderRadius:8,border:"none",
                                    background:"linear-gradient(135deg,#16A34A,#15803D)",color:"#fff",
                                    fontSize:10,fontWeight:700,cursor:"pointer",...sora,
                                    boxShadow:"0 2px 6px rgba(22,163,74,0.3)"}}>
                                  Discharge
                                </button>

                              {p.status==="discharged"&&(
                                <button onClick={function(e){e.stopPropagation();openFile(p.client);}}
                                  style={{flexShrink:0,padding:"6px 12px",borderRadius:8,
                                    border:"1px solid "+C.acc+"55",
                                    background:C.off,color:C.acc,
                                    fontSize:10,fontWeight:700,cursor:"pointer",...sora}}>
                                  → File
                                </button>
                              )}
                              <span style={{fontSize:13,color:C.t3,flexShrink:0,
                                display:"inline-block",transition:"transform 0.18s",

                            </div>

                                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>

                              /* ── shared: goal bar + info grid ── */
                              var sharedTop=(
                                <div>
                                  <div style={{fontSize:11,color:"#334155",lineHeight:1.65,marginBottom:10,

                                    <span style={{fontSize:11,...mono,color:st.color,fontWeight:700,

                                    {p.goal}
                                  </div>
                                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
                                    {[["Anesthesia",AN[p.anesthesia]||p.anesthesia],["Room",p.room],

                                        </div>
                                        <div style={{fontSize:12,fontWeight:600,color:C.tx,...sora}}>{row[1]}</div>

                                  </div>
                                  {p.externalVet&&(
                                    <div style={{display:"flex",alignItems:"center",gap:8,

                                      <span style={{fontSize:11}}>👨‍⚕️</span>
                                      <div>
                                        <div style={{fontSize:11,fontWeight:600,color:"#4F46E5",...sora}}>

                                      </div>

                              /* ── PRE-OP panel ── */

                                        )}

                                  </div>
                                  <div style={{display:"flex",gap:8}}>
                                    <button onClick={function(e){e.stopPropagation();openFile(p.client);}}
                                      style={{padding:"9px 14px",borderRadius:8,border:"1px solid "+C.br,
                                        background:C.wh,color:C.t2,fontSize:12,fontWeight:600,cursor:"pointer",...sora,

                                          showToast("Complete checklist: area + allergies required");
                                        }
                                      }}
                                      style={{flex:1,padding:"9px",borderRadius:8,border:"none",
                                        background:p.areaChecked&&p.allergiesVerified
                                          ?"linear-gradient(135deg,#0284C7,#0369A1)":"#CBD5E1",
                                        color:"#fff",fontSize:12,fontWeight:700,
                                        cursor:p.areaChecked&&p.allergiesVerified?"pointer":"not-allowed",
                                        ...sora,boxShadow:p.areaChecked&&p.allergiesVerified?"0 2px 8px rgba(2,132,199,0.3)":"none"}}>
                                      → Pre-Anesthesia
                                    </button>
                                  </div>
                                </div>
                              );

                              /* ── SEDATION panel ── */
                              if(p.status==="sedation")return(
                                <div style={{borderTop:"1px solid rgba(79,70,229,0.2)",padding:"14px 16px",
                                  background:"#EEF2FF"}}>
                                  {sharedTop}
                                  <div style={{fontSize:11,fontWeight:700,...mono,color:"#4F46E5",
                                    letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>
                                    Pre-Anesthesia Prep
                                  </div>
                                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                                    <div>
                                      <span style={lbl}>Sedation Given</span>
                                      <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",
                                        fontSize:12,color:C.tx,marginTop:2}}>
                                        <input type="checkbox" checked={p.sedationGiven}
                                          onChange={function(e){updProc(p.id,{sedationGiven:e.target.checked});}}/>
                                        Administered
                                      </label>
                                    </div>
                                    <div>
                                      <span style={lbl}>Time Given</span>
                                      <input type="time" value={p.sedationTime||""}
                                        onChange={function(e){updProc(p.id,{sedationTime:e.target.value});}}

                                    </div>
                                  </div>
                                  <Chk label="IV catheter inserted" ok={p.ivCatheter}

                                  {p.sedationGiven&&!p.ivCatheter&&(
                                    <div style={{fontSize:10,color:"#4F46E5",background:"#EEF2FF",
                                      borderRadius:8,padding:"7px 10px",border:"1px solid rgba(79,70,229,0.2)",
                                      marginBottom:8,...mono}}>
                                      ⏳ Waiting for sedation to take effect — insert IV catheter when ready
                                    </div>
                                  )}
                                  {p.sedationGiven&&p.ivCatheter&&(
                                    <div style={{fontSize:10,color:"#16A34A",background:"#F0FDF4",
                                      borderRadius:8,padding:"7px 10px",border:"1px solid rgba(22,163,74,0.2)",
                                      marginBottom:8,...mono}}>
                                      ✓ Ready for procedure — IV line secured
                                    </div>
                                  )}
                                  <div style={{marginBottom:10}}>
                                    <span style={lbl}>Notes</span>
                                    <textarea value={p.notes} rows={2}
                                      onChange={function(e){updProc(p.id,{notes:e.target.value});}}
                                      placeholder="Pre-anesthesia observations..."
                                      style={Object.assign({},finp,{resize:"none",lineHeight:1.5})}/>
                                  </div>
                                  <div style={{display:"flex",gap:8}}>
                                    <button onClick={function(e){e.stopPropagation();openFile(p.client);}}
                                      style={{padding:"9px 14px",borderRadius:8,border:"1px solid "+C.br,
                                        background:C.wh,color:C.t2,fontSize:12,fontWeight:600,cursor:"pointer",...sora,
                                        display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                                      📋 Client File
                                    </button>
                                    <button onClick={function(){
                                        if(p.ivCatheter){updProc(p.id,{status:"in-progress"});showUndoToast(p.id,p.status,p.pet+" → In Progress  ·  Undo to revert");}
                                        else{showToast("Insert IV catheter before starting");}
                                      }}
                                      style={{flex:1,padding:"9px",borderRadius:8,border:"none",
                                        background:p.ivCatheter?"linear-gradient(135deg,#4F46E5,#4338CA)":"#CBD5E1",
                                        color:"#fff",fontSize:12,fontWeight:700,
                                        cursor:p.ivCatheter?"pointer":"not-allowed",...sora,
                                        boxShadow:p.ivCatheter?"0 2px 8px rgba(79,70,229,0.35)":"none"}}>
                                      ▶ Begin Procedure
                                    </button>
                                  </div>
                                </div>
                              );

                              /* ── IN-PROGRESS panel (receptionist entry during procedure) ── */
                              if(p.status==="in-progress")return(
                                <div style={{borderTop:"1px solid rgba(217,119,6,0.25)",padding:"14px 16px",
                                  background:"#FFFDF5"}}>
                                  <div style={{fontSize:11,fontWeight:700,...mono,color:"#D97706",
                                    letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10}}>
                                    During Procedure — Receptionist Entry
                                  </div>
                                  {/* Anesthesia + post-meds */}
                                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                                    <div>
                                      <span style={lbl}>Anesthesia Used</span>
                                      <select value={p.anesthesiaActual||p.anesthesia}
                                        onChange={function(e){updProc(p.id,{anesthesiaActual:e.target.value});}}
                                        style={finp}>
                                        {[["none","None"],["local","Local"],
                                          ["partial","Sedation"],["general","General"]
                                        ].map(function(a){return <option key={a[0]} value={a[0]}>{a[1]}</option>;})}
                                      </select>
                                    </div>
                                    <div>
                                      <span style={lbl}>Follow-Up Date</span>
                                      <input type="date" value={p.followUpDate||""}
                                        onChange={function(e){updProc(p.id,{followUpDate:e.target.value});}}
                                        style={finp}/>
                                    </div>
                                  </div>
                                  <div style={{marginBottom:10}}>
                                    <span style={lbl}>Post-Procedure Medications</span>
                                    <textarea value={p.postMeds||""} rows={2}
                                      onChange={function(e){updProc(p.id,{postMeds:e.target.value});}}
                                      placeholder="e.g. Meloxicam 0.2mg/kg SID × 5 days, Amoxicillin..."
                                      style={Object.assign({},finp,{resize:"none",lineHeight:1.5})}/>
                                  </div>
                                  {/* Charges */}
                                  <div style={{marginBottom:10}}>
                                    <span style={lbl}>Charges</span>
                                    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
                                      {PRICE_LIST.slice(0,8).map(function(item){return(
                                        <button key={item.id} onClick={function(){addIntraCharge(p.id,item);}}
                                          style={{padding:"3px 9px",borderRadius:99,fontSize:10,
                                            border:"1px solid "+C.br,background:C.wh,color:C.t2,
                                            cursor:"pointer",...out,fontWeight:500}}>
                                          + {item.label} <span style={{color:C.t3}}>₪{item.price}</span>
                                        </button>
                                      );})}
                                    </div>
                                    {(p.intraCharges||[]).length>0&&(
                                      <div style={{background:C.wh,borderRadius:8,
                                        border:"1px solid "+C.br,overflow:"hidden"}}>
                                        {(p.intraCharges||[]).map(function(c,i){return(
                                          <div key={c.label} style={{display:"flex",alignItems:"center",
                                            padding:"6px 10px",
                                            borderBottom:i<(p.intraCharges.length-1)?"1px solid "+C.br:"none"}}>
                                            <span style={{flex:1,fontSize:11,color:C.tx}}>{c.label}</span>
                                            {c.qty>1&&<span style={{fontSize:10,...mono,color:C.t3,marginRight:6}}>×{c.qty}</span>}
                                            <span style={{fontSize:11,...mono,fontWeight:600,color:C.tx,marginRight:8}}>
                                              ₪{c.amount}
                                            </span>
                                            <button onClick={function(){removeIntraCharge(p.id,c.label);}}
                                              style={{fontSize:11,color:C.t3,background:"none",border:"none",
                                                cursor:"pointer",...out,lineHeight:1}}>✕</button>
                                          </div>
                                        );})}
                                        <div style={{padding:"6px 10px",background:"#F8FAFC",
                                          display:"flex",justifyContent:"flex-end",gap:4}}>
                                          <span style={{fontSize:10,...mono,color:C.t2}}>Total:</span>
                                          <span style={{fontSize:12,fontWeight:700,...mono,color:C.tx}}>
                                            ₪{(p.intraCharges||[]).reduce(function(s,c){return s+(c.amount||0);},0)}
                                          </span>
                                        </div>
                                      </div>
                                    )}
                                  </div>
                                  <div style={{marginBottom:10}}>
                                    <span style={lbl}>Intra-Op Notes</span>
                                    <textarea value={p.duringNotes||""} rows={2}
                                      onChange={function(e){updProc(p.id,{duringNotes:e.target.value});}}
                                      placeholder="Observations during procedure..."
                                      style={Object.assign({},finp,{resize:"none",lineHeight:1.5})}/>
                                  </div>
                                  <div style={{display:"flex",gap:8}}>
                                    <button onClick={function(e){e.stopPropagation();openFile(p.client);}}
                                      style={{padding:"9px 14px",borderRadius:8,border:"1px solid "+C.br,
                                        background:C.wh,color:C.t2,fontSize:12,fontWeight:600,cursor:"pointer",...sora,
                                        display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                                      📋 Client File
                                    </button>
                                    <button onClick={function(){updProc(p.id,{status:"recovery"});showUndoToast(p.id,p.status,p.pet+" → Recovery  ·  Undo to revert");}}
                                      style={{flex:1,padding:"9px",borderRadius:8,border:"none",
                                        background:"linear-gradient(135deg,#D97706,#B45309)",
                                        color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",...sora,
                                        boxShadow:"0 2px 8px rgba(217,119,6,0.35)"}}>
                                      ✓ Complete → Recovery
                                    </button>
                                  </div>
                                </div>
                              );

                              /* ── RECOVERY panel ── */
                              if(p.status==="recovery")return(
                                <div style={{borderTop:"1px solid rgba(22,163,74,0.2)",padding:"14px 16px",
                                  background:"#F6FEF9"}}>
                                  {sharedTop}
                                  <div style={{fontSize:11,fontWeight:700,...mono,color:"#16A34A",
                                    letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}}>
                                    Recovery Monitoring
                                  </div>
                                  <Chk label="IV catheter removed" ok={p.catheterRemoved}
                                    onMark={function(){updProc(p.id,{catheterRemoved:true});}}/>
                                  <Chk label="Pet awake and responsive" ok={p.petAwake}
                                    onMark={function(){updProc(p.id,{petAwake:true});}}/>
                                  {p.postMeds&&(
                                    <div style={{fontSize:11,color:"#166534",background:"#DCFCE7",
                                      borderRadius:8,padding:"8px 11px",
                                      border:"1px solid rgba(22,163,74,0.25)",marginBottom:8,
                                      borderLeft:"3px solid #16A34A"}}>
                                      <div style={{fontSize:10,...mono,fontWeight:700,
                                        color:"#16A34A",marginBottom:3,letterSpacing:"0.06em"}}>
                                        POST-OP MEDICATIONS
                                      </div>
                                      <div style={{whiteSpace:"pre-line"}}>{p.postMeds}</div>
                                    </div>
                                  )}
                                  {p.followUpDate&&(
                                    <div style={{fontSize:11,color:C.t2,marginBottom:8,...mono}}>
                                      Follow-up: <strong style={{color:C.tx}}>{p.followUpDate}</strong>
                                    </div>
                                  )}
                                  <div style={{marginBottom:10}}>
                                    <span style={lbl}>Recovery Notes</span>
                                    <textarea value={p.notes} rows={2}
                                      onChange={function(e){updProc(p.id,{notes:e.target.value});}}
                                      placeholder="Recovery observations, owner instructions..."
                                      style={Object.assign({},finp,{resize:"none",lineHeight:1.5})}/>
                                  </div>
                                  <div style={{display:"flex",gap:8}}>
                                    <button onClick={function(e){e.stopPropagation();openFile(p.client);}}
                                      style={{padding:"9px 14px",borderRadius:8,border:"1px solid "+C.br,
                                        background:C.wh,color:C.t2,fontSize:12,fontWeight:600,cursor:"pointer",...sora,
                                        display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                                      📋 Client File
                                    </button>
                                    <button onClick={function(){updProc(p.id,{status:"discharged"});showUndoToast(p.id,p.status,p.pet+" → Discharged  ·  Undo to revert");}}
                                      style={{flex:1,padding:"9px",borderRadius:8,border:"none",
                                        background:"linear-gradient(135deg,#16A34A,#15803D)",
                                        color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",...sora,
                                        boxShadow:"0 2px 8px rgba(22,163,74,0.35)"}}>
                                      Discharge Patient ✓
                                    </button>
                                  </div>
                                </div>
                              );

                              /* ── DISCHARGED ── */
                              return(
                                <div style={{borderTop:"1px solid "+C.br,padding:"14px 16px",
                                  background:"#F8FAFC"}}>
                                  <div style={{textAlign:"center",padding:"12px 0 8px"}}>
                                    <div style={{fontSize:28,marginBottom:6}}>✓</div>
                                    <div style={{fontSize:13,fontWeight:700,color:"#16A34A",...sora}}>
                                      {p.pet} discharged
                                    </div>
                                    {p.followUpDate&&(
                                      <div style={{fontSize:11,color:C.t2,marginTop:4,...mono}}>
                                        Follow-up: {p.followUpDate}
                                      </div>
                                    )}
                                  </div>
                                  {(p.intraCharges||[]).length>0&&(
                                    <div style={{background:C.wh,borderRadius:8,border:"1px solid "+C.br,
                                      marginTop:10,overflow:"hidden"}}>
                                      {(p.intraCharges||[]).map(function(c,i){return(
                                        <div key={c.label} style={{display:"flex",padding:"6px 10px",
                                          borderBottom:i<p.intraCharges.length-1?"1px solid "+C.br:"none"}}>
                                          <span style={{flex:1,fontSize:11,color:C.t2}}>{c.label}</span>
                                          <span style={{fontSize:11,...mono,fontWeight:600,color:C.tx}}>₪{c.amount}</span>
                                        </div>
                                      );})}
                                      <div style={{padding:"6px 10px",background:"#F0FDF4",display:"flex",justifyContent:"space-between"}}>
                                        <span style={{fontSize:11,fontWeight:600,color:"#16A34A"}}>Total Charged</span>
                                        <span style={{fontSize:12,fontWeight:700,...mono,color:"#16A34A"}}>
                                          ₪{(p.intraCharges||[]).reduce(function(s,c){return s+(c.amount||0);},0)}
                                        </span>
                                      </div>
                                    </div>
                                  )}
                                  <button onClick={function(){openFile(p.client);}}
                                    style={{width:"100%",marginTop:12,padding:"9px",borderRadius:8,
                                      border:"none",background:C.acc,color:"#fff",
                                      fontSize:12,fontWeight:700,cursor:"pointer",...sora,
                                      boxShadow:"0 2px 8px rgba(37,99,168,0.3)"}}>
                                    → Open Patient File
                                  </button>
                                </div>
                              );
                            })()}

                          </div>
                        );
                      })}
                      </div>
                    </div>
                  );
                })()}

                {/* REMINDERS */}
                {tab==="remind"&&(
                  <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",
                    minHeight:0,padding:"10px 12px 10px"}}>

                    {/* ── CARD VIEW (category picker) ── */}
                    {remindCat===null&&(
                      <div>
                        <div style={{fontSize:10,...mono,fontWeight:600,color:C.t3,
                          letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>
                          Select reminder type
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                          {[
                            {type:"appt",    label:"Appointments",emoji:"📅",color:C.acc},
                            {type:"vaccine", label:"Vaccines",    emoji:"💉",color:C.pu},
                            {type:"proc",    label:"Procedures",  emoji:"🔧",color:C.am},
                            {type:"followup",label:"Follow-ups",  emoji:"📞",color:C.gn},
                          ].map(function(cat){
                            var isFollowup=cat.type==="followup";
                            var items=isFollowup?FOLLOWUPS:REMINDERS.filter(function(r){return r.type===cat.type;});
                            var pendingCount=isFollowup
                              ?items.filter(function(r){return !doneFollowups.includes(r.id);}).length
                              :items.filter(function(r){return !sentReminders.includes(r.id);}).length;
                            var urgentCount=isFollowup
                              ?items.filter(function(r){return r.urgent&&!doneFollowups.includes(r.id);}).length
                              :items.filter(function(r){return r.urgent&&!sentReminders.includes(r.id);}).length;
                            var allSent=pendingCount===0;
                            return(
                              <button key={cat.type}
                                onClick={function(){setRemindCat(cat.type);}}
                                onMouseEnter={function(e){e.currentTarget.style.boxShadow="0 6px 18px rgba(0,0,0,0.10)";e.currentTarget.style.transform="translateY(-2px)";}}
                                onMouseLeave={function(e){e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.06)";e.currentTarget.style.transform="none";}}
                                style={{background:C.wh,borderRadius:12,padding:"14px 12px 12px",
                                  border:"1px solid "+(allSent?"rgba(5,150,105,0.22)":cat.color+"30"),
                                  cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",
                                  gap:10,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",
                                  transition:"box-shadow 0.15s,transform 0.15s",...out}}>
                                <div style={{width:36,height:36,borderRadius:8,flexShrink:0,
                                  background:allSent?"rgba(5,150,105,0.1)":cat.color+"18",
                                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>
                                  {allSent?"✅":cat.emoji}
                                </div>
                                <div>
                                  <div style={{fontSize:12,fontWeight:700,color:C.tx,...sora,marginBottom:2}}>
                                    {cat.label}
                                  </div>
                                  <div style={{fontSize:10,color:allSent?C.gn:C.t2}}>
                                    {allSent?"All sent ✓":(pendingCount+" pending")}
                                  </div>
                                </div>
                                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:"auto"}}>
                                  {urgentCount>0?(
                                    <span style={{fontSize:10,fontWeight:700,...mono,
                                      background:C.rBg,color:C.er,border:"1px solid "+C.rBr,
                                      padding:"2px 7px",borderRadius:8}}>
                                      {urgentCount} urgent
                                    </span>
                                  ):(
                                    <span style={{fontSize:10,color:C.t3}}>{items.length} total</span>
                                  )}
                                  <span style={{fontSize:11,color:allSent?C.gn:cat.color,fontWeight:600}}>→</span>
                                </div>
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {/* ── LIST VIEW (selected category) ── */}
                    {remindCat!==null&&(function(){
                      var CAT_MAP={
                        appt:   {type:"appt",   label:"Appointment Reminders",emoji:"📅",color:C.acc},
                        vaccine:{type:"vaccine",label:"Vaccine Reminders",    emoji:"💉",color:C.pu},
                        proc:   {type:"proc",   label:"Procedure Reminders",  emoji:"🔧",color:C.am},
                        followup:{type:"followup",label:"Follow-up Calls",   emoji:"📞",color:C.gn},
                      };
                      var cat=CAT_MAP[remindCat];
                      var isFollowup=cat.type==="followup";
                      const items=isFollowup?FOLLOWUPS:REMINDERS.filter(function(r){return r.type===cat.type;});
                      const pending=isFollowup
                        ?items.filter(function(r){return !doneFollowups.includes(r.id);}).length
                        :items.filter(function(r){return !sentReminders.includes(r.id);}).length;
                      const isTplOpen=showTemplate===cat.type;
                      return(
                        <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0}}>

                          {/* Back + title */}
                          <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:10,flexShrink:0}}>
                            <button onClick={function(){setRemindCat(null);setShowTemplate(null);}}
                              style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",
                                borderRadius:8,border:"1px solid "+C.br,background:C.wh,
                                fontSize:11,color:C.t2,cursor:"pointer",...out,
                                boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                              ← Back
                            </button>
                            <span style={{fontSize:12,fontWeight:600,color:C.tx,...sora}}>
                              {cat.emoji} {cat.label}
                            </span>
                          </div>

                          {/* Action bar */}
                          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,
                            padding:"0 0 10px",borderBottom:"1px solid rgba(0,0,0,0.06)",marginBottom:6}}>
                            {!isFollowup&&(
                              <button onClick={function(){setShowTemplate(isTplOpen?null:cat.type);}}
                                style={{fontSize:10,color:isTplOpen?cat.color:C.t3,background:"none",border:"none",
                                  cursor:"pointer",padding:"2px 5px",borderRadius:5,...out,
                                  textDecoration:"underline",textDecorationStyle:"dotted"}}>
                                ✏️ Edit template
                              </button>
                            )}
                            <span style={{flex:1}}/>
                            {pending>0?(
