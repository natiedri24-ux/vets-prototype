                          value={vetMsgDoc||""}
                          onChange={function(e){setVetMsgDoc(e.target.value||null);}}
                          style={{flex:1,padding:"7px 10px",borderRadius:8,border:`1px solid ${C.br}`,
                            fontSize:12,color:vetMsgDoc?C.tx:C.t3,background:C.wh,...out,outline:"none"}}>
                          <option value="">Attach document (optional)</option>
                          {docInbox.filter(function(d){return !filedDocs.includes(d.id);}).map(function(d){return(
                            <option key={d.id} value={d.id}>{d.type} — {d.client}</option>
                          );})}
                        </select>
                      </div>

                      {/* Client context badge */}
                      {vetMsgClient&&(
                        <div style={{display:"flex",alignItems:"center",gap:6,
                          padding:"5px 10px",borderRadius:8,marginBottom:8,
                          background:"rgba(37,99,168,0.07)",border:"1px solid rgba(37,99,168,0.15)"}}>
                          <span style={{fontSize:10,...mono,color:C.t3}}>Patient:</span>
                          <button onClick={function(){openFile(vetMsgClient.name);}}
                            style={{fontSize:11,fontWeight:600,color:C.acc,background:"none",
                              border:"none",cursor:"pointer",padding:0,...out}}>
                            {vetMsgClient.name} · {vetMsgClient.pets[0].name} →
                          </button>
                          <button onClick={function(){setVetMsgClient(null);}}
                            style={{marginLeft:"auto",fontSize:12,color:C.t3,background:"none",
                              border:"none",cursor:"pointer",lineHeight:1}}>✕</button>
                        </div>
                      )}

                      {/* Textarea */}
                      <textarea
                        placeholder={"Message to "+activeVetMsg.name+"..."}
                        value={vetMsgDraft}
                        onChange={function(e){setVetMsgDraft(e.target.value);}}
                        rows={2}
                        style={{width:"100%",padding:"8px 11px",borderRadius:8,
                          border:`1px solid ${C.br}`,fontSize:12,color:C.tx,
                          background:C.wh,resize:"none",outline:"none",
                          fontFamily:"'Outfit',sans-serif",lineHeight:1.5}}/>

                      {/* Send row */}
                      <div style={{display:"flex",gap:7,marginTop:7,justifyContent:"flex-end",alignItems:"center"}}>
                        {vetMsgDoc&&(
                          <span style={{fontSize:10,color:C.t3,flex:1,...mono}}>
                            📎 {(docInbox.find(function(d){return d.id===vetMsgDoc;})||{type:""}).type}
                          </span>
                        )}
                        <button onClick={function(){
                            setActiveVetMsg(null);setVetMsgDraft("");
                            setVetMsgClient(null);setVetMsgDoc(null);
                          }}
                          style={{padding:"5px 12px",borderRadius:8,
                            border:`1px solid ${C.br}`,background:"transparent",
                            fontSize:11,color:C.t2,cursor:"pointer",...out}}>
                          Close
                        </button>
                        <button onClick={function(){
                            if(!vetMsgDraft.trim()&&!vetMsgClient&&!vetMsgDoc){
                              showToast("Add a message or attachment");return;
                            }
                            var now=new Date();
                            var newMsg=Object.assign({},{
                              id:"VM-"+Date.now(),
                              from:activeStaff.name,
                              to:activeVetMsg.id,
                              client:vetMsgClient?vetMsgClient.name:null,
                              clientId:vetMsgClient?vetMsgClient.id:null,
                              docId:vetMsgDoc,
                              doc:vetMsgDoc?(docInbox.find(function(d){return d.id===vetMsgDoc;})||{type:""}).type:null,
                              body:vetMsgDraft,
                              time:now.getHours()+":"+String(now.getMinutes()).padStart(2,"0"),
                              read:false
                            });
                            setVetMsgs(function(prev){return [newMsg].concat(prev);});
                            showToast("Message sent to "+activeVetMsg.name);
                            setVetMsgDraft("");setVetMsgClient(null);
                            setVetMsgDoc(null);
                          }}
                          style={{padding:"5px 14px",borderRadius:8,border:"none",
                            background:C.acc,fontSize:11,color:"#fff",cursor:"pointer",
                            fontWeight:600,...out}}>
                          Send →
                        </button>
                      </div>

                    </div>
                  )}
                </div>
              )}
            </div>

            {/* ── Lab Documents — expandable, bottom ── */}
            {docInbox.filter(function(d){return !filedDocs.includes(d.id);}).length>0&&(
              <div style={{background:C.wh,borderRadius:16,border:"none",flexShrink:0,
                boxShadow:"0 4px 20px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04)",overflow:"hidden"}}>
                <div onClick={function(){setShowDocPanel(function(v){return !v;});}}
                  style={{padding:"11px 16px",background:C.wh,cursor:"pointer",userSelect:"none",
                    transition:"background 0.15s",
                    borderBottom:showDocPanel?`1px solid ${C.br}`:"none",
                    display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:14}}>🔬</span>
                  <span style={{fontSize:12,fontWeight:600,color:C.tx,...sora,flex:1}}>
                    Lab Documents
                  </span>
                  <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:8,
                    background:C.rBg,color:C.er,border:`1px solid ${C.rBr}`,...mono}}>
                    {docInbox.filter(function(d){return !filedDocs.includes(d.id);}).length} pending
                  </span>
                  <span style={{fontSize:11,fontWeight:500,color:C.acc,padding:"4px 8px",...out}}>
                    {showDocPanel?"Hide ▲":"Review ▼"}
                  </span>
                </div>
                {showDocPanel&&(
                  <div style={{background:"#E8EDF4",padding:"8px 10px",
                    display:"flex",flexDirection:"column",gap:6}}>
                    {docInbox.filter(function(d){return !filedDocs.includes(d.id);}).map(function(doc){return(
                      <div key={doc.id} style={{background:C.wh,borderRadius:12,
                        padding:"10px 14px",display:"flex",alignItems:"center",gap:12,
                        boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:600,color:C.tx,...sora}}>{doc.type}</div>
                          <div style={{fontSize:10,color:C.t2,marginTop:2}}>
                            {doc.client} · {doc.pet}
                            <span style={{color:C.t3,...mono,marginLeft:8}}>{doc.lab} · {doc.arrived}</span>
                          </div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                          <span style={{fontSize:10,color:C.t3,...mono}}>→ {doc.vet}</span>
                          <button
                            onClick={function(){
                              setFiledDocs(function(prev){return prev.concat([doc.id]);});
                              showToast("Filed + notified "+doc.vet+" — "+doc.client);
                            }}
                            style={{padding:"6px 12px",borderRadius:8,border:"none",
                              background:"linear-gradient(135deg,#2563A8,#1a4a8a)",color:"#fff",
                              fontSize:11,fontWeight:600,cursor:"pointer",...out,whiteSpace:"nowrap",
                              boxShadow:"0 2px 8px rgba(37,99,168,0.3)"}}>
                            File + Notify ✓
                          </button>
                        </div>
                      </div>
                    );})}
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      </main>
      {showDemo&&<TooltipTourReception onDone={function(){setShowDemo(false);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
