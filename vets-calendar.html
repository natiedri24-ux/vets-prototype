// ── HELPERS ───────────────────────────────────────────────────────────────────
function todayStr(){return _BASE.toISOString().slice(0,10);}
function minsToStr(m){var h=Math.floor(m/60),mn=m%60;return(h<10?"0":"")+h+":"+(mn<10?"0":"")+mn;}
function timeToMins(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function timeToSlotIdx(t){return Math.round((timeToMins(t)-SLOT_START*60)/30);}
function durToSlots(d){return Math.max(1,Math.ceil(d/30));}

function getWeekDates(ref){
  var d=new Date(ref),day=d.getDay(),diff=day===0?-6:1-day;
  var mon=new Date(d);mon.setDate(d.getDate()+diff);
  var arr=[];for(var i=0;i<7;i++){var nd=new Date(mon);nd.setDate(mon.getDate()+i);arr.push(nd);}
  return arr;
}
function getMonthGrid(year,month){
  var first=new Date(year,month,1),last=new Date(year,month+1,0);
  var pad=first.getDay()===0?6:first.getDay()-1;
  var arr=[];
  for(var i=0;i<pad;i++){var d=new Date(first);d.setDate(d.getDate()-(pad-i));arr.push({date:d,in:false});}
  for(var d=1;d<=last.getDate();d++)arr.push({date:new Date(year,month,d),in:true});
  while(arr.length%7!==0){var ld=arr[arr.length-1].date,nd=new Date(ld);nd.setDate(ld.getDate()+1);arr.push({date:nd,in:false});}
  return arr;
}

function apptsByDate(ds,appts){return appts.filter(function(a){return a.date===ds;});}
function apptsByDateVet(ds,vid,appts){return appts.filter(function(a){return a.date===ds&&a.vet===vid;});}
function getFreeBlocks(dateStr,vetId,appts){
  var occupied={};
  appts.filter(function(a){return a.date===dateStr&&a.vet===vetId;}).forEach(function(a){
    var start=timeToMins(a.time);var slots=durToSlots(a.dur);
    for(var i=0;i<slots;i++)occupied[start+i*30]=true;
  });
  var blocks=[],freeStart=null;
  for(var h=SLOT_START;h<SLOT_END;h++){
    for(var half=0;half<2;half++){
      var mins=h*60+half*30;
      if(!occupied[mins]){if(freeStart===null)freeStart=mins;}
      else{if(freeStart!==null){blocks.push({start:freeStart,end:mins});freeStart=null;}}
    }
  }
  if(freeStart!==null)blocks.push({start:freeStart,end:SLOT_END*60});
  return blocks;
}

const MAX_VET_SLOTS=SLOTS.length; // 19
function densityPct(ds,vids,appts){
  var total=MAX_VET_SLOTS*vids.length;
  var booked=appts.filter(function(a){return a.date===ds&&vids.indexOf(a.vet)>-1;}).reduce(function(s,a){return s+durToSlots(a.dur);},0);
  return Math.min(100,Math.round(booked/total*100));
}
function vetDensityPct(ds,vid,appts){
  var booked=appts.filter(function(a){return a.date===ds&&a.vet===vid;}).reduce(function(s,a){return s+durToSlots(a.dur);},0);
  return Math.min(100,Math.round(booked/MAX_VET_SLOTS*100));
}
function densCol(p){return p>=80?C.er:p>=60?C.am:C.gn;}
function densLbl(p){return p>=80?"Very busy":p>=60?"Busy":p>=30?"Moderate":"Light";}

function fmtDayFull(d){
  var dt=typeof d==="string"?new Date(d+"T00:00:00"):d;
  return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][dt.getDay()]+", "+MONTHS_FULL[dt.getMonth()]+" "+dt.getDate()+", "+dt.getFullYear();
}
function fmtMonthYear(d){return MONTHS_FULL[d.getMonth()]+" "+d.getFullYear();}

// ── WEEK VIEW ─────────────────────────────────────────────────────────────────
function WeekView({weekDates,appts,visibleVets,onDayClick,onApptClick,onAddAppt}){
  var todayS=todayStr();
  var visIds=visibleVets.map(function(v){return v.id;});
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      {/* Day headers with density */}

        {weekDates.map(function(d){
          var ds=d.toISOString().slice(0,10);
          var isToday=ds===todayS;
          var isPast=ds<todayS;
          var pct=densityPct(ds,visIds,appts);
          var col=densCol(pct);
          var da=apptsByDate(ds,appts).filter(function(a){return visIds.indexOf(a.vet)>-1;});
          var procs=da.filter(function(a){return TYPE_META[a.type]&&TYPE_META[a.type].proc;});
          return(
            <div key={ds} className="week-col" style={{flex:1,borderRight:"1px solid "+C.br,borderTop:isToday?"3px solid "+C.acc:"3px solid transparent",position:"relative",cursor:"pointer"}} onClick={function(){onDayClick(d);}}>
              <div style={{padding:"10px 12px 8px",background:isToday?C.acc+"0D":"transparent"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <span style={{fontSize:11,fontWeight:700,color:isToday?C.acc:isPast?C.t3:C.t2,textTransform:"uppercase",letterSpacing:"0.06em",...out}}>{DAYS_SHORT[d.getDay()]}</span>
                  <span style={{width:24,height:24,borderRadius:"50%",background:isToday?C.acc:"transparent",color:isToday?"#fff":isPast?C.t3:C.tx,fontSize:13,fontWeight:isToday?700:600,display:"inline-flex",alignItems:"center",justifyContent:"center",...mono}}>{d.getDate()}</span>
                </div>
                <DensityBar pct={pct} h={5} showPct={true}/>
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
                  <span style={{fontSize:10,color:col,fontWeight:600,...out}}>{densLbl(pct)}</span>
                  {procs.length>0&&<span style={{fontSize:10,color:C.acc,fontWeight:700,...out}}>· {procs.length} proc</span>}
                </div>
              </div>
              <button className="wk-add" onClick={function(e){e.stopPropagation();if(onAddAppt)onAddAppt(ds);}} style={{position:"absolute",top:8,right:8,opacity:0,width:20,height:20,borderRadius:"50%",background:C.acc,color:"#fff",border:"none",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"opacity 0.15s",lineHeight:1}}>+</button>
            </div>
          );
        })}
      </div>
      {/* Appointments by day */}
      <div style={{flex:1,display:"flex",overflowY:"auto"}}>
        {weekDates.map(function(d){
          var ds=d.toISOString().slice(0,10);
          var isPast=ds<todayS;
          var da=apptsByDate(ds,appts).filter(function(a){return visIds.indexOf(a.vet)>-1;}).sort(function(a,b){return timeToMins(a.time)-timeToMins(b.time);});
          var regular=da.filter(function(a){return !TYPE_META[a.type]||!TYPE_META[a.type].proc;});
          var procs=da.filter(function(a){return TYPE_META[a.type]&&TYPE_META[a.type].proc;});
          return(
            <div key={ds} style={{flex:1,borderRight:"1px solid "+C.br,display:"flex",flexDirection:"column",minWidth:0,background:isPast?"#FBFCFE":C.off+"66"}}>
              {/* Regular appts — grouped by vet */}
              <div style={{flex:1,overflowY:"auto",padding:"6px 4px 4px"}}>
                {visibleVets.map(function(vet){
                  var va=regular.filter(function(a){return a.vet===vet.id;});

                  return(
                    <div key={vet.id}>
                      <div style={{display:"flex",alignItems:"center",gap:3,padding:"2px 2px 2px",marginBottom:2}}>
                        <div style={{width:7,height:7,borderRadius:"50%",background:vet.color,flexShrink:0}}/>
                        <span style={{fontSize:9,fontWeight:700,color:vet.color,...out}}>{vet.short}</span>
                      </div>
                      {va.map(function(a){
                        var m=TYPE_META[a.type]||{dot:C.t3,bg:C.off,border:C.br};
                        var isDone=a.status==="done"||a.status==="cancelled";
                        return(
                          <div key={a.id} className="appt-row" onClick={function(){onApptClick(a);}}>
                            <div style={{background:isDone?"#F8FAFC":C.wh,border:"1px solid "+C.br,borderLeft:"3px solid "+(isDone?"#CBD5E1":vet.color),borderRadius:8,padding:"5px 6px",marginBottom:3,opacity:isDone?0.65:1}}>
                              <div style={{fontSize:10,color:C.t3,marginBottom:1,...mono}}>{a.time}</div>
                              <div style={{fontSize:11,fontWeight:700,color:C.tx,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",...out}}>{a.pet} <span style={{fontWeight:400,color:C.t3}}>· {a.client.split(" ")[1]}</span></div>
                              <div style={{display:"flex",alignItems:"center",gap:3,marginTop:2}}>
                                <TypeDot type={a.type} sz={6}/>
                                <span style={{fontSize:9,color:m.color||C.t3,fontWeight:600,...out}}>{a.type}</span>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
                {regular.length===0&&procs.length===0&&<div style={{padding:"10px 4px",textAlign:"center",fontSize:10,color:C.t3,fontStyle:"italic"}}>—</div>}
              </div>
              {/* Procedures section */}
              {procs.length>0&&(
                <div style={{borderTop:"2px dashed "+C.acc+"44",background:"#EFF6FF",padding:"4px 4px 4px"}}>
                  <div style={{fontSize:9,fontWeight:700,color:C.acc,textTransform:"uppercase",letterSpacing:"0.08em",padding:"2px 4px 4px",...out}}>🔧 Procedures</div>
                  {procs.map(function(a){
                    return(
                      <div key={a.id} className="appt-row" onClick={function(){onApptClick(a);}}>
                        <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderLeft:"3px solid "+C.acc,borderRadius:8,padding:"4px 6px",marginBottom:3}}>
                          <div style={{fontSize:10,color:C.t3,...mono}}>{a.time} · {a.dur}m</div>
                          <div style={{fontSize:11,fontWeight:700,color:C.tx,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",...out}}>{a.pet}</div>
                          <div style={{fontSize:9,color:C.acc,fontWeight:600,...out}}>{a.type}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── MONTH VIEW ────────────────────────────────────────────────────────────────
function MonthView({viewDate,appts,visibleVets,onDayClick}){
  var year=viewDate.getFullYear(),month=viewDate.getMonth();
  var cells=getMonthGrid(year,month);
  var todayS=todayStr();
  var visIds=visibleVets.map(function(v){return v.id;});
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",flexShrink:0,background:C.wh,borderBottom:"1px solid "+C.br}}>
        {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(function(d){return(
          <div key={d} style={{padding:"8px 0",textAlign:"center",fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.07em",...out}}>{d}</div>
        );})}
      </div>
      <div style={{flex:1,display:"grid",gridTemplateColumns:"repeat(7,1fr)",gridAutoRows:"1fr",overflowY:"auto"}}>
        {cells.map(function(cell,idx){
          var ds=cell.date.toISOString().slice(0,10);
          var isToday=ds===todayS;
          var isPast=ds<todayS;
          var da=apptsByDate(ds,appts).filter(function(a){return visIds.indexOf(a.vet)>-1;});
          var pct=densityPct(ds,visIds,appts);
          var col=densCol(pct);
          var procs=da.filter(function(a){return TYPE_META[a.type]&&TYPE_META[a.type].proc;});
          var typeMap={};da.forEach(function(a){typeMap[a.type]=(typeMap[a.type]||0)+1;});
          return(
            <div key={idx} onClick={function(){if(cell.in)onDayClick(cell.date);}}
              style={{border:"1px solid "+C.br,padding:"7px 8px",cursor:cell.in?"pointer":"default",background:isToday?C.acc+"0D":!cell.in?"#F8FAFC":isPast?"#FAFBFC":C.wh,opacity:!cell.in?0.45:1,minHeight:100}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <span style={{width:26,height:26,borderRadius:"50%",background:isToday?C.acc:"transparent",color:isToday?"#fff":!cell.in?C.t3:isPast?C.t3:C.tx,fontSize:13,fontWeight:isToday?700:600,display:"inline-flex",alignItems:"center",justifyContent:"center",...mono}}>{cell.date.getDate()}</span>
                {cell.in&&pct>0&&<span style={{fontSize:10,fontWeight:700,color:col,...mono}}>{pct}%</span>}
              </div>
              {cell.in&&pct>0&&<div style={{marginBottom:5}}><DensityBar pct={pct} h={4}/></div>}
              {cell.in&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:2,marginBottom:3}}>
                  {Object.keys(typeMap).slice(0,4).map(function(t){
                    var m=TYPE_META[t]||{dot:C.t3,bg:C.off,border:C.br,color:C.t2};
                    return(
                      <span key={t} style={{display:"inline-flex",alignItems:"center",gap:2,fontSize:9,color:m.color,fontWeight:700,background:m.bg,borderRadius:99,padding:"1px 5px",border:"1px solid "+m.border,...out}}>
                        <span style={{width:4,height:4,borderRadius:"50%",background:m.dot,display:"inline-block"}}/>
                        {typeMap[t]}
                      </span>
                    );
                  })}
                </div>
              )}
              {cell.in&&da.length>0&&(
                <div style={{fontSize:9,color:C.t3,...out}}>{da.length} appt{da.length!==1?"s":""}{procs.length>0?" · "+procs.length+"🔧":""}</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── ADD APPOINTMENT MODAL ─────────────────────────────────────────────────────

  var _initPet=defaultClient&&defaultClient.pets&&defaultClient.pets[0]?defaultClient.pets[0]:"";

                {!(key==="pet"&&clientLocked)&&ftype!=="select"&&<input type={ftype} value={form[key]} onChange={function(e){var v=e.target.value;setForm(function(f){return Object.assign({},f,{[key]:v});});}} style={inp}/>}

  {id:"cal-tour-viewtabs", placement:"bottom", title:"Day / Week / Month Views",         desc:"Switch between three calendar views. Day shows each vet as a column with time slots. Week shows a 7-day grid. Month shows a full overview — click any day to drill into it."},

function TooltipTourCalendar({onDone}){
  var [idx,setIdx]=useState(0);
  var [pos,setPos]=useState(null);
  var step=TOUR_STEPS_CALENDAR[idx];
  useEffect(function(){
    var el=document.getElementById(step.id);
    if(!el){setPos(null);return;}
    el.scrollIntoView({block:"nearest",inline:"nearest"});
    function measure(){var r=el.getBoundingClientRect();setPos({top:r.top,left:r.left,width:r.width,height:r.height,placement:step.placement});}
    var t=setTimeout(measure,60);
    window.addEventListener("resize",measure);
    return function(){clearTimeout(t);window.removeEventListener("resize",measure);};
  },[idx]);
  if(!pos)return null;
  var TW=300,PAD=16;
  var tLeft=pos.left,tTop=pos.top;
  if(pos.placement==="bottom"){tTop=pos.top+pos.height+PAD;tLeft=pos.left+(pos.width/2)-(TW/2);}
  else if(pos.placement==="right"){tLeft=pos.left+pos.width+PAD;tTop=pos.top+(pos.height/2)-80;}
  else if(pos.placement==="left"){tLeft=pos.left-TW-PAD;tTop=pos.top+(pos.height/2)-80;}
  else{tTop=pos.top-160-PAD;tLeft=pos.left+(pos.width/2)-(TW/2);}
  tLeft=Math.max(10,Math.min(tLeft,window.innerWidth-TW-10));
  tTop=Math.max(10,Math.min(tTop,window.innerHeight-180));
  return(
    <div style={{position:"fixed",inset:0,zIndex:9000,pointerEvents:"none"}}>
      <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}} xmlns="http://www.w3.org/2000/svg">
        <defs><mask id="calTourMask"><rect width="100%" height="100%" fill="white"/><rect x={pos.left-6} y={pos.top-6} width={pos.width+12} height={pos.height+12} rx="10" fill="black"/></mask></defs>
        <rect width="100%" height="100%" fill="rgba(10,25,47,0.62)" mask="url(#calTourMask)"/>
      </svg>
      <div style={{position:"absolute",left:pos.left-6,top:pos.top-6,width:pos.width+12,height:pos.height+12,borderRadius:10,boxShadow:"0 0 0 3px #2563A8,0 0 0 6px rgba(37,99,168,0.22)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",left:tLeft,top:tTop,width:TW,background:"#fff",borderRadius:14,boxShadow:"0 8px 32px rgba(0,0,0,0.22)",padding:"18px 18px 14px",pointerEvents:"all",fontFamily:"'Outfit',sans-serif"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontSize:10,fontWeight:700,color:"#94A3B8",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase"}}>{idx+1} / {TOUR_STEPS_CALENDAR.length}</span>
          <button onClick={onDone} style={{background:"none",border:"none",fontSize:14,color:"#94A3B8",cursor:"pointer",padding:"2px 4px"}}>✕</button>
        </div>
        <div style={{display:"flex",gap:5,marginBottom:10}}>
          {TOUR_STEPS_CALENDAR.map(function(_,i){return <div key={i} style={{width:i===idx?18:6,height:6,borderRadius:99,background:i===idx?"#2563A8":"#E2E7EF",transition:"width 0.2s,background 0.2s"}}/>;}) }
        </div>
        <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:5,fontFamily:"Sora,sans-serif"}}>{step.title}</div>
        <div style={{fontSize:12,color:"#475569",lineHeight:1.55,marginBottom:14}}>{step.desc}</div>
        <div style={{display:"flex",gap:8}}>
          {idx>0&&<button onClick={function(){setIdx(function(i){return i-1;});setPos(null);}} style={{flex:1,padding:"7px",background:"#F4F6F9",color:"#475569",border:"1px solid #E2E7EF",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>← Back</button>}
          <button onClick={function(){if(idx<TOUR_STEPS_CALENDAR.length-1){setIdx(function(i){return i+1;});setPos(null);}else{onDone();}}} style={{flex:2,padding:"8px",background:"#2563A8",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>
            {idx<TOUR_STEPS_CALENDAR.length-1?"Next →":"Finish Tour ✓"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  var [sideCollapsed,setSideCollapsed]=useState(false);
  var [staffOpen,setStaffOpen]=useState(false);

  var [view,setView]=useState("day");
  var [viewDate,setViewDate]=useState(new Date(_BASE));

  var [appts,setAppts]=useState(APPTS_INIT);
  var [selAppt,setSelAppt]=useState(null);
  var [showAdd,setShowAdd]=useState(false);
  var [showDemo,setShowDemo]=useState(false);
  var [addDef,setAddDef]=useState({});
  var [nowTime,setNowTime]=useState(new Date());
  var [toast,setToast]=useState(null);
  var [lastClient,setLastClient]=useState(null);
  var [apptFilter,setApptFilter]=useState(null);
  var [deepLinkClient]=useState(function(){
    try{
      var name=sessionStorage.getItem("vets_calClient");
      if(name){sessionStorage.removeItem("vets_calClient");return CLIENTS_DB.find(function(c){return c.name===name;})||null;}
    }catch(e){}
    return null;
  });
  /* new-client → auto-open Book Appointment with prefilled data */
  var [newClientAppt]=useState(function(){
    try{
      var raw=sessionStorage.getItem("vets_newApptClient");
      if(raw){sessionStorage.removeItem("vets_newApptClient");return JSON.parse(raw);}
    }catch(e){}
    return null;
  });
  function showToast(msg){setToast(msg);setTimeout(function(){setToast(null);},3000);}

  useEffect(function(){var t=setInterval(function(){setNowTime(new Date());},30000);return function(){clearInterval(t);};},[]);
  /* auto-open AddApptModal when arriving from new-client flow */
  useEffect(function(){
    if(newClientAppt){
      setAddDef({
        clientName:newClientAppt.name,
        petName:newClientAppt.petName,
        petIcon:newClientAppt.petIcon,
        isNew:true,
        date:viewDate.toISOString().slice(0,10),
      });
      setShowAdd(true);
    }
  },[]);
  useEffect(function(){
    if(selAppt){var cl=CLIENTS_DB.find(function(c){return c.name===selAppt.client;});if(cl)setLastClient(cl);}
  },[selAppt]);

  var weekDates=useMemo(function(){return getWeekDates(viewDate);},[viewDate]);
  var visibleVets=ALL_VETS.filter(function(v){return visibleVetIds.indexOf(v.id)>-1;});

  function toggleVet(vid){
    setVisibleVetIds(function(ids){
      if(ids.indexOf(vid)>-1){if(ids.length<=1)return ids;return ids.filter(function(x){return x!==vid;});}
      return ids.concat([vid]);
    });
  }

  function goNext(){var d=new Date(viewDate);if(view==="day")d.setDate(d.getDate()+1);else if(view==="week")d.setDate(d.getDate()+7);else d.setMonth(d.getMonth()+1);setViewDate(d);}
  function goPrev(){var d=new Date(viewDate);if(view==="day")d.setDate(d.getDate()-1);else if(view==="week")d.setDate(d.getDate()-7);else d.setMonth(d.getMonth()-1);setViewDate(d);}
  function goToday(){setViewDate(new Date(_BASE));}

  function navLabel(){
    if(view==="day")return fmtDayFull(viewDate);
    if(view==="week"){var wd=getWeekDates(viewDate);return MONTHS_SHORT[wd[0].getMonth()]+" "+wd[0].getDate()+" – "+MONTHS_SHORT[wd[6].getMonth()]+" "+wd[6].getDate()+", "+wd[6].getFullYear();}
    return fmtMonthYear(viewDate);
  }

  function handleAddAppt(client){setAddDef({client:client||null,date:viewDate.toISOString().slice(0,10)});setShowAdd(true);}
  function saveAppt(appt){setAppts(function(prev){return [appt].concat(prev);});showToast("✓ Appointment booked — "+appt.client+" · "+appt.pet+" · "+appt.time);}
  function changeApptStatus(id,newStatus){
    setAppts(function(prev){return prev.map(function(a){return a.id===id?Object.assign({},a,{status:newStatus}):a;});});
    setSelAppt(function(prev){return prev&&prev.id===id?Object.assign({},prev,{status:newStatus}):prev;});
    var lbl=QUICK_STATUS.find(function(s){return s.key===newStatus;});if(lbl)showToast("Status updated: "+lbl.lbl);
  }

  var ds=viewDate.toISOString().slice(0,10);
  var hh=String(nowTime.getHours()).padStart(2,"0");
  var mm2=String(nowTime.getMinutes()).padStart(2,"0");

  var NAV=[
    {ico:"⊞",lbl:"Dashboard",     href:"vets-reception.html"},
    {ico:"📅",lbl:"Calendar",     href:"vets-calendar.html", active:true},
    {ico:"🔍",lbl:"Client File",  href:"vets-client-file_8.html"},
    {ico:"⚙️",lbl:"Settings"},
  ];

  return(
    <div style={{width:"100%",height:"100%",display:"flex",overflow:"hidden",background:"#BDC9DC",...out}} onClick={function(){setStaffOpen(false);}}>

      {/* ── SIDEBAR ───────────────────────────────────────── */}
      <aside style={{background:C.sb,display:"flex",flexDirection:"column",flexShrink:0,position:"relative",overflow:"hidden",width:sideCollapsed?58:210,transition:"width 0.22s ease"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 20% 10%,rgba(37,99,168,0.12) 0%,transparent 55%)",pointerEvents:"none"}}/>
        {/* Logo */}
        <div style={{height:54,padding:"0 16px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid rgba(255,255,255,0.07)",flexShrink:0,justifyContent:sideCollapsed?"center":"flex-start",overflow:"hidden"}}>
          <div style={{width:30,height:30,borderRadius:8,flexShrink:0,background:"linear-gradient(135deg,#2563A8,#1a4a8a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🐾</div>
          {!sideCollapsed&&(
            <div>
              <div style={{fontSize:14,fontWeight:700,color:"#fff",letterSpacing:"0.05em",...sora}}>VETS</div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.28)",letterSpacing:"0.1em",...mono}}>CALENDAR</div>
            </div>
          )}
        </div>
        {/* Staff switcher */}
        <div style={{position:"relative",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
          <button onClick={function(e){e.stopPropagation();setStaffOpen(function(o){return !o;});}}
            style={{width:"100%",padding:sideCollapsed?"10px 0":"11px 16px",display:"flex",alignItems:"center",gap:9,justifyContent:sideCollapsed?"center":"flex-start",background:"transparent",border:"none",cursor:"pointer"}}>
            <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,background:"linear-gradient(135deg,#2563A8,#3B82C4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",...out}}>{activeStaff.initials}</div>
            {!sideCollapsed&&(
              <>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.9)",...sora}}>{activeStaff.name}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.32)"}}>{activeStaff.role}</div>
                </div>
                <span style={{fontSize:9,color:"rgba(255,255,255,0.25)",transform:staffOpen?"rotate(180deg)":"none",display:"inline-block",transition:"transform 0.2s"}}>▼</span>
              </>
            )}
          </button>
          {staffOpen&&(
            <div style={{background:"#0a1929",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,margin:"0 8px 8px",overflow:"hidden"}} onClick={function(e){e.stopPropagation();}}>
              {STAFF.filter(function(s){return s.id!==activeStaff.id;}).map(function(s){return(
                <button key={s.id} onClick={function(){setActiveStaff(s);setStaffOpen(false);}} className="sb-btn"
                  style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left",...out}}>
                  <div style={{width:26,height:26,borderRadius:"50%",background:s.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#fff",flexShrink:0,...out}}>{s.initials}</div>
                  <div>
                    <div style={{fontSize:12,color:"rgba(255,255,255,0.8)",...out}}>{s.name}</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.3)"}}>{s.role}</div>
                  </div>
                </button>
              );})}
            </div>
          )}
        </div>
        {/* Nav */}
        <nav style={{padding:"10px 8px",flex:1,display:"flex",flexDirection:"column",gap:2}}>
          {NAV.map(function(item){
            var on=item.active;
            return(
              <a key={item.lbl} href={item.href||"#"} className={on?"":"sb-btn"}
                title={sideCollapsed?item.lbl:""}
                style={{display:"flex",alignItems:"center",gap:9,padding:sideCollapsed?"9px 0":"9px 11px",borderRadius:8,justifyContent:sideCollapsed?"center":"flex-start",fontSize:12,fontWeight:on?600:400,border:"none",width:"100%",textAlign:"left",position:"relative",transition:"all 0.15s",...out,textDecoration:"none",background:on?C.sbA:"transparent",color:on?"#fff":"rgba(255,255,255,0.5)"}}>
                {on&&<div style={{position:"absolute",left:0,top:7,bottom:7,width:3,background:C.aLt,borderRadius:"0 3px 3px 0"}}/>}
                <span style={{width:17,textAlign:"center",fontSize:13,flexShrink:0}}>{item.ico}</span>
                {!sideCollapsed&&item.lbl}
              </a>
            );
          })}
          {/* Vet visibility toggles */}
          {!sideCollapsed&&(
            <div id="cal-tour-vets" style={{marginTop:12,padding:"10px 11px",background:"rgba(255,255,255,0.04)",borderRadius:10}}>
              <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8,...mono}}>Visible Vets</div>
              {ALL_VETS.map(function(v){
                var on=visibleVetIds.indexOf(v.id)>-1;
                return(
                  <button key={v.id} onClick={function(){toggleVet(v.id);}}
                    style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"5px 0",background:"transparent",border:"none",cursor:"pointer",...out}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:on?v.color:"rgba(255,255,255,0.15)",transition:"background 0.15s"}}/>
                    <span style={{fontSize:11,color:on?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.3)",fontWeight:on?600:400}}>{v.name}</span>
                    {on&&<span style={{marginLeft:"auto",fontSize:9,color:v.color,...mono}}>✓</span>}
                  </button>
                );
              })}
            </div>
          )}
        </nav>
        <div style={{padding:"8px 8px",borderTop:"1px solid rgba(255,255,255,0.07)"}}>
          <button className="sb-btn" title={sideCollapsed?"▶ Start Demo":""} onClick={function(){setShowDemo(true);}}
            style={{display:"flex",alignItems:"center",gap:9,padding:sideCollapsed?"9px 0":"9px 11px",borderRadius:8,fontSize:12,cursor:"pointer",border:"1px solid rgba(99,179,237,0.25)",justifyContent:sideCollapsed?"center":"flex-start",width:"100%",marginBottom:4,...out,background:"rgba(99,179,237,0.08)",color:"rgba(147,210,255,0.9)"}}>
            <span style={{width:17,textAlign:"center",flexShrink:0,fontSize:13}}>▶</span>
            {!sideCollapsed&&"Start Demo"}
          </button>
          <button onClick={function(){try{localStorage.clear();}catch(e){}location.reload();}} title="Reset prototype to initial state"
            style={{display:"flex",alignItems:"center",gap:9,padding:sideCollapsed?"9px 0":"9px 11px",borderRadius:8,fontSize:11,cursor:"pointer",border:"1px solid rgba(220,38,38,0.25)",justifyContent:sideCollapsed?"center":"flex-start",width:"100%",marginBottom:4,...out,background:"rgba(220,38,38,0.08)",color:"rgba(252,165,165,0.9)"}}>
            <span style={{width:17,textAlign:"center",flexShrink:0,fontSize:13}}>🔄</span>
            {!sideCollapsed&&"Reset Demo"}
          </button>
          <button className="sb-btn" onClick={function(){window.location.href="vets-login.html";}} style={{display:"flex",alignItems:"center",gap:9,padding:sideCollapsed?"9px 0":"9px 11px",borderRadius:8,fontSize:12,cursor:"pointer",border:"none",justifyContent:sideCollapsed?"center":"flex-start",width:"100%",...out,background:"transparent",color:"rgba(255,255,255,0.28)"}}>
            <span style={{width:17,textAlign:"center",flexShrink:0}}>↩</span>
            {!sideCollapsed&&"Sign Out"}
          </button>
        </div>
      </aside>

      {/* Collapse handle */}
      <div style={{width:0,flexShrink:0,position:"relative",zIndex:30}}>
        <button onClick={function(e){e.stopPropagation();setSideCollapsed(function(v){return !v;});}}
          style={{position:"absolute",left:-13,top:"50%",transform:"translateY(-50%)",width:26,height:26,borderRadius:"50%",background:C.sb,border:"1px solid rgba(255,255,255,0.12)",boxShadow:"0 2px 10px rgba(0,0,0,0.22)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"rgba(255,255,255,0.75)",cursor:"pointer"}}>
          {sideCollapsed?"›":"‹"}
        </button>
      </div>

      {/* ── MAIN ─────────────────────────────────────────── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

        {/* Top bar */}
        <div style={{background:C.wh,display:"flex",alignItems:"center",padding:"0 20px",height:54,flexShrink:0,borderBottom:"1px solid "+C.br,gap:10}}>
          {/* View tabs */}
          <div id="cal-tour-viewtabs" style={{display:"flex",background:C.off,borderRadius:8,padding:3,gap:1}}>
            {["day","week","month"].map(function(v){
              var a=view===v;
              return(
                <button key={v} onClick={function(){setView(v);}} style={{padding:"5px 14px",borderRadius:6,background:a?C.wh:"transparent",color:a?C.tx:C.t3,fontSize:12,fontWeight:a?700:500,border:a?"1px solid "+C.br:"1px solid transparent",cursor:"pointer",textTransform:"capitalize",boxShadow:a?"0 1px 3px rgba(0,0,0,0.07)":"none",...out}}>
                  {v.charAt(0).toUpperCase()+v.slice(1)}
                </button>
              );
            })}
          </div>
          {/* Nav arrows */}
          <div id="cal-tour-nav" style={{display:"flex",alignItems:"center",gap:5}}>
            <button className="nav-btn" onClick={goPrev} style={{width:30,height:30,borderRadius:8,background:C.off,border:"1px solid "+C.br,color:C.t2,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.1s"}}>‹</button>
            <button className="nav-btn" onClick={goToday} style={{padding:"5px 12px",borderRadius:8,background:C.off,border:"1px solid "+C.br,color:C.acc,fontSize:12,fontWeight:700,cursor:"pointer",...out,transition:"background 0.1s"}}>Today</button>
            <button className="nav-btn" onClick={goNext} style={{width:30,height:30,borderRadius:8,background:C.off,border:"1px solid "+C.br,color:C.t2,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.1s"}}>›</button>
          </div>
          {/* Date label */}
          <div style={{flex:1,fontSize:14,fontWeight:700,color:C.tx,...sora}}>{navLabel()}</div>
          {/* Clock */}
          <div style={{display:"flex",alignItems:"center",gap:2,background:C.sb,borderRadius:8,padding:"5px 12px"}}>
            <span style={{fontSize:15,fontWeight:700,color:"#fff",...mono}}>{hh}</span>
            <span style={{fontSize:15,fontWeight:700,color:"rgba(255,255,255,0.4)",animation:"pulse 1.5s infinite",...mono}}>:</span>
            <span style={{fontSize:15,fontWeight:700,color:"#fff",...mono}}>{mm2}</span>
          </div>
          {/* + Appointment */}
          <button id="cal-tour-new-appt" onClick={function(){handleAddAppt(null);}} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 16px",background:C.acc,color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:"0 2px 8px rgba(37,99,168,0.3)",...out}}>
            + New Appointment
          </button>
        </div>

        {/* Calendar + right panel */}
        <div style={{flex:1,display:"flex",overflow:"hidden"}}>
          <div id="cal-tour-grid" style={{flex:1,overflow:"hidden",background:"#E8EDF4"}}>
            {view==="day"&&(
              <DayView dateStr={ds} appts={appts} visibleVets={visibleVets} allVets={ALL_VETS} onToggleVet={toggleVet} onApptClick={setSelAppt} onAddSlot={function(vid,time){setAddDef({vet:vid,date:ds,time:time});setShowAdd(true);}} apptFilter={apptFilter} setApptFilter={setApptFilter}/>
            )}
            {view==="week"&&(
              <WeekView weekDates={weekDates} appts={appts} visibleVets={visibleVets} onDayClick={function(d){setViewDate(d);setView("day");}} onApptClick={setSelAppt} onAddAppt={function(ds){setAddDef({date:ds});setShowAdd(true);}}/>
            )}
            {view==="month"&&(
              <MonthView viewDate={viewDate} appts={appts} visibleVets={visibleVets} onDayClick={function(d){setViewDate(d);setView("day");}}/>
            )}
          </div>
          <RightPanel viewDate={viewDate} view={view} appts={appts} visibleVets={visibleVets} onAddAppt={handleAddAppt} onApptClick={setSelAppt} lastClient={lastClient} initialClient={deepLinkClient}/>
        </div>
      </div>

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",zIndex:900,background:C.sb,color:"#fff",borderRadius:10,padding:"11px 22px",fontSize:13,fontWeight:600,boxShadow:"0 4px 24px rgba(0,0,0,0.22)",display:"flex",alignItems:"center",gap:10,animation:"fadeIn 0.2s ease",...out,pointerEvents:"none"}}>
          <span style={{color:C.gn,fontSize:16}}>✓</span>
          {toast}
        </div>
      )}
      {/* Modals */}
      {selAppt&&<ApptDrawer appt={selAppt} onClose={function(){setSelAppt(null);}} onStatusChange={changeApptStatus}/>}
      {showAdd&&<AddApptModal onClose={function(){setShowAdd(false);}} onSave={saveAppt} defaultDate={addDef.date} defaultVet={addDef.vet} defaultTime={addDef.time||""}
        defaultClient={addDef.client||( addDef.clientName ? {name:addDef.clientName, pets:[addDef.petName||""],isNew:true} : null)}
        newClientBadge={!!addDef.isNew}
      />}
      {showDemo&&<TooltipTourCalendar onDone={function(){setShowDemo(false);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
