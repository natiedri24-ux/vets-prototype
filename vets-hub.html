function timeToMin(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function minToTime(m){var h=Math.floor(m/60);var mm=m%60;return (h<10?"0"+h:h)+":"+(mm<10?"0"+mm:mm);}
function initials(name){return name.split(" ").map(function(n){return n[0];}).join("");}

function Dot({color,size,pulse}){
  size=size||6;
  return <div style={{width:size,height:size,borderRadius:"50%",background:color,
    flexShrink:0,animation:pulse?"blink 2s infinite":"none"}}/>;
}
function HubToast({msg,onHide}){
  useEffect(function(){var t=setTimeout(onHide,2800);return function(){clearTimeout(t);};},[]);
  return(
    <div style={{position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",
      zIndex:3000,background:"#052e16",color:"#4ade80",fontSize:13,fontWeight:500,
      padding:"11px 22px",borderRadius:10,boxShadow:"0 8px 30px rgba(0,0,0,0.22)",
      border:"1px solid rgba(74,222,128,0.2)",display:"flex",alignItems:"center",gap:9,
      animation:"slideUp 0.2s ease",fontFamily:"'Outfit',sans-serif"}}>
      ✓ {msg}
    </div>
  );
}
function PinModal({pending,onSuccess,onCancel}){
  var _s=useState("");var pin=_s[0];var setPin=_s[1];
  var _e=useState(false);var err=_e[0];var setErr=_e[1];
  function press(d){
    if(pin.length>=4)return;
    var next=pin+d;setPin(next);
    if(next.length===4){
      if(next==="1234"){onSuccess(pending);setPin("");}
      else{setErr(true);setTimeout(function(){setPin("");setErr(false);},700);}
    }
  }
  var btnSt={padding:"13px",borderRadius:9,border:"1px solid #E2E7EF",background:"#F4F6F9",
    fontSize:17,fontWeight:500,cursor:"pointer",color:"#0F172A",fontFamily:"'Outfit',sans-serif"};
  return(
    <div style={{position:"fixed",inset:0,zIndex:2000,background:"rgba(0,0,0,0.5)",
      display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn 0.15s"}}
      onClick={onCancel}>
      <div style={{background:"#fff",borderRadius:16,padding:"28px 32px",width:296,
        boxShadow:"0 24px 60px rgba(0,0,0,0.22)",fontFamily:"'Outfit',sans-serif"}}
        onClick={function(e){e.stopPropagation();}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <div style={{width:46,height:46,borderRadius:"50%",background:pending&&pending.color,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:15,fontWeight:700,color:"#fff",margin:"0 auto 10px"}}>
            {pending&&pending.initials}</div>
          <div style={{fontSize:15,fontWeight:600,color:"#0F172A",fontFamily:"'Sora',sans-serif"}}>{pending&&pending.name}</div>
          <div style={{fontSize:11,color:"#94A3B8",marginTop:3}}>Enter PIN to switch</div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:4}}>
          {[0,1,2,3].map(function(i){return(
            <div key={i} style={{width:13,height:13,borderRadius:"50%",transition:"background 0.15s",
              background:i<pin.length?"#2563A8":"#E5E9F0"}}/>
          );})}
        </div>
        {err?<div style={{fontSize:11,color:"#DC2626",textAlign:"center",margin:"10px 0"}}>Incorrect PIN</div>
            :<div style={{height:28}}/>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
          {[1,2,3,4,5,6,7,8,9].map(function(n){return(
            <button key={n} onClick={function(){press(String(n));}} style={btnSt}
              onMouseEnter={function(e){e.currentTarget.style.background="#EEF1F6";}}
              onMouseLeave={function(e){e.currentTarget.style.background="#F4F6F9";}}>{n}</button>
          );})}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <button onClick={onCancel} style={Object.assign({},btnSt,{fontSize:12,color:"#475569"})}>Cancel</button>
          <button onClick={function(){press("0");}} style={btnSt}>0</button>
          <button onClick={function(){setPin(function(p){return p.slice(0,-1);});}} style={Object.assign({},btnSt,{fontSize:15,color:"#475569"})}>⌫</button>
        </div>
      </div>
    </div>
  );
}

<script type="text/babel">

    }

  function liveSearch(q){

    var r=CLIENTS_DB.filter(function(c){
      return c.name.toLowerCase().includes(q.toLowerCase())||
             c.phone.replace(/-/g,"").includes(q.replace(/-/g,""))||

    {id:"dashboard",ico:"⊞",lbl:"Dashboard"},

    {id:"messages",ico:"✉",lbl:"Messages",badge:unread},
    {id:"settings",ico:"⚙",lbl:"Settings"},

    <div style={{display:"flex",height:"100vh",overflow:"hidden",background:C.off}}>

      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        {/* Topbar */}
        <div id="hub-tour-topbar" style={{height:58,background:C.wh,borderBottom:"1px solid "+C.br,display:"flex",
          alignItems:"center",padding:"0 24px",gap:12,flexShrink:0}}>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:600,color:C.tx,fontFamily:"'Sora',sans-serif"}}>

              {doneCount+" done · "+remainCount+" remaining today"}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:C.t2,

                <Dot color="#DC2626" size={6} pulse={true}/>

              </div>

          display:"grid",gridTemplateColumns:"1fr 380px",gap:18}}>

                              📋 Open File

                              color:C.t2,fontSize:11,fontFamily:"'Outfit',sans-serif",whiteSpace:"nowrap"}}>

<script type="text/babel">
var CAL_START=8*60;  // 08:00
var CAL_END=18*60;   // 18:00
var PX_PER_MIN=1.5;

function CalendarView({onNavigate,activeStaff,onStaffSwitch,toast,showToast,onStartDemo}){
  var _nav=useState("calendar");var navId=_nav[0];var setNavId=_nav[1];
  var _weekOff=useState(0);var weekOff=_weekOff[0];var setWeekOff=_weekOff[1];

  var _showNew=useState(false);var showNew=_showNew[0];var setShowNew=_showNew[1];
  var _newForm=useState({clientId:"",petId:"",date:"Mon",time:"10:00",dur:30,type:"Medical Exam",vetId:1});
  var newForm=_newForm[0];var setNewForm=_newForm[1];
  var _appts=useState(function(){
    var all=[];
    WEEK_DAYS.forEach(function(d){
      (WEEK_SCHED[d]||[]).forEach(function(a){all.push(Object.assign({},a,{day:d}));});
    });
    return all;
  });
  var appts=_appts[0];var setAppts=_appts[1];
  var C=C_CAL;
  var VISIT_TYPES=["Medical Exam","Annual Exam","Vaccination","Follow-up","Blood Test","Dental Cleaning","Procedure","X-Ray","Checkup"];
  var TYPE_COLORS={"Medical Exam":"#2563A8","Annual Exam":"#2563A8","Vaccination":"#059669","Follow-up":"#C94040","Blood Test":"#DC2626","Dental Cleaning":"#7C3AED","Procedure":"#D97706","X-Ray":"#0891B2","Checkup":"#059669"};

  function openClientFile(clientId){
    if(clientId){try{sessionStorage.setItem("vets_clientId",clientId);}catch(e){}}
    window.location.href="vets-client-file_8.html";
  }
  function apptTop(startTime){return (timeToMin(startTime)-CAL_START)*PX_PER_MIN;}
  function apptH(dur){return Math.max(dur*PX_PER_MIN,24);}

  var totalH=(CAL_END-CAL_START)*PX_PER_MIN;
  var hours=[];for(var hh=8;hh<18;hh++)hours.push(hh);

  var NAV=[
    {id:"calendar",ico:"📅",lbl:"Calendar"},
    {id:"reception",ico:"🏥",lbl:"Reception",onClick:function(){onNavigate("reception");}},
    {id:"vetroom",ico:"🩺",lbl:"Vet Room",onClick:function(){onNavigate("vetroom");}},

  ];

  var selData=selAppt?appts.find(function(a){return a.id===selAppt;}):null;
  var nowAppt=appts.find(function(a){return a.status==="now";});

  function addAppointment(){
    var cl=CLIENTS_DB.find(function(c){return c.id===newForm.clientId;});
    if(!cl)return;
    var pet=cl.pets.find(function(p){return p.id===newForm.petId;})||cl.pets[0];
    var vet=VETS.find(function(v){return v.id===parseInt(newForm.vetId);})||VETS[0];
    var col=TYPE_COLORS[newForm.type]||"#2563A8";
    var newId="NW"+Date.now();
    setAppts(function(prev){
      return prev.concat([{id:newId,day:newForm.date,start:newForm.time,dur:parseInt(newForm.dur),
        clientId:newForm.clientId,client:cl.name,pet:pet.name,type:newForm.type,
        color:col,vet:vet.name,status:"upcoming",alerts:pet.alerts||[]}]);
    });
    setShowNew(false);

    setNewForm({clientId:"",petId:"",date:"Mon",time:"10:00",dur:30,type:"Medical Exam",vetId:1});
  }

    fontSize:12,color:"#0F172A",background:"#F4F6F9",fontFamily:"'Outfit',sans-serif"};
  var lbl={fontSize:10,fontWeight:600,color:"#94A3B8",textTransform:"uppercase",letterSpacing:"0.06em",

<script type="text/babel">
var TOUR_STEPS_HUB=[
  {id:"hub-tour-topbar",      placement:"bottom", title:"Today's Status Bar",        desc:"The top bar shows your name, today's date, total appointments done vs remaining, and a live badge if a patient is currently in the room — click it to jump straight to their file."},
  {id:"hub-tour-sched-header",placement:"bottom", title:"Today's Schedule",          desc:"The schedule list shows all appointments for today in chronological order. The currently active appointment is highlighted in navy. Completed visits fade out. Click any row to expand it."},
  {id:"hub-tour-sched-list",  placement:"right",  title:"Appointment Rows",          desc:"Each row shows time, duration, client name, pet, visit type, vet, and current status. 'Now in Room' means the patient is being seen right now. 'Next Up' means arriving soon."},
  {id:"hub-tour-client-search",placement:"left",  title:"Client Search",             desc:"Search any client instantly by name, phone, or pet name. Results appear as you type — click any result to open their full file. The currently-in-clinic client is always shown at the top."},
  {id:"hub-tour-messages",    placement:"left",   title:"Messages & Alerts",         desc:"Incoming messages from the vet team appear here — questions about scheduling, procedure updates, and follow-up notes. Reply directly from this panel without switching screens."},
  {id:"hub-tour-sidebar-nav", placement:"right",  title:"Sidebar Navigation",        desc:"Switch between Reception, Vet Room, and Calendar using the sidebar. Each view is role-specific — Reception manages scheduling and billing, Vet Room handles clinical workflows, Calendar handles bookings."},
];

function TooltipTourHub({onDone}){
  var _i=useState(0);var idx=_i[0];var setIdx=_i[1];
  var _p=useState(null);var pos=_p[0];var setPos=_p[1];
  var step=TOUR_STEPS_HUB[idx];
  useEffect(function(){
    var el=document.getElementById(step.id);
    if(!el){setPos(null);return;}
    el.scrollIntoView({block:"nearest",inline:"nearest"});
    function measure(){var r=el.getBoundingClientRect();setPos({top:r.top,left:r.left,width:r.width,height:r.height,placement:step.placement});}
    var t=setTimeout(measure,60);
    window.addEventListener("resize",measure);
    return function(){clearTimeout(t);window.removeEventListener("resize",measure);};
  },[idx]);
  if(!pos)return null;
  var TW=300,PAD=16;
  var tLeft=pos.left,tTop=pos.top;
  if(pos.placement==="bottom"){tTop=pos.top+pos.height+PAD;tLeft=pos.left+(pos.width/2)-(TW/2);}
  else if(pos.placement==="right"){tLeft=pos.left+pos.width+PAD;tTop=pos.top+(pos.height/2)-80;}
  else if(pos.placement==="left"){tLeft=pos.left-TW-PAD;tTop=pos.top+(pos.height/2)-80;}
  else{tTop=pos.top-160-PAD;tLeft=pos.left+(pos.width/2)-(TW/2);}
  tLeft=Math.max(10,Math.min(tLeft,window.innerWidth-TW-10));
  tTop=Math.max(10,Math.min(tTop,window.innerHeight-180));
  return(
    <div style={{position:"fixed",inset:0,zIndex:9000,pointerEvents:"none"}}>
      <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}} xmlns="http://www.w3.org/2000/svg">
        <defs><mask id="hubTourMask"><rect width="100%" height="100%" fill="white"/><rect x={pos.left-6} y={pos.top-6} width={pos.width+12} height={pos.height+12} rx="10" fill="black"/></mask></defs>
        <rect width="100%" height="100%" fill="rgba(10,25,47,0.62)" mask="url(#hubTourMask)"/>
      </svg>
      <div style={{position:"absolute",left:pos.left-6,top:pos.top-6,width:pos.width+12,height:pos.height+12,borderRadius:10,boxShadow:"0 0 0 3px #2563A8,0 0 0 6px rgba(37,99,168,0.22)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",left:tLeft,top:tTop,width:TW,background:"#fff",borderRadius:14,boxShadow:"0 8px 32px rgba(0,0,0,0.22)",padding:"18px 18px 14px",pointerEvents:"all",fontFamily:"'Outfit',sans-serif"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontSize:10,fontWeight:700,color:"#94A3B8",fontFamily:"DM Mono,monospace",letterSpacing:"0.1em",textTransform:"uppercase"}}>{idx+1} / {TOUR_STEPS_HUB.length}</span>
          <button onClick={onDone} style={{background:"none",border:"none",fontSize:14,color:"#94A3B8",cursor:"pointer",padding:"2px 4px"}}>✕</button>
        </div>
        <div style={{display:"flex",gap:5,marginBottom:10}}>
          {TOUR_STEPS_HUB.map(function(_,i){return <div key={i} style={{width:i===idx?18:6,height:6,borderRadius:99,background:i===idx?"#2563A8":"#E2E7EF",transition:"width 0.2s,background 0.2s"}}/>;}) }
        </div>
        <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:5,fontFamily:"Sora,sans-serif"}}>{step.title}</div>
        <div style={{fontSize:12,color:"#475569",lineHeight:1.55,marginBottom:14}}>{step.desc}</div>
        <div style={{display:"flex",gap:8}}>
          {idx>0&&<button onClick={function(){setIdx(function(i){return i-1;});setPos(null);}} style={{flex:1,padding:"7px",background:"#F4F6F9",color:"#475569",border:"1px solid #E2E7EF",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>← Back</button>}
          <button onClick={function(){if(idx<TOUR_STEPS_HUB.length-1){setIdx(function(i){return i+1;});setPos(null);}else{onDone();}}} style={{flex:2,padding:"8px",background:"#2563A8",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>
            {idx<TOUR_STEPS_HUB.length-1?"Next →":"Finish Tour ✓"}
          </button>
        </div>
      </div>
    </div>
  );
}

function App(){
  var _view=useState("reception");var view=_view[0];var setView=_view[1];
  var _staff=useState(STAFF[0]);var activeStaff=_staff[0];var setActiveStaff=_staff[1];
  var _vet=useState(VETS[0]);var activeVet=_vet[0];var setActiveVet=_vet[1];
  var _toast=useState(null);var toast=_toast[0];var setToast=_toast[1];
  var _demo=useState(false);var showDemo=_demo[0];var setShowDemo=_demo[1];

  function showToast(msg){setToast(msg);}

  // Read initial view from sessionStorage (set by client file "Open in Vet Room")
  useEffect(function(){
    try{
      var v=sessionStorage.getItem("vets_view");
      if(v==="vetroom")setView("vetroom");
      if(v==="calendar")setView("calendar");
      sessionStorage.removeItem("vets_view");
    }catch(e){}
  },[]);

  return(
    <div style={{height:"100vh",overflow:"hidden"}}>
      {view==="reception"&&(
        <ReceptionView
          onNavigate={setView}
          activeStaff={activeStaff}
          onStaffSwitch={function(s){setActiveStaff(s);showToast("Switched to "+s.name);}}
          toast={toast}
          showToast={showToast}
          onStartDemo={function(){setShowDemo(true);}}/>
      )}
      {view==="vetroom"&&(
        <VetRoomView
          onNavigate={setView}
          activeVet={activeVet}
          onVetSwitch={function(v){setActiveVet(v);showToast("Switched to "+v.name);}}
          toast={toast}
          showToast={showToast}
          onStartDemo={function(){setShowDemo(true);}}/>
      )}
      {view==="calendar"&&(
        <CalendarView
          onNavigate={setView}
          activeStaff={activeStaff}
          onStaffSwitch={function(s){setActiveStaff(s);showToast("Switched to "+s.name);}}
          toast={toast}
          showToast={showToast}
          onStartDemo={function(){setShowDemo(true);}}/>
      )}
      {toast&&<HubToast msg={toast} onHide={function(){setToast(null);}}/>}
      {showDemo&&<TooltipTourHub onDone={function(){setShowDemo(false);}}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
