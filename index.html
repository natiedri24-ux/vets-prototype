              {pet.alerts.length>0&&(<div style={{borderLeft:"4px solid "+C.er,background:"#FEE2E2",borderRadius:"0 8px 8px 0",padding:"10px 12px",marginBottom:10,animation:"alertpulse 2.5s ease-in-out infinite"}}><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:6}}><span style={{width:14,height:14,borderRadius:"50%",background:C.er,display:"inline-flex",alignItems:"center",justifyContent:"center",color:C.wh,fontSize:10,fontWeight:900,flexShrink:0}}>!</span><div style={{fontSize:10,fontWeight:800,color:C.er,letterSpacing:"0.1em",textTransform:"uppercase"}}>Alerts</div></div>{pet.alerts.map(function(a){return(<div key={a} style={{display:"flex",gap:6,alignItems:"flex-start",fontSize:12,fontWeight:600,color:"#991B1B",lineHeight:1.6}}><span style={{color:C.er,flexShrink:0,fontSize:10,marginTop:3}}>▸</span><span>{a}</span></div>);})}</div>)}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <div style={{fontSize:10,fontWeight:700,color:C.cy,textTransform:"uppercase",letterSpacing:"0.08em",opacity:0.8}}>Pet Details</div>
                <button onClick={function(){openSec("pet",{weight:gpe("weight"),coatColor:gpe("coatColor")||""});}} style={{background:"none",color:C.t3,fontSize:13,padding:"1px 3px"}} title="Edit pet details">✎</button>
              </div>
              {editSec==="pet"?(
                <div style={{background:C.wh,border:"1px solid "+C.cy+"55",borderRadius:8,padding:"9px 10px",marginBottom:6}}>
                  {[["Weight","weight"],["Coat Color","coatColor"]].map(function(f){return(
                    <div key={f[1]} style={{marginBottom:6}}>
                      <div style={{fontSize:10,color:C.t3,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>{f[0]}</div>
                      <input value={ped[f[1]]||""} onChange={function(e){var k=f[1],v=e.target.value;setPed(function(d){return Object.assign({},d,{[k]:v});});}} style={Object.assign({},II,{background:C.off})}/>
                    </div>
                  );})}
                  <div style={{display:"flex",gap:6,marginTop:6}}>
                    <button onClick={function(){saveSec("pet");}} style={SB}>Save</button>
                    <button onClick={function(){setEditSec(null);}} style={CB}>Cancel</button>
                  </div>
                </div>
              ):(
                <>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:8}}>
                    {[
                      {label:"Age",val:calcAge(pet.dob)},
                      {label:"Weight",val:gpe("weight")},
                      {label:"Gender",val:pet.gender},
                      {label:pet.gender==="Male"?"Neutered":"Spayed",val:pet.neutered?"Yes":"No"},
                      {label:"Type",val:pet.species==="Dog"?"Canine":pet.species==="Cat"?"Feline":pet.species},
                      {label:"Breed",val:pet.breed,span:true},
                    ].map(function(item){return(<div key={item.label} style={{padding:"7px 9px",background:"rgba(255,255,255,0.75)",borderRadius:8,gridColumn:item.span?"span 3":"auto",border:"1px solid "+C.cy+"22"}}><div style={{fontSize:10,color:C.cy,marginBottom:3,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700,opacity:0.8}}>{item.label}</div><div style={{fontSize:12,fontWeight:700,color:C.tx,wordBreak:"break-word",lineHeight:1.3}}>{item.val}</div></div>);})}
                  </div>
                  <div style={{padding:"6px 9px",background:"rgba(255,255,255,0.7)",borderRadius:8,marginBottom:6,border:"1px solid "+C.cy+"18"}}><div style={{fontSize:10,color:C.cy,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2,fontWeight:700,opacity:0.8}}>Microchip</div><div style={{fontSize:11,fontWeight:600,color:C.tx,fontFamily:"DM Mono,monospace",letterSpacing:"0.03em",wordBreak:"break-all"}}>{pet.chip}</div></div>
                  {gpe("coatColor")&&(<div style={{padding:"5px 9px",background:"rgba(255,255,255,0.7)",borderRadius:8,marginBottom:2,border:"1px solid "+C.cy+"18"}}><span style={{fontSize:10,color:C.cy,textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700,opacity:0.8}}>Coat · </span><span style={{fontSize:11,fontWeight:600,color:C.tx}}>{gpe("coatColor")}</span></div>)}
                </>
              )}
            </div>

            {}
            <div style={{padding:"13px 14px",borderBottom:"1px solid "+C.br}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
                <div style={{width:3,height:11,background:C.acc,borderRadius:2,flexShrink:0}}/>
                <div style={{fontSize:11,fontWeight:600,color:C.t2,letterSpacing:"0.06em",textTransform:"uppercase",flex:1}}>Insurance</div>
                <button onClick={function(){openSec("insurance",{insurance:gpe("insurance")||"",insuranceId:gpe("insuranceId")||""});}} style={{background:"none",color:C.t3,fontSize:13,padding:"1px 3px"}} title="Edit insurance">✎</button>
              </div>
              {editSec==="insurance"?(
                <div style={{background:C.off,borderRadius:8,padding:"9px 10px"}}>
                  {[["Provider","insurance"],["Policy #","insuranceId"]].map(function(f){return(
                    <div key={f[1]} style={{marginBottom:6}}>
                      <div style={{fontSize:10,color:C.t3,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>{f[0]}</div>
                      <input value={ped[f[1]]||""} onChange={function(e){var k=f[1],v=e.target.value;setPed(function(d){return Object.assign({},d,{[k]:v});});}} style={Object.assign({},II,{background:C.wh})}/>
                    </div>
                  );})}
                  <div style={{display:"flex",gap:6,marginTop:6}}>
                    <button onClick={function(){saveSec("insurance");}} style={SB}>Save</button>
                    <button onClick={function(){setEditSec(null);}} style={CB}>Cancel</button>
                  </div>
                </div>
              ):(
                gpe("insurance")?(<div style={{fontSize:12,fontWeight:700,color:C.acc}}>{gpe("insurance")}<span style={{fontSize:10,color:C.t2,fontWeight:400,fontFamily:"DM Mono,monospace",marginLeft:5}}>#{gpe("insuranceId")}</span></div>):(<div style={{fontSize:11,color:C.t3,fontStyle:"italic"}}>No insurance on file</div>)
              )}
            </div>

            {}
            <div style={{padding:"13px 14px",borderBottom:"1px solid "+C.br}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
                <div style={{width:3,height:11,background:C.acc,borderRadius:2,flexShrink:0}}/>
                <div style={{fontSize:11,fontWeight:700,color:C.t2,letterSpacing:"0.07em",textTransform:"uppercase",flex:1}}>Diet</div>
                <button onClick={function(){openSec("diet",{food:gpe("food")||""});}} style={{background:"none",color:C.t3,fontSize:13,padding:"1px 3px"}} title="Edit diet">✎</button>
              </div>
              {editSec==="diet"?(
                <div style={{background:C.off,borderRadius:8,padding:"9px 10px"}}>
                  <input value={ped.food||""} onChange={function(e){var v=e.target.value;setPed(function(d){return Object.assign({},d,{food:v});});}} placeholder="Diet notes…" style={Object.assign({},II,{background:C.wh})}/>
                  <div style={{display:"flex",gap:6,marginTop:7}}>
                    <button onClick={function(){saveSec("diet");}} style={SB}>Save</button>
                    <button onClick={function(){setEditSec(null);}} style={CB}>Cancel</button>
                  </div>
                </div>
              ):(
                <div style={{fontSize:11,color:C.t2}}>{gpe("food")||<span style={{color:C.t3,fontStyle:"italic"}}>No diet on file</span>}</div>
              )}
            </div>

            {/* ── Section divider: Clinical ── */}
            <div style={{display:"flex",alignItems:"center",gap:7,padding:"8px 14px 4px"}}>
              <div style={{flex:1,height:1,background:C.br}}/>
              <span style={{fontSize:9,fontWeight:800,color:C.er,textTransform:"uppercase",letterSpacing:"0.12em",fontFamily:"DM Mono,monospace",flexShrink:0}}>Clinical</span>
              <div style={{flex:1,height:1,background:C.br}}/>
            </div>

            {}
            {(function(){var activeMeds=pet.prescriptions?pet.prescriptions.filter(function(rx){return rx.status==="active";}):[];return activeMeds.length>0&&(
              <div style={{padding:"10px 14px",borderBottom:"1px solid "+C.br}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <div style={{width:3,height:11,background:C.er,borderRadius:2,flexShrink:0}}/>
                  <div style={{fontSize:11,fontWeight:700,color:C.t2,letterSpacing:"0.07em",textTransform:"uppercase",flex:1}}>Active Medications</div>
                  <button onClick={function(){setActiveTab("records");setRecordsSub("prescriptions");}} style={{background:"none",color:C.t3,fontSize:13,padding:"1px 3px"}} title="Manage in Prescriptions">✎</button>
                </div>
                {activeMeds.map(function(rx){return(<div key={rx.id} style={{display:"flex",alignItems:"baseline",gap:6,padding:"5px 0",borderBottom:"1px solid "+C.br}}><div style={{fontSize:11,fontWeight:700,color:C.tx,flex:"0 0 auto"}}>{rx.drug}</div><div style={{fontSize:11,color:C.t2}}>{rx.dose}</div></div>);})}
              </div>
            );}())}
          </div>
  );
}
</script>


<!-- ═══ SCRIPT 7 · SendDocsModal ═══ -->
<script type="text/babel">
function SendDocsModal({client,pets,onClose,staff,onExportStart}){
  const [patSel,setPatSel]=useState("");
  const [allDates,setAllDates]=useState(false);
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const [chWa,setChWa]=useState(true);
  const [chEm,setChEm]=useState(true);
  const [chDl,setChDl]=useState(false);
  const [sel,setSel]=useState({
    sumAll:false,sumClinic:false,sumExt:false,sumNotes:false,
    labAll:false,labXray:false,labBlood:false,labRes:false,
    vaxAll:false,vaxRabies:false,pay:false
  });
  const [saveSet,setSaveSet]=useState(false);
  const [done,setDone]=useState(false);

  function tgl(k){
    setSel(function(s){
      const n=Object.assign({},s);
      if(k==="sumAll"){const sv=!s.sumAll;n.sumAll=sv;n.sumClinic=sv;n.sumExt=sv;n.sumNotes=sv;}
      else if(k==="labAll"){const lv=!s.labAll;n.labAll=lv;n.labXray=lv;n.labBlood=lv;n.labRes=lv;}
      else if(k==="vaxAll"){const vv=!s.vaxAll;n.vaxAll=vv;n.vaxRabies=vv;}
      else{
        n[k]=!s[k];
        if(k==="sumClinic"||k==="sumExt"||k==="sumNotes")n.sumAll=n.sumClinic&&n.sumExt&&n.sumNotes;
        else if(k==="labXray"||k==="labBlood"||k==="labRes")n.labAll=n.labXray&&n.labBlood&&n.labRes;
        else if(k==="vaxRabies")n.vaxAll=n.vaxRabies;
      }
      return n;
    });
  }

  const hasCh=chWa||chEm||chDl;
  const hasCo=sel.sumClinic||sel.sumExt||sel.sumNotes||sel.labXray||sel.labBlood||sel.labRes||sel.vaxRabies||sel.pay;
  const canGo=patSel!==""&&hasCh&&hasCo;
  const rangedPets=patSel==="both"?pets:(patSel?[pets.find(function(p){return p.id===patSel;})].filter(Boolean):[]);
  const allPetDates=rangedPets.reduce(function(acc,p){
    var ds=[];
    (p.visits||[]).forEach(function(v){if(v.date)ds.push(v.date);});
    (p.labs||[]).forEach(function(l){if(l.date)ds.push(l.date);});
    (p.vaccines||[]).forEach(function(v){if(v.last)ds.push(v.last);});
    (p.billing||[]).forEach(function(b){if(b.date)ds.push(b.date);});
    (p.documents||[]).forEach(function(d){if(d.date)ds.push(d.date);});
    (p.prescriptions||[]).forEach(function(r){if(r.date)ds.push(r.date);});
    return acc.concat(ds);
  },[]).sort();
  const autoFrom=allPetDates.length?allPetDates[0]:"";
  const autoTo=allPetDates.length?allPetDates[allPetDates.length-1]:"";
  const effFrom=allDates?autoFrom:dateFrom;
  const effTo=allDates?autoTo:dateTo;
  const ckSt={width:15,height:15,accentColor:C.acc,cursor:"pointer",flexShrink:0};
  const rowSt={display:"flex",alignItems:"center",gap:8,marginBottom:8,cursor:"pointer"};
  const childSt={display:"flex",alignItems:"center",gap:8,marginBottom:6,cursor:"pointer",marginLeft:20};
  const lblSt={fontSize:11,fontWeight:600,color:C.t2,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6,display:"block"};
  const pillFn=function(a){return{padding:"5px 14px",borderRadius:99,fontSize:13,fontWeight:a?600:400,background:a?C.acc:C.off,color:a?C.wh:C.t2,border:"1px solid "+(a?C.acc:C.br),cursor:"pointer"};};
  function fmtD(s){if(!s)return"";const p=s.split("-");return p[2]+"."+p[1]+"."+p[0];}

  if(done){
    const chs=[];
    if(chWa)chs.push("WhatsApp");
    if(chEm)chs.push("Email");
    if(chDl)chs.push("PDF Download");
    const selectedPets=patSel==="both"?pets:[pets.find(function(p){return p.id===patSel;})];
    const now=new Date();
    const dtStr=now.toLocaleDateString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    const drStr=allDates?(autoFrom&&autoTo?fmtD(autoFrom)+" – "+fmtD(autoTo):"All Dates"):(dateFrom||dateTo?fmtD(dateFrom)+(dateTo?" – "+fmtD(dateTo):""):"All Dates");
    const recs=[];
    if(sel.sumClinic||sel.sumExt||sel.sumNotes){
      const sub=[];
      if(sel.sumClinic)sub.push("Visit Summaries");
      if(sel.sumExt)sub.push("Discharge Notes");
      if(sel.sumNotes)sub.push("Vet Notes");
      recs.push({label:"All Summaries",sub:sub});
    }
    if(sel.labXray||sel.labBlood||sel.labRes){
      const sub=[];
      if(sel.labXray)sub.push("X-Ray");
      if(sel.labBlood)sub.push("Blood Tests");
      if(sel.labRes)sub.push("Lab Results");
      recs.push({label:"Lab & Diagnostics",sub:sub});
    }
    if(sel.vaxRabies){recs.push({label:"Vaccinations",sub:["Rabies Only"]});}
    else if(sel.vaxAll){recs.push({label:"Vaccinations",sub:[]});}
    if(sel.pay)recs.push({label:"Payments / Receipts",sub:[]});
    const infoCard={flex:1,background:C.sb,color:C.wh,borderRadius:8,padding:"14px 16px",fontSize:13,fontWeight:500,textAlign:"center",lineHeight:"1.5"};
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
        <div style={{background:"#F4F6F9",borderRadius:12,width:600,maxWidth:"calc(100vw - 32px)",maxHeight:"calc(100vh - 48px)",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.28)",display:"flex",flexDirection:"column"}} onClick={function(e){e.stopPropagation();}}>
          <div style={{background:C.wh,borderRadius:"12px 12px 0 0",padding:"24px 24px 20px",textAlign:"center",borderBottom:"1px solid "+C.br}}>
            <div style={{fontSize:20,fontWeight:700,color:C.tx,marginBottom:6}}>File Export Started!</div>
            <div style={{fontSize:14,color:C.t2,marginBottom:10}}>{"The client file export for "+client.name+" has been initiated."}</div>
            <div style={{fontSize:12,color:C.t3,fontFamily:"DM Mono,monospace"}}>{"Date and time: "+dtStr}</div>
            {staff&&<div style={{fontSize:12,color:C.t3,fontFamily:"DM Mono,monospace",marginTop:2}}>{"Staff: "+staff.name}</div>}
          </div>
          <div style={{padding:"16px 24px",display:"flex",gap:12}}>
            <div style={infoCard}>The export is running in the background.</div>
            <div style={infoCard}>When the export is complete, you will receive a notification.</div>
          </div>
          <div style={{margin:"0 24px",background:"rgba(8,145,178,0.08)",border:"1px solid rgba(8,145,178,0.22)",borderRadius:8,padding:"11px 16px",fontSize:13,color:C.cy,textAlign:"center",fontWeight:500}}>
            You can continue working! Progress will appear in the top progress bar.
          </div>
          <div style={{margin:"16px 24px 8px",background:C.wh,borderRadius:8,padding:"16px 20px",border:"1px solid "+C.br}}>
            <div style={{fontSize:14,fontWeight:700,color:C.tx,marginBottom:12}}>Details</div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{fontSize:13,color:C.t2}}>
                <span style={{color:C.t3,marginRight:6,fontWeight:500}}>Recipient:</span>
                {client.name+" / "+selectedPets.map(function(p){return p.name;}).join(", ")}
              </div>
              <div style={{fontSize:13,color:C.t2}}>
                <span style={{color:C.t3,marginRight:6,fontWeight:500}}>Date Range:</span>{drStr}
              </div>
              <div style={{fontSize:13}}>
                <div style={{color:C.t3,fontWeight:500,marginBottom:8}}>Records Included:</div>
                <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
                  {recs.map(function(r,i){return(
                    <div key={i}>
                      <div style={{fontWeight:600,color:C.tx,marginBottom:4,fontSize:13}}>{r.label}</div>
                      {r.sub.map(function(s,j){return(
                        <div key={j} style={{paddingLeft:10,color:C.t2,marginBottom:3,fontSize:12}}>{s}</div>
                      );})}
                    </div>
                  );})}
                </div>
              </div>
              {chs.length>0&&<div style={{fontSize:13,color:C.t2}}>
                <span style={{color:C.t3,marginRight:6,fontWeight:500}}>Sent via:</span>{chs.join(", ")}
              </div>}
            </div>
          </div>
          <div style={{padding:"12px 24px 20px",display:"flex",justifyContent:"flex-end"}}>
            <button onClick={onClose} style={{padding:"8px 28px",background:C.wh,color:C.t2,border:"1px solid "+C.br,borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Close</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:C.wh,borderRadius:12,width:720,maxWidth:"calc(100vw - 32px)",maxHeight:"calc(100vh - 48px)",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.28)",display:"flex",flexDirection:"column"}} onClick={function(e){e.stopPropagation();}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:"1px solid "+C.br,flexShrink:0}}>
          <span style={{fontSize:15,fontWeight:700,color:C.tx}}>Export Patient Records</span>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:C.t3,cursor:"pointer",lineHeight:1,padding:"0 2px"}}>✕</button>
        </div>
        <div style={{display:"flex",borderBottom:"1px solid "+C.br}}>
          <div style={{flex:1,padding:"16px 20px",borderRight:"1px solid "+C.br}}>
            <span style={lblSt}>Send To</span>
            <div style={{fontSize:14,fontWeight:600,color:C.tx,marginBottom:14}}>{client.name}</div>
            <span style={lblSt}>Patient</span>
            <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
              <button onClick={function(){setPatSel("both");}} style={pillFn(patSel==="both")}>All</button>
              {pets.map(function(p){return(<button key={p.id} onClick={function(){setPatSel(p.id);}} style={pillFn(patSel===p.id)}>{p.icon+" "+p.name}</button>);})}
            </div>
            <span style={lblSt}>Date Range</span>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input type="date" value={effFrom} onChange={function(e){setDateFrom(e.target.value);}} disabled={allDates} style={{flex:1,padding:"5px 8px",border:"1px solid "+C.br,borderRadius:8,fontSize:12,color:C.tx,background:allDates?"#F8FAFC":C.wh}}/>
              <input type="date" value={effTo} onChange={function(e){setDateTo(e.target.value);}} disabled={allDates} style={{flex:1,padding:"5px 8px",border:"1px solid "+C.br,borderRadius:8,fontSize:12,color:C.tx,background:allDates?"#F8FAFC":C.wh}}/>
            </div>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
              <input type="checkbox" checked={allDates} onChange={function(){setAllDates(function(v){return !v;});}} style={ckSt}/>
              <span style={{fontSize:13,color:C.t2}}>All dates</span>
            </label>
          </div>
          <div style={{width:232,padding:"16px 20px",flexShrink:0}}>
            <span style={lblSt}>Choose Via</span>
            <label style={rowSt}>
              <input type="checkbox" checked={chWa} onChange={function(){setChWa(function(v){return !v;});}} style={ckSt}/>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.tx}}>WhatsApp</div>
                <div style={{fontSize:12,color:C.t2,marginTop:1}}>{client.phone}</div>
              </div>
            </label>
            <label style={rowSt}>
              <input type="checkbox" checked={chEm} onChange={function(){setChEm(function(v){return !v;});}} style={ckSt}/>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.tx}}>Email</div>
                <div style={{fontSize:12,color:C.t2,marginTop:1}}>{client.email}</div>
              </div>
            </label>
            <label style={rowSt}>
              <input type="checkbox" checked={chDl} onChange={function(){setChDl(function(v){return !v;});}} style={ckSt}/>
              <span style={{fontSize:13,fontWeight:600,color:C.tx}}>Download as PDF</span>
            </label>
          </div>
        </div>
        <div style={{padding:"16px 20px",borderBottom:"1px solid "+C.br}}>
          <span style={{fontSize:11,fontWeight:600,color:C.t2,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:14,display:"block"}}>Choose Info to Export</span>
          <div style={{display:"flex",alignItems:"flex-start"}}>
            <div style={{flex:1,paddingRight:16,borderRight:"1px solid "+C.br}}>
              <label style={rowSt}>
                <input type="checkbox" checked={sel.sumAll} onChange={function(){tgl("sumAll");}} style={ckSt}/>
                <span style={{fontSize:13,fontWeight:600,color:C.tx}}>All Summaries</span>
              </label>
              <label style={childSt}>
                <input type="checkbox" checked={sel.sumClinic} onChange={function(){tgl("sumClinic");}} style={ckSt}/>
                <span style={{fontSize:12,color:C.t2}}>Visit Summaries</span>
              </label>
              <label style={childSt}>
                <input type="checkbox" checked={sel.sumExt} onChange={function(){tgl("sumExt");}} style={ckSt}/>
                <span style={{fontSize:12,color:C.t2}}>Discharge Notes</span>
              </label>
              <label style={Object.assign({},childSt,{marginBottom:0})}>
                <input type="checkbox" checked={sel.sumNotes} onChange={function(){tgl("sumNotes");}} style={ckSt}/>
                <span style={{fontSize:12,color:C.t2}}>Vet Notes</span>
              </label>
            </div>
            <div style={{flex:1,paddingLeft:16,paddingRight:16,borderRight:"1px solid "+C.br}}>
              <label style={rowSt}>
                <input type="checkbox" checked={sel.labAll} onChange={function(){tgl("labAll");}} style={ckSt}/>
                <span style={{fontSize:13,fontWeight:600,color:C.tx}}>Lab & Diagnostics</span>
              </label>
              <label style={childSt}>
                <input type="checkbox" checked={sel.labXray} onChange={function(){tgl("labXray");}} style={ckSt}/>
                <span style={{fontSize:12,color:C.t2}}>X-Ray</span>
              </label>
              <label style={childSt}>
                <input type="checkbox" checked={sel.labBlood} onChange={function(){tgl("labBlood");}} style={ckSt}/>
                <span style={{fontSize:12,color:C.t2}}>Blood Tests</span>
              </label>
              <label style={Object.assign({},childSt,{marginBottom:0})}>
                <input type="checkbox" checked={sel.labRes} onChange={function(){tgl("labRes");}} style={ckSt}/>
                <span style={{fontSize:12,color:C.t2}}>Lab Results</span>
              </label>
            </div>
            <div style={{flex:1,paddingLeft:16,paddingRight:16,borderRight:"1px solid "+C.br}}>
              <label style={rowSt}>
                <input type="checkbox" checked={sel.vaxAll} onChange={function(){tgl("vaxAll");}} style={ckSt}/>
                <span style={{fontSize:13,fontWeight:600,color:C.tx}}>Vaccinations</span>
              </label>
              <label style={Object.assign({},childSt,{marginBottom:0})}>
                <input type="checkbox" checked={sel.vaxRabies} onChange={function(){tgl("vaxRabies");}} style={ckSt}/>
                <span style={{fontSize:12,color:C.t2}}>Rabies Only</span>
              </label>
            </div>
            <div style={{flex:1,paddingLeft:16}}>
              <label style={Object.assign({},rowSt,{marginBottom:0})}>
                <input type="checkbox" checked={sel.pay} onChange={function(){tgl("pay");}} style={ckSt}/>
                <span style={{fontSize:13,fontWeight:600,color:C.tx}}>Payments / Receipts</span>
              </label>
            </div>
          </div>
        </div>
        <div style={{padding:"14px 20px",display:"flex",alignItems:"center",flexShrink:0}}>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",flex:1}}>
            <input type="checkbox" checked={saveSet} onChange={function(){setSaveSet(function(v){return !v;});}} style={ckSt}/>
            <span style={{fontSize:13,color:C.t2}}>Save Settings for Future Use</span>
          </label>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{padding:"8px 16px",background:C.off,color:C.t2,border:"1px solid "+C.br,borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
            <button onClick={canGo?function(){
              if(onExportStart){
                var selPet=patSel==="both"?null:pets.find(function(p){return p.id===patSel;});
                var pn=patSel==="both"?"All Patients":selPet.name;
                var pi=patSel==="both"?"🐾":selPet.icon;
                var chs=[];if(chWa)chs.push("WhatsApp");if(chEm)chs.push("Email");if(chDl)chs.push("PDF");
                var cats=[];
                if(sel.sumClinic||sel.sumExt||sel.sumNotes)cats.push("Summaries");
                if(sel.labXray||sel.labBlood||sel.labRes)cats.push("Lab & Diagnostics");
                if(sel.vaxAll||sel.vaxRabies)cats.push("Vaccinations");
                if(sel.pay)cats.push("Payments");
                var dr=allDates?"All dates":(effFrom||effTo?fmtD(effFrom)+(effTo?" – "+fmtD(effTo):""):"All dates");
                onExportStart(client.name+" / "+pn,{petName:pn,petIcon:pi,via:chs,categories:cats,dateRange:dr,docCount:cats.length||1});
              }
              setDone(true);
            }:undefined} disabled={!canGo} style={{padding:"8px 18px",background:canGo?C.acc:"#94A3B8",color:C.wh,border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:canGo?"pointer":"not-allowed",opacity:canGo?1:0.7}}>Confirm Export ▶</button>
          </div>
        </div>
      </div>
    </div>
  );
}
</script>

<!-- ═══ SCRIPT 6.5 · ProcedureEditPanel ═══ -->
<script type="text/babel">
function ProcedureEditPanel({proc,onUpdate,onAdvance,onAddCharge,onRemoveCharge}){
  var finp={width:"100%",padding:"7px 10px",borderRadius:8,border:"1px solid "+C.br,
    fontSize:12,color:C.tx,outline:"none",boxSizing:"border-box",background:C.wh};
  var lbl={fontSize:11,fontFamily:"'DM Mono',monospace",color:C.t3,fontWeight:700,
    letterSpacing:"0.06em",textTransform:"uppercase",display:"block",marginBottom:4};
  var panelBg={padding:"14px 16px",background:"#FAFBFD",borderTop:"1px solid "+C.br,
    maxHeight:460,overflowY:"auto"};
  function Chk(props){
    return(
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style={{fontSize:14,flexShrink:0,cursor:props.ok?"default":"pointer"}}
          onClick={props.ok?null:props.onMark}>{props.ok?"✅":"⬜"}</span>
        <span style={{fontSize:11,flex:1,color:props.ok?C.t2:"#1E293B",fontWeight:props.ok?400:500}}>{props.label}</span>
        {!props.ok&&props.onMark&&(
          <button onClick={props.onMark} style={{fontSize:10,color:C.acc,background:"none",
            border:"none",cursor:"pointer",fontWeight:700,
            textDecoration:"underline",textDecorationStyle:"dotted"}}>Mark done</button>
        )}
      </div>
    );
  }
  function SecHdr({txt,col}){
    return <div style={{fontSize:11,fontWeight:700,fontFamily:"'DM Mono',monospace",
      color:col||C.t3,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:8}}>{txt}</div>;
  }
  function AdvBtn({label,onClick,bg,shadow,disabled}){
    return(
      <div>
        <button onClick={disabled?null:onClick}
          style={{width:"100%",marginTop:10,padding:"9px",borderRadius:8,border:"none",
            background:disabled?"#CBD5E1":bg,color:"#fff",fontSize:12,fontWeight:700,
            cursor:disabled?"not-allowed":"pointer",fontFamily:"'Sora',sans-serif",
            boxShadow:disabled?"none":shadow}}>
          {label}
        </button>
        {disabled&&props&&props.disabledMsg&&(
          <div style={{fontSize:10,color:C.am,marginTop:5,textAlign:"center"}}>{props.disabledMsg}</div>
        )}
      </div>
    );
  }

  /* ── PRE-OP ── */
  if(proc.status==="pre-op")return(
    <div style={panelBg}>
      <SecHdr txt="Pre-Op Checklist"/>
      <Chk label="Consent form signed" ok={!!proc.consentSigned} onMark={function(){onUpdate({consentSigned:true});}}/>
      <Chk label="Fasting confirmed (7h min)" ok={!!proc.fastingConfirmed} onMark={function(){onUpdate({fastingConfirmed:true});}}/>
      <Chk label={"Blood test"+(proc.bloodTestRequired?" (required)":" (not required)")}
        ok={!proc.bloodTestRequired||!!proc.bloodTestDone}
        onMark={proc.bloodTestRequired&&!proc.bloodTestDone?function(){onUpdate({bloodTestDone:true});}:null}/>
      <div style={{marginTop:10}}>
        <span style={lbl}>Notes</span>
        <textarea value={proc.notes||""} rows={2}
          onChange={function(e){onUpdate({notes:e.target.value});}}
          placeholder="Pre-op notes..."
          style={Object.assign({},finp,{resize:"none",lineHeight:1.5})}/>
      </div>
      <button onClick={function(){onAdvance("admission");}}
        style={{width:"100%",marginTop:10,padding:"9px",borderRadius:8,border:"none",
          background:"linear-gradient(135deg,#0284C7,#0369A1)",color:"#fff",
          fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Sora',sans-serif",
          boxShadow:"0 2px 8px rgba(2,132,199,0.35)"}}>
        Admit Patient →
      </button>
    </div>
  );

  /* ── ADMISSION ── */
  if(proc.status==="admission")return(
    <div style={panelBg}>
      <SecHdr txt="Admission Checklist" col="#0284C7"/>
      <div style={{marginBottom:10}}>
        <span style={lbl}>Weight at admission (kg)</span>
        <input type="number" value={proc.admissionWeight||""}
          onChange={function(e){onUpdate({admissionWeight:parseFloat(e.target.value)||null});}}
          placeholder={proc.lastWeight?"Last known: "+proc.lastWeight+"kg":"e.g. 18.5"}
          style={finp} step="0.1"/>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:11,color:C.tx}}>
          <input type="checkbox" checked={!!proc.bloodTestRequired}
            onChange={function(e){onUpdate({bloodTestRequired:e.target.checked});}}/>
          Blood test required
        </label>
        {proc.bloodTestRequired&&(
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",
            fontSize:11,color:C.tx,marginTop:6,marginLeft:20}}>
            <input type="checkbox" checked={!!proc.bloodTestDone}
              onChange={function(e){onUpdate({bloodTestDone:e.target.checked});}}/>
            Blood test completed
          </label>
        )}
      </div>
      <Chk label="Procedure area examined" ok={!!proc.areaChecked} onMark={function(){onUpdate({areaChecked:true});}}/>
      <Chk label="Allergies verified" ok={!!proc.allergiesVerified} onMark={function(){onUpdate({allergiesVerified:true});}}/>
      <div style={{marginBottom:10}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:11,color:C.tx}}>
          <input type="checkbox" checked={!!proc.xrayRequired}
            onChange={function(e){onUpdate({xrayRequired:e.target.checked});}}/>
          X-Ray required pre-op
        </label>
        {proc.xrayRequired&&(
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",
            fontSize:11,color:C.tx,marginTop:6,marginLeft:20}}>
            <input type="checkbox" checked={!!proc.xrayDone}
              onChange={function(e){onUpdate({xrayDone:e.target.checked});}}/>
            X-Ray done
          </label>
        )}
      </div>
      <div style={{marginBottom:10}}>
        <span style={lbl}>Admission Notes</span>
        <textarea value={proc.notes||""} rows={2}
          onChange={function(e){onUpdate({notes:e.target.value});}}
          placeholder="Admission observations..."
          style={Object.assign({},finp,{resize:"none",lineHeight:1.5})}/>
      </div>
      <button onClick={function(){if(proc.areaChecked&&proc.allergiesVerified)onAdvance("sedation");}}
        style={{width:"100%",marginTop:10,padding:"9px",borderRadius:8,border:"none",
          background:proc.areaChecked&&proc.allergiesVerified?"linear-gradient(135deg,#4F46E5,#4338CA)":"#CBD5E1",
          color:"#fff",fontSize:12,fontWeight:700,fontFamily:"'Sora',sans-serif",
          cursor:proc.areaChecked&&proc.allergiesVerified?"pointer":"not-allowed",
          boxShadow:proc.areaChecked&&proc.allergiesVerified?"0 2px 8px rgba(79,70,229,0.35)":"none"}}>
        → Pre-Anesthesia
      </button>
      {(!proc.areaChecked||!proc.allergiesVerified)&&(
        <div style={{fontSize:10,color:C.am,marginTop:5,textAlign:"center"}}>
          Complete area check + allergies verification first
        </div>
      )}
    </div>
  );

  /* ── SEDATION ── */
  if(proc.status==="sedation")return(
    <div style={panelBg}>
      <SecHdr txt="Sedation" col="#4F46E5"/>
      <div style={{marginBottom:10}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:11,color:C.tx}}>
          <input type="checkbox" checked={!!proc.sedationGiven}
            onChange={function(e){onUpdate({sedationGiven:e.target.checked});}}/>
          Sedation administered
        </label>
        {proc.sedationGiven&&(
          <div style={{marginTop:8}}>
            <span style={lbl}>Time given</span>
            <input type="time" value={proc.sedationTime||""}
              onChange={function(e){onUpdate({sedationTime:e.target.value});}}
              style={finp}/>
          </div>
        )}
      </div>
      <Chk label="IV catheter inserted" ok={!!proc.ivCatheter} onMark={function(){onUpdate({ivCatheter:true});}}/>
      <div style={{marginTop:10,marginBottom:10}}>
        <span style={lbl}>Notes</span>
        <textarea value={proc.notes||""} rows={2}
          onChange={function(e){onUpdate({notes:e.target.value});}}
          placeholder="Pre-anesthesia observations..."
          style={Object.assign({},finp,{resize:"none",lineHeight:1.5})}/>
      </div>
      <button onClick={function(){if(proc.ivCatheter)onAdvance("in-progress");}}
        style={{width:"100%",padding:"9px",borderRadius:8,border:"none",
          background:proc.ivCatheter?"linear-gradient(135deg,#D97706,#B45309)":"#CBD5E1",
          color:"#fff",fontSize:12,fontWeight:700,fontFamily:"'Sora',sans-serif",
          cursor:proc.ivCatheter?"pointer":"not-allowed",
          boxShadow:proc.ivCatheter?"0 2px 8px rgba(217,119,6,0.35)":"none"}}>
        ▶ Begin Procedure
      </button>
      {!proc.ivCatheter&&(
        <div style={{fontSize:10,color:C.am,marginTop:5,textAlign:"center"}}>Insert IV catheter first</div>
      )}
    </div>
  );

  /* ── IN-PROGRESS ── */
  if(proc.status==="in-progress")return(
    <div style={panelBg}>
      <SecHdr txt="During Procedure" col="#D97706"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div>
          <span style={lbl}>Anesthesia Used</span>
          <select value={proc.anesthesiaActual||proc.anesthesia||"general"}
            onChange={function(e){onUpdate({anesthesiaActual:e.target.value});}}
            style={finp}>
            <option value="none">None</option>
            <option value="local">Local</option>
            <option value="partial">Sedation</option>
            <option value="general">General</option>
          </select>
        </div>
        <div>
          <span style={lbl}>Follow-Up Date</span>
          <input type="date" value={proc.followUpDate||""}
            onChange={function(e){onUpdate({followUpDate:e.target.value});}}
            style={finp}/>
        </div>
      </div>
      <div style={{marginBottom:10}}>
        <span style={lbl}>Post-Procedure Medications</span>
        <textarea value={proc.postMeds||""} rows={2}
          onChange={function(e){onUpdate({postMeds:e.target.value});}}
          placeholder="e.g. Meloxicam 0.2mg/kg SID × 5 days, Amoxicillin..."
          style={Object.assign({},finp,{resize:"none",lineHeight:1.5})}/>
      </div>
      <div style={{marginBottom:10}}>
        <span style={lbl}>Charges</span>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
          {PRICE_LIST.slice(0,8).map(function(item){return(
            <button key={item.id} onClick={function(){onAddCharge(item);}}
              style={{padding:"3px 9px",borderRadius:99,fontSize:10,
                border:"1px solid "+C.br,background:C.wh,color:C.t2,
                cursor:"pointer",fontWeight:500}}>
              + {item.label} <span style={{color:C.t3}}>₪{item.price}</span>
            </button>
          );})}
        </div>
        {(proc.intraCharges||[]).length>0&&(
          <div style={{background:C.wh,borderRadius:8,border:"1px solid "+C.br,overflow:"hidden"}}>
            {(proc.intraCharges||[]).map(function(c,i){return(
              <div key={c.label} style={{display:"flex",alignItems:"center",padding:"6px 10px",
                borderBottom:i<proc.intraCharges.length-1?"1px solid "+C.br:"none"}}>
                <span style={{flex:1,fontSize:11,color:C.tx}}>{c.label}</span>
                {c.qty>1&&<span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:C.t3,marginRight:6}}>×{c.qty}</span>}
                <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",fontWeight:600,color:C.tx,marginRight:8}}>₪{c.amount}</span>
                <button onClick={function(){onRemoveCharge(c.label);}}
                  style={{fontSize:11,color:C.t3,background:"none",border:"none",cursor:"pointer",lineHeight:1}}>✕</button>
              </div>
            );})}
            <div style={{padding:"6px 10px",background:"#F8FAFC",display:"flex",justifyContent:"flex-end",gap:4}}>
              <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:C.t2}}>Total:</span>
              <span style={{fontSize:12,fontWeight:700,fontFamily:"'DM Mono',monospace",color:C.tx}}>
                ₪{(proc.intraCharges||[]).reduce(function(s,c){return s+(c.amount||0);},0)}
              </span>
            </div>
          </div>
        )}
      </div>
      <div style={{marginBottom:10}}>
        <span style={lbl}>Intra-Op Notes</span>
        <textarea value={proc.duringNotes||""} rows={2}
          onChange={function(e){onUpdate({duringNotes:e.target.value});}}
          placeholder="Observations during procedure..."
          style={Object.assign({},finp,{resize:"none",lineHeight:1.5})}/>
      </div>
      <button onClick={function(){onAdvance("recovery");}}
        style={{width:"100%",padding:"9px",borderRadius:8,border:"none",
          background:"linear-gradient(135deg,#16A34A,#15803D)",color:"#fff",
          fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Sora',sans-serif",
          boxShadow:"0 2px 8px rgba(22,163,74,0.35)"}}>
        ✓ Complete → Recovery
      </button>
    </div>
  );

  /* ── RECOVERY ── */
  if(proc.status==="recovery")return(
    <div style={panelBg}>
      <SecHdr txt="Recovery" col="#16A34A"/>
      <Chk label="IV catheter removed" ok={!!proc.catheterRemoved} onMark={function(){onUpdate({catheterRemoved:true});}}/>
      <Chk label="Patient awake and stable" ok={!!proc.petAwake} onMark={function(){onUpdate({petAwake:true});}}/>
      {proc.postMeds&&(
        <div style={{marginBottom:10,marginTop:8,background:C.wh,borderRadius:8,
          padding:"8px 10px",border:"1px solid "+C.br}}>
          <span style={Object.assign({},lbl,{marginBottom:2})}>Post-Procedure Meds</span>
          <div style={{fontSize:11,color:C.t2,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{proc.postMeds}</div>
        </div>
      )}
      {proc.followUpDate&&(
        <div style={{marginBottom:10,fontSize:11,color:C.t2}}>
          Follow-Up: <strong>{proc.followUpDate}</strong>

      )}
      <div style={{marginBottom:10}}>
        <span style={lbl}>Recovery Notes</span>
        <textarea value={proc.notes||""} rows={2}
          onChange={function(e){onUpdate({notes:e.target.value});}}
          placeholder="Recovery observations, owner instructions..."
          style={Object.assign({},finp,{resize:"none",lineHeight:1.5})}/>
      </div>
      <button onClick={function(){onAdvance("discharged");}}
        style={{width:"100%",padding:"9px",borderRadius:8,border:"none",
          background:"linear-gradient(135deg,#0284C7,#0369A1)",color:"#fff",
          fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Sora',sans-serif",
          boxShadow:"0 2px 8px rgba(2,132,199,0.35)"}}>
        Discharge Patient ✓
      </button>
    </div>
  );

  /* ── DISCHARGED ── */
  return(
    <div style={Object.assign({},panelBg,{textAlign:"center",paddingTop:20,paddingBottom:20})}>
      <div style={{fontSize:32,marginBottom:8}}>✓</div>
      <div style={{fontSize:13,fontWeight:700,color:"#16A34A",fontFamily:"'Sora',sans-serif",marginBottom:4}}>
        {proc.pet} discharged
      </div>
      {proc.followUpDate&&(
        <div style={{fontSize:11,color:C.t2,fontFamily:"'DM Mono',monospace"}}>
          Follow-up: {proc.followUpDate}
        </div>
      )}
      {(proc.intraCharges||[]).length>0&&(
        <div style={{marginTop:12,background:C.wh,borderRadius:8,border:"1px solid "+C.br,
          overflow:"hidden",textAlign:"left"}}>
          {(proc.intraCharges||[]).map(function(c,i){return(
            <div key={c.label} style={{display:"flex",padding:"6px 10px",
              borderBottom:i<proc.intraCharges.length-1?"1px solid "+C.br:"none"}}>
              <span style={{flex:1,fontSize:11,color:C.t2}}>{c.label}</span>
              <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",fontWeight:600,color:C.tx}}>
                ₪{c.amount}
              </span>
            </div>
          );})}
          <div style={{padding:"6px 10px",background:"#F0FDF4",display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:11,fontWeight:600,color:"#16A34A"}}>Total Charged</span>
            <span style={{fontSize:12,fontWeight:700,fontFamily:"'DM Mono',monospace",color:"#16A34A"}}>
              ₪{(proc.intraCharges||[]).reduce(function(s,c){return s+(c.amount||0);},0)}
            </span>
          </div>
        </div>
      )}
    </div>
  );
}
</script>

<!-- ═══ SCRIPT 6.8 · TooltipTour ═══ -->
<script type="text/babel">
function TooltipTour({steps,onDone}){
  const [idx,setIdx]=useState(0);
  const [pos,setPos]=useState(null);
  const tooltipRef=useRef(null);

  var step=steps[idx];

  useEffect(function(){
    var el=document.getElementById(step.id);
    if(!el)return;
    /* scroll into view then measure */
    el.scrollIntoView({block:"nearest",inline:"nearest"});
    function measure(){
      var r=el.getBoundingClientRect();
      setPos({top:r.top,left:r.left,width:r.width,height:r.height,placement:step.placement});
    }
    measure();
    window.addEventListener("resize",measure);
    return function(){window.removeEventListener("resize",measure);};
  },[idx]);

  if(!pos)return null;

  /* tooltip position relative to highlight */
  var TW=296,TH=130,PAD=14;
  var tLeft=pos.left,tTop=pos.top;
  if(pos.placement==="bottom"){tTop=pos.top+pos.height+PAD;tLeft=pos.left+(pos.width/2)-(TW/2);}
  else if(pos.placement==="right"){tLeft=pos.left+pos.width+PAD;tTop=pos.top+(pos.height/2)-60;}
  else if(pos.placement==="left"){tLeft=pos.left-TW-PAD;tTop=pos.top+(pos.height/2)-60;}
  else{tTop=pos.top-TH-PAD;tLeft=pos.left+(pos.width/2)-(TW/2);}
  /* clamp to viewport */
  tLeft=Math.max(10,Math.min(tLeft,window.innerWidth-TW-10));
  tTop=Math.max(10,Math.min(tTop,window.innerHeight-TH-20));

  return(
    <div style={{position:"fixed",inset:0,zIndex:9000,pointerEvents:"none"}}>
      {/* dark overlay with hole */}
      <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <mask id="tourMask">
            <rect width="100%" height="100%" fill="white"/>
            <rect x={pos.left-6} y={pos.top-6} width={pos.width+12} height={pos.height+12} rx="10" fill="black"/>
          </mask>
        </defs>
        <rect width="100%" height="100%" fill="rgba(10,25,47,0.62)" mask="url(#tourMask)"/>
      </svg>
      {/* highlight ring */}
      <div style={{position:"absolute",left:pos.left-6,top:pos.top-6,width:pos.width+12,height:pos.height+12,borderRadius:10,boxShadow:"0 0 0 3px "+C.acc+",0 0 0 6px rgba(37,99,168,0.22)",pointerEvents:"none"}}/>
      {/* tooltip card */}

  if(n.indexOf("dhpp")>-1||n.indexOf("distemper")>-1)return {id:"vaccine_dhpp",label:"DHPP Vaccine",price:45,cat:"vaccine"};
  if(n.indexOf("fhvcp")>-1||n.indexOf("fvrcp")>-1)return {id:"fhvcp",label:"FHVCP Vaccine",price:40,cat:"vaccine"};
  if(n.indexOf("bordetella")>-1||n.indexOf("kennel")>-1)return {id:"bordetella",label:"Bordetella Vaccine",price:38,cat:"vaccine"};
  if(n.indexOf("park worm")>-1||n.indexOf("park")>-1)return {id:"park_worm",label:"Park Worm Treatment",price:32,cat:"vaccine"};
  if(n.indexOf("bravecto")>-1)return {id:"bravecto",label:"Bravecto (Flea & Tick)",price:55,cat:"meds"};
  if(n.indexOf("lyme")>-1)return {id:"lyme_vax",label:"Lyme Vaccine",price:42,cat:"vaccine"};
  if(n.indexOf("lepto")>-1)return {id:"lepto_vax",label:"Leptospirosis Vaccine",price:36,cat:"vaccine"};
  if(n.indexOf("influenza")>-1||n.indexOf("flu")>-1)return {id:"flu_vax",label:"Canine Influenza Vaccine",price:40,cat:"vaccine"};
  return null;
}

  function updActiveProcedure(patch){

        return activeProcedure&&p.id===activeProcedure.id?Object.assign({},p,patch):p;

            )}
            <div style={{fontSize:12,color:C.t3,fontFamily:"Outfit,sans-serif",marginBottom:20}}>Visit <span style={{fontFamily:"DM Mono,monospace",color:C.t2}}>{pendingVaxCharge.activeVisit.id}</span>{pendingVaxCharge.activeVisit.vet?" · "+pendingVaxCharge.activeVisit.vet:""}</div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={function(){setPendingVaxCharge(null);}} style={{padding:"8px 18px",background:C.off,color:C.t2,border:"1px solid "+C.br,borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"Outfit,sans-serif"}}>Cancel</button>
              {pendingVaxCharge.priceItem&&(
                <button onClick={function(){
                  var av=pendingVaxCharge.activeVisit;
                  var price=pendingVaxCharge.priceItem.price;
                  var newItem={label:pendingVaxCharge.priceItem.label,amount:price};
                  var currentAv=(visitsByPet[activePetId]||[]).find(function(v){return v.id===av.id;})||av;
                  var updated=Object.assign({},currentAv,{charges:(currentAv.charges||0)+price,balance:(currentAv.balance||0)+price,chargeItems:(currentAv.chargeItems||[]).concat([newItem])});
                  handleVisitSaved(activePetId,updated);
                  setPendingVaxCharge(null);
                  setExportToast("\u20AA"+price+" added to visit "+av.id);
                }} style={{padding:"8px 18px",background:C.acc,color:C.wh,border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"Outfit,sans-serif"}}>{"+ Add ₪"}{pendingVaxCharge.priceItem.price}</button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Vaccine → Billing: no-visit modal */}
      {pendingVaxCharge&&!pendingVaxCharge.activeVisit&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1300}}>
          <div style={{background:C.wh,borderRadius:16,width:380,boxShadow:"0 24px 64px rgba(0,0,0,0.22)",overflow:"hidden"}}>
            <div style={{background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",padding:"20px 24px",display:"flex",alignItems:"center",gap:14}}>
              <span style={{fontSize:28}}>💉</span>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:"#1E293B",fontFamily:"Sora,sans-serif"}}>Vaccine recorded — no active visit</div>
                <div style={{fontSize:13,color:"#475569",fontFamily:"Outfit,sans-serif",marginTop:2}}>{pendingVaxCharge.vaxName} was recorded but there is no open visit today</div>
              </div>
            </div>
            <div style={{padding:"20px 24px"}}>
              {pendingVaxCharge.priceItem&&(
                <div style={{background:C.off,borderRadius:8,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:13,color:C.t2}}>{pendingVaxCharge.priceItem.label}</span>
                  <span style={{fontSize:15,fontWeight:700,color:C.tx,fontFamily:"DM Mono,monospace"}}>₪{pendingVaxCharge.priceItem.price}</span>
                </div>
              )}
              <div style={{fontSize:13,color:C.t2,marginBottom:20,lineHeight:1.6}}>To add this charge to a visit, open a new visit now. The charge will be added automatically.</div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={function(){setPendingVaxCharge(null);}} style={{flex:1,padding:"10px",background:C.off,color:C.t2,border:"1px solid "+C.br,borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Dismiss</button>
                <button onClick={function(){
                  if(pendingVaxCharge&&pendingVaxCharge.priceItem){
                    setNvpPreload({vaxGiven:[pendingVaxCharge.vaxName],chargeItems:[{label:pendingVaxCharge.priceItem.label,amount:pendingVaxCharge.priceItem.price}]});
                  }
                  setPendingVaxCharge(null);
                  setActiveTab("visits");
                  setTriggerNew(function(n){return n+1;});
                }} style={{flex:2,padding:"10px",background:C.am,color:C.wh,border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>{"Open Visit → auto-add charge"}</button>
              </div>
            </div>
          </div>
        </div>
      )}


      {/* NVP unsaved-changes guard: blocks tab switches */}
      {pendingTab&&(
        <div style={{position:"fixed",inset:0,background:"rgba(13,31,53,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3100}}>
          <div style={{background:C.wh,borderRadius:16,padding:"26px 24px",width:320,boxShadow:"0 16px 48px rgba(0,0,0,0.22)"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.sb,fontFamily:"Sora,sans-serif",marginBottom:6}}>Unsaved visit</div>
            <div style={{fontSize:13,color:C.t2,marginBottom:20}}>You have unsaved changes in the current visit. Leave without saving?</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={function(){setPendingTab(null);}} style={{flex:1,padding:"10px",background:C.off,color:C.t2,border:"1px solid "+C.br,borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Keep Editing</button>
              <button onClick={function(){setActiveTab(pendingTab.tabId);if(pendingTab.extra&&pendingTab.extra.clearSent)setNewSentCount(0);setPendingTab(null);}} style={{flex:1,padding:"10px",background:C.er,color:C.wh,border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>Leave</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

class AppErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,i){console.error("VETS crash:",e,i);}
  render(){
    if(this.state.err){
      return(
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16,background:"#F4F6F9",fontFamily:"Outfit,sans-serif"}}>
          <div style={{fontSize:48}}>🩺</div>
          <div style={{fontSize:20,fontWeight:700,color:"#0F172A",fontFamily:"Sora,sans-serif"}}>Something went wrong</div>
          <div style={{fontSize:13,color:"#475569",maxWidth:380,textAlign:"center",lineHeight:1.6,padding:"0 24px"}}>
            {this.state.err.message||"An unexpected error occurred. The issue has been logged."}
          </div>
          <button onClick={function(){window.location.reload();}}
            style={{marginTop:8,padding:"10px 24px",background:"#2563A8",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>
            ↺ Reload
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<AppErrorBoundary><App/></AppErrorBoundary>);
</script>
</body>
</html>
