function calcAge(dob){
  const d=new Date(dob),now=new Date();
  let y=now.getFullYear()-d.getFullYear();
  const m=now.getMonth()-d.getMonth();
  if(m<0||(m===0&&now.getDate()<d.getDate()))y--;
  if(y<1){const mo=((now.getFullYear()-d.getFullYear())*12)+now.getMonth()-d.getMonth();return mo+" mo";}
  return y===1?"1 yr":y+" yrs";
}

function VaxBadge({status}){
  const s=VAX_STATUS[status]||VAX_STATUS.ok;
  return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:700,background:s.bg,color:s.tx,fontFamily:"Outfit,sans-serif",flexShrink:0,whiteSpace:"nowrap"}}>{s.label}</span>;
}

function computeStatus(due){
  if(!due||due==="—")return "ok";
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(due);d.setHours(0,0,0,0);
  const diff=(d-today)/(1000*60*60*24);
  if(diff<0)return "overdue";
  if(diff<=30)return "due_soon";
  return "ok";
}

function VaxCard({v,isOpen,onToggle,showStatus}){
  const st=computeStatus(v.due);
  const borderCol=isOpen?C.acc:showStatus&&st==="overdue"?"#F87171":showStatus&&(st==="due_soon"||st==="upcoming")?"#FBBF24":C.br;
  const bgCol=isOpen?"#EFF6FF":showStatus&&st==="overdue"?"#FEF2F2":showStatus&&(st==="due_soon"||st==="upcoming")?"#FFFBEB":C.wh;
  const leftAccent=!isOpen&&showStatus&&st==="overdue"?"inset 4px 0 0 "+C.er:!isOpen&&showStatus&&(st==="due_soon"||st==="upcoming")?"inset 4px 0 0 "+C.am:"none";
  return(
    <div onClick={onToggle} style={{borderRadius:12,border:"1.5px solid "+borderCol,background:bgCol,cursor:"pointer",padding:14,transition:"border-color 0.15s",boxShadow:leftAccent}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,gap:6}}>
        <span style={{fontSize:13,fontWeight:700,color:C.tx,fontFamily:"Sora,sans-serif",lineHeight:1.3,flex:1}}>{v.name}</span>
        {showStatus&&<VaxBadge status={st}/>}
      </div>
      <div style={{fontSize:11,color:C.t3,fontFamily:"Outfit,sans-serif",marginBottom:6}}>{v.protocol}</div>
      <div style={{display:"flex",flexDirection:"column",gap:3}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
          <span style={{color:C.t3,fontFamily:"Outfit,sans-serif"}}>Last:</span>
          <span style={{fontFamily:"DM Mono,monospace",color:C.t2}}>{v.last||"—"}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
          <span style={{color:C.t3,fontFamily:"Outfit,sans-serif"}}>Next:</span>
          <span style={{fontFamily:"DM Mono,monospace",color:showStatus&&st==="overdue"?C.er:showStatus&&st==="due_soon"?C.am:C.t2,fontWeight:showStatus&&st==="overdue"?700:400}}>{v.due}</span>
        </div>
      </div>
      <div style={{marginTop:8,fontSize:11,color:isOpen?C.acc:C.t3,textAlign:"center",fontFamily:"Outfit,sans-serif"}}>{isOpen?"▲ Hide history":"▼ Show history"}</div>
    </div>
  );
}

function VaxGrid({vaccines,ctx,expanded,setExpanded,showStatus}){
  var pairs=[];
  for(var pi=0;pi<vaccines.length;pi+=2){pairs.push(vaccines.slice(pi,pi+2));}
  return(
    <div>
      {pairs.map(function(pair,pairIdx){
        var selInPair=pair.find(function(v){return v.name===expanded;});
        var selPosInPair=pair.findIndex(function(v){return v.name===expanded;});
        var isRight=selPosInPair===1;
        return(
          <div key={pairIdx}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:selInPair?10:10}}>
              {pair.map(function(v){
                return(<VaxCard key={v.name} v={v} isOpen={expanded===v.name} onToggle={function(e){e.stopPropagation();setExpanded(expanded===v.name?null:v.name);}} showStatus={showStatus}/>);
              })}
              {pair.length===1&&<div/>}
            </div>
            {selInPair&&<VaxHistoryPanel selVax={selInPair} isRight={isRight} ctx={ctx} expanded={expanded} setExpanded={setExpanded}/>}
          </div>
        );
      })}
    </div>
  );
}

function VaccinesTab({pet,onVaxGiven}){
  const [vaxList,setVaxList]=useState(function(){
    return pet.vaccines.map(function(v){return {name:v.name,due:v.due,last:v.last,status:v.status,protocol:v.protocol,history:v.history?[...v.history]:(v.last?[v.last]:[]),core:v.core||false,isTreatment:v.isTreatment||false};});
  });
  const [expanded,setExpanded]=useState(null);
  const [editing,setEditing]=useState(null);
  const [editVal,setEditVal]=useState("");
  const [addingTo,setAddingTo]=useState(null);
  const [addVal,setAddVal]=useState("");
  const [deleteConfirm,setDeleteConfirm]=useState(null);
  const [dupConfirm,setDupConfirm]=useState(null);
  const [showSendLog,setShowSendLog]=useState(false);
  const [showAddVax,setShowAddVax]=useState(false);
  const [showChangeTreatment,setShowChangeTreatment]=useState(false);
  const today=new Date().toISOString().slice(0,10);
  const FLEA_TICK_PRODUCTS=[
    {name:"Bravecto",protocol:"Every 3 mo",desc:"Chewable tablet"},
    {name:"NexGard",protocol:"Monthly",desc:"Chewable tablet"},
    {name:"NexGard Plus",protocol:"Monthly",desc:"Chewable + heartworm"},
    {name:"Frontline Plus",protocol:"Monthly",desc:"Topical spot-on"},
    {name:"Seresto Collar",protocol:"Every 8 mo",desc:"Long-acting collar"},
    {name:"Revolution Plus",protocol:"Monthly",desc:"Topical + heartworm"},
    {name:"Simparica Trio",protocol:"Monthly",desc:"Chewable + heartworm"},
  ];

  function updateVax(name,fn){setVaxList(function(list){return list.map(function(v){return v.name===name?fn(v):v;});});}
  function _commitAdd(vaxName,dateVal){
    updateVax(vaxName,function(v){const h=[...v.history,dateVal].sort();return Object.assign({},v,{history:h,last:h[h.length-1]});});
    setAddingTo(null);setAddVal("");
    if(onVaxGiven)onVaxGiven(vaxName);
  }
  function doAdd(vaxName){
    if(!addVal)return;
    var cur=vaxList.find(function(v){return v.name===vaxName;});
    if(cur&&cur.history.indexOf(addVal)>-1){setDupConfirm({vaxName:vaxName,date:addVal});return;}
    _commitAdd(vaxName,addVal);
  }
  function doEdit(vaxName,idx){
    if(!editVal)return;
    updateVax(vaxName,function(v){const h=[...v.history];h[idx]=editVal;h.sort();return Object.assign({},v,{history:h,last:h[h.length-1]});});
    setEditing(null);setEditVal("");
  }
  function doDelete(vaxName,idx){
    updateVax(vaxName,function(v){const h=v.history.filter(function(_,i){return i!==idx;});return Object.assign({},v,{history:h,last:h.length?h[h.length-1]:null});});
    setDeleteConfirm(null);
  }
  function handleAddVax(d){
    const nv={name:d.name,due:"—",last:d.date,status:"ok",protocol:d.protocol,history:[d.date],core:d.isCore,isTreatment:false};
    setVaxList(function(list){return list.concat([nv]);});
    if(onVaxGiven)onVaxGiven(d.name);
  }

  const coreVax=vaxList.filter(function(v){return v.core&&!v.isTreatment;});
  const occVax=vaxList.filter(function(v){return !v.core&&!v.isTreatment;});
  const treatments=vaxList.filter(function(v){return v.isTreatment;});
  const overdueCount=coreVax.filter(function(v){return computeStatus(v.due)==="overdue";}).length;
  const ctx={editing,editVal,setEditing,setEditVal,addingTo,addVal,setAddingTo,setAddVal,setDeleteConfirm,doEdit,doAdd,today};

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"10px 16px",borderBottom:"1px solid "+C.br,background:C.wh,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div>{overdueCount>0&&<span style={{fontSize:13,fontWeight:700,color:C.er,fontFamily:"Outfit,sans-serif"}}>⚠️ {overdueCount} vaccine{overdueCount>1?"s":""} overdue for {pet.name}</span>}</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={function(){setShowAddVax(true);}} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",background:C.acc,color:C.wh,border:"none",borderRadius:8,fontSize:12,fontWeight:700,fontFamily:"Outfit,sans-serif",cursor:"pointer"}}>+ Add Vaccine</button>
          <button onClick={function(){setShowSendLog(true);}} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",background:C.off,color:C.acc,border:"1px solid "+C.br,borderRadius:8,fontSize:12,fontWeight:600,fontFamily:"Outfit,sans-serif",cursor:"pointer"}}>📤 Send Log</button>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px",background:"#E8EDF4"}}>
        {coreVax.length>0&&(
          <div style={{marginBottom:0,paddingBottom:20,borderBottom:"1px solid "+C.br}}>
            <div style={{fontSize:11,fontWeight:700,color:C.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10,fontFamily:"Outfit,sans-serif"}}>Core Vaccines</div>
            <VaxGrid vaccines={coreVax} ctx={ctx} expanded={expanded} setExpanded={setExpanded} showStatus={true}/>
          </div>
        )}
        {/* Flea & Tick Prevention */}
        <div style={{marginTop:20,marginBottom:0,paddingBottom:20,borderBottom:"1px solid "+C.br}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:C.t3,letterSpacing:"0.08em",textTransform:"uppercase"}}>Flea & Tick Prevention</div>
            <button onClick={function(){setShowChangeTreatment(true);}} style={{fontSize:12,fontWeight:700,color:C.wh,background:C.acc,border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontFamily:"Outfit,sans-serif",boxShadow:"0 1px 4px rgba(37,99,168,0.25)"}}>{treatments.length>0?"⇄ Switch / Add Treatment":"+ Add Treatment"}</button>
          </div>
          {treatments.length===0&&<div style={{fontSize:13,color:C.t3,fontStyle:"italic"}}>No prevention treatment recorded.</div>}
          {treatments.length>0&&<VaxGrid vaccines={treatments} ctx={ctx} expanded={expanded} setExpanded={setExpanded} showStatus={true}/>}
        </div>
        {occVax.length>0&&(
          <div style={{marginTop:20,marginBottom:0,paddingBottom:20,borderBottom:"1px solid "+C.br}}>
            <div style={{fontSize:11,fontWeight:700,color:C.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:10,fontFamily:"Outfit,sans-serif"}}>Occasional</div>
            <VaxGrid vaccines={occVax} ctx={ctx} expanded={expanded} setExpanded={setExpanded} showStatus={true}/>
          </div>
        )}
        {pet.puppySeries&&pet.puppySeries.length>0&&(
          <div style={{marginBottom:22}}>
            <div style={{fontSize:11,fontWeight:700,color:C.t3,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8,fontFamily:"Outfit,sans-serif"}}>Puppy / Kitten Series</div>
            <PuppySection puppySeries={pet.puppySeries}/>
          </div>
        )}
      </div>
      {deleteConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1200}}>
          <div style={{background:C.wh,borderRadius:12,padding:24,width:320,boxShadow:"0 16px 48px rgba(0,0,0,0.18)"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.tx,fontFamily:"Sora,sans-serif",marginBottom:8}}>Delete vaccination date?</div>
            <div style={{fontSize:13,color:C.t2,fontFamily:"Outfit,sans-serif",marginBottom:20}}>Remove <strong style={{fontFamily:"DM Mono,monospace"}}>{fmt(deleteConfirm.date)}</strong> from {deleteConfirm.name}?</div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={function(){setDeleteConfirm(null);}} style={{padding:"7px 16px",background:C.off,color:C.t2,border:"1px solid "+C.br,borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={function(){doDelete(deleteConfirm.name,deleteConfirm.idx);}} style={{padding:"7px 16px",background:C.er,color:C.wh,border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Delete</button>
            </div>
          </div>
        </div>
      )}
      {dupConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1200}}>
          <div style={{background:C.wh,borderRadius:12,padding:24,width:340,boxShadow:"0 16px 48px rgba(0,0,0,0.18)"}}>
            <div style={{fontSize:15,fontWeight:700,color:C.am,fontFamily:"Sora,sans-serif",marginBottom:8}}>⚠ Already recorded on this date</div>
            <div style={{fontSize:13,color:C.t2,marginBottom:20}}><strong style={{color:C.tx}}>{dupConfirm.vaxName}</strong> already has a record for <strong style={{fontFamily:"DM Mono,monospace"}}>{fmt(dupConfirm.date)}</strong>. Add again?</div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={function(){setDupConfirm(null);}} style={{padding:"7px 16px",background:C.off,color:C.t2,border:"1px solid "+C.br,borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={function(){_commitAdd(dupConfirm.vaxName,dupConfirm.date);setDupConfirm(null);}} style={{padding:"7px 16px",background:C.am,color:C.wh,border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Continue anyway</button>
            </div>
          </div>
        </div>
      )}
      {showSendLog&&<SendLogModal vaxList={vaxList} ownerEmail={CLIENT.email} onClose={function(){setShowSendLog(false);}}/>}
      {showAddVax&&<AddVaxModal onSave={handleAddVax} onClose={function(){setShowAddVax(false);}}/>}
      {showChangeTreatment&&(

          <div style={{background:C.wh,borderRadius:16,padding:"24px 28px",width:400,boxShadow:"0 20px 60px rgba(0,0,0,0.22)",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>

            </div>
            <div style={{fontSize:12,color:C.t2,marginBottom:14}}>Select a product to add or switch to:</div>

                        setVaxList(function(list){return list.concat([nv]);});

                      setShowChangeTreatment(false);

                    style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",marginBottom:6,borderRadius:8,border:"1.5px solid "+(isCurrent?C.acc:C.br),background:isCurrent?"#EFF6FF":C.wh,cursor:isCurrent?"default":"pointer",transition:"background 0.15s"}}

                      <div style={{fontSize:11,color:C.t2,marginTop:2}}>{prod.desc} {"·"} {prod.protocol}</div>

                  </div>
                );
              })}

<!-- ═══ SCRIPT 3 · VitalsTab (SVG chart) · LabsTab (category filter) ═══ -->
<script type="text/babel">
function MiniChart({title,dataPoints,color,hideDots}){
  if(dataPoints.length<1)return null;
  const W=380,H=62,PL=36,PR=10,PT=6,PB=16;
  const vals=dataPoints.map(function(d){return d.value;});
  const minV=Math.min.apply(null,vals);
  const maxV=Math.max.apply(null,vals);
  const range=maxV-minV||0.01;
  const n=dataPoints.length;
  const pts=dataPoints.map(function(d,i){
    const x=PL+(n<2?(W-PL-PR)/2:i*(W-PL-PR)/(n-1));
    const y=PT+(1-(d.value-minV)/range)*(H-PT-PB);
    return {x:x,y:y,date:d.date,value:d.value};
  });
  const polyline=pts.map(function(p){return p.x+","+p.y;}).join(" ");
  const yLabels=[minV,minV+range*0.5,maxV];
  return(
    <div style={{marginBottom:8}}>
      <div style={{fontSize:12,fontWeight:700,color:C.t2,marginBottom:6,fontFamily:"Outfit,sans-serif"}}>{title}</div>
      <svg width="100%" viewBox={"0 0 "+W+" "+H} style={{overflow:"visible",display:"block"}}>
        {yLabels.map(function(val,i){
          const y=PT+(1-(val-minV)/range)*(H-PT-PB);
          return(
            <g key={i}>
              <line x1={PL} y1={y} x2={W-PR} y2={y} stroke={C.br} strokeWidth={1}/>
              <text x={PL-4} y={y+4} textAnchor="end" fontSize={9} fill={C.t3} fontFamily="DM Mono,monospace">{val.toFixed(1)}</text>
            </g>
          );
        })}
        {n>1&&<polyline points={polyline} fill="none" stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>}
        {!hideDots&&pts.map(function(p,i){
          return(
            <g key={i}>
              <circle cx={p.x} cy={p.y} r={3} fill={color} stroke={C.wh} strokeWidth={1.5}/>
              <text x={p.x} y={H} textAnchor="middle" fontSize={9} fill={C.t3} fontFamily="DM Mono,monospace">{p.date.slice(5)}</text>
            </g>
          );
        })}
        {hideDots&&pts.length>0&&(
          <text x={pts[pts.length-1].x} y={H} textAnchor="middle" fontSize={9} fill={C.t3} fontFamily="DM Mono,monospace">{pts[pts.length-1].date.slice(5)}</text>
        )}
      </svg>
    </div>
  );
}

const VITAL_RANGES=[
  {id:"3m",label:"3M",months:3},
  {id:"6m",label:"6M",months:6},
  {id:"1y",label:"1Y",months:12},
  {id:"all",label:"All",months:null},
];

function VitalsTab({pet}){
  const [range,setRange]=useState("1y");
  const allVitals=pet.visits.filter(function(v){return v.vitals;}).map(function(v){return {date:v.date,weight:v.vitals.weight,temp:v.vitals.temp};}).sort(function(a,b){return a.date.localeCompare(b.date);});

  const cutoff=VITAL_RANGES.find(function(r){return r.id===range;}).months;
  const now=new Date();
  function inRange(dateStr){
    if(!cutoff)return true;
    return (now-new Date(dateStr))<=cutoff*30*24*60*60*1000;
  }

  const vitalsData=allVitals.filter(function(d){return inRange(d.date);});
  const weightData=vitalsData.filter(function(d){return d.weight;}).map(function(d){return {date:d.date,value:d.weight};});
  const tempData=vitalsData.filter(function(d){return d.temp;}).map(function(d){return {date:d.date,value:d.temp};});

  // Always use full data for the stat cards (current values)
  const allWeight=allVitals.filter(function(d){return d.weight;}).map(function(d){return {date:d.date,value:d.weight};});
  const allTemp=allVitals.filter(function(d){return d.temp;}).map(function(d){return {date:d.date,value:d.temp};});

  let weightAlert=null;
  if(allWeight.length>=2){
    const last=allWeight[allWeight.length-1].value;
    const prev=allWeight[allWeight.length-2].value;
    const pct=Math.abs((last-prev)/prev*100);
    if(pct>=10)weightAlert={pct:pct.toFixed(0),dir:last>prev?"gain":"loss"};
  }

  const noData=weightData.length===0&&tempData.length===0;
  const hideDots=weightData.length>10||tempData.length>10;

  return(
    <div style={{padding:"16px 20px",overflowY:"auto",height:"100%",background:"#E8EDF4"}}>
      {weightAlert&&(
        <div style={{background:"#EFF6FF",border:"1px solid #BAE6FD",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:13,color:"#1D4ED8",fontFamily:"Outfit,sans-serif",fontWeight:500}}>
          ⚠️ Significant weight {weightAlert.dir} of {weightAlert.pct}% detected since last visit
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        {[
          {label:"Current Weight",val:allWeight.length?allWeight[allWeight.length-1].value+" kg":"—",color:C.acc},
          {label:"Last Temp",val:allTemp.length?allTemp[allTemp.length-1].value+"°C":"—",color:"#E97B2E"},
        ].map(function(item){
          return(
            <div key={item.label} style={{background:C.wh,border:"none",borderRadius:12,padding:"12px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{fontSize:11,color:C.t3,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,fontFamily:"Outfit,sans-serif"}}>{item.label}</div>
              <div style={{fontSize:22,fontWeight:700,color:item.color,fontFamily:"Sora,sans-serif"}}>{item.val}</div>
            </div>
          );
        })}
      </div>
      {allWeight.length>1&&(
        <div style={{background:C.wh,border:"none",borderRadius:12,padding:"12px 14px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10,fontFamily:"Outfit,sans-serif"}}>Weight Trend — Last {Math.min(allWeight.length,5)} visits</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {allWeight.slice(-5).map(function(d,i,arr){
              var delta=i>0?+(d.value-arr[i-1].value).toFixed(1):null;
              var isLast=i===arr.length-1;
              var arrowColor=delta===null?C.t3:delta>0?C.am:delta<0?C.gn:C.t3;
              var arrow=delta===null?"—":delta>0?"↑":delta<0?"↓":"→";
              return(
                <div key={d.date} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 8px",borderRadius:8,background:isLast?"#EFF6FF":C.off}}>
                  <span style={{fontSize:10,color:C.t3,fontFamily:"DM Mono,monospace",width:52,flexShrink:0}}>{d.date.slice(0,7)}</span>

function LabsTab({pet}){
  const [cat,setCat]=useState("all");
  const [sel,setSel]=useState(pet.labs[0]?pet.labs[0].id:null);
  const [timeRange,setTimeRange]=useState("all");
  const [yearFilter,setYearFilter]=useState("all");
  const [labToast,setLabToast]=useState(null);

  const allYears=Array.from(new Set(pet.labs.map(function(l){return l.date.slice(0,4);}))).sort(function(a,b){return b-a;});

  const byCat=cat==="all"?pet.labs:pet.labs.filter(function(l){return l.category===cat;});
  const now=new Date();
  const rangeCutoff=LAB_RANGES.find(function(r){return r.id===timeRange;}).months;
  const byTime=rangeCutoff?byCat.filter(function(l){return (now-new Date(l.date))<=rangeCutoff*30*24*60*60*1000;}):byCat;
  const filtered=yearFilter==="all"?byTime:byTime.filter(function(l){return l.date.slice(0,4)===yearFilter;});

  const grouped=filtered.reduce(function(acc,l){var yr=l.date.slice(0,4);if(!acc[yr])acc[yr]=[];acc[yr].push(l);return acc;},{});
  const years=Object.keys(grouped).sort(function(a,b){return b-a;});
  const [openYears,setOpenYears]=useState(function(){return allYears.length?[allYears[0]]:[];});

  function toggleYear(yr){setOpenYears(function(prev){return prev.includes(yr)?prev.filter(function(y){return y!==yr;}):[].concat(prev,[yr]);});}

  const selPanel=pet.labs.find(function(l){return l.id===sel;})||null;

  if(!pet.labs.length){
    return <div style={{height:"100%",position:"relative"}}><EmptyState icon="🧪" title="No lab results on file" sub="Lab results will appear here once ordered and uploaded." action="Request Labs" onAction={function(){setLabToast("Lab request sent");}}/>{labToast&&<Toast msg={labToast} onHide={function(){setLabToast(null);}}/>}</div>;
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      {}
      <div style={{padding:"8px 12px",borderBottom:"1px solid "+C.br,display:"flex",gap:6,overflowX:"auto",flexShrink:0,alignItems:"center",background:C.wh}}>
        {LAB_CATS.map(function(c){
          var hasItems=c.id==="all"||pet.labs.some(function(l){return l.category===c.id;});
          if(!hasItems&&c.id!=="all")return null;
          var active=cat===c.id;
          return(
            <button key={c.id} onClick={function(){setCat(c.id);setSel(null);}} style={{padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:600,background:active?C.acc:C.off,color:active?C.wh:C.t2,border:"1px solid "+(active?C.acc:C.br),flexShrink:0,whiteSpace:"nowrap"}}>
              {c.icon} {c.label}
            </button>
          );
        })}
      </div>
      {}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {}
        <div style={{width:238,borderRight:"1px solid "+C.br,display:"flex",flexDirection:"column",overflow:"hidden",background:"#E8EDF4",flexShrink:0}}>
          {}
          <div style={{padding:"8px 10px",borderBottom:"1px solid "+C.br,flexShrink:0,background:C.wh}}>
            <div style={{display:"flex",gap:4,marginBottom:6}}>
              {LAB_RANGES.map(function(r){
                var active=timeRange===r.id;
                return(
                  <button key={r.id} onClick={function(){setTimeRange(r.id);}} style={{flex:1,padding:"4px 0",borderRadius:8,fontSize:11,fontWeight:600,background:active?C.acc:C.off,color:active?C.wh:C.t2,border:"1px solid "+(active?C.acc:C.br)}}>
                    {r.label}
                  </button>
                );
              })}
            </div>
            <select value={yearFilter} onChange={function(e){setYearFilter(e.target.value);}} style={{width:"100%",padding:"5px 8px",borderRadius:8,fontSize:12,color:C.t2,border:"1px solid "+C.br,background:C.wh}}>
              <option value="all">All Years</option>
              {allYears.map(function(y){return <option key={y} value={y}>{y}</option>;})}
            </select>
          </div>
          {}
          <div style={{flex:1,overflowY:"auto",padding:"8px 8px"}}>
            {filtered.length===0&&(
            <div style={{padding:"18px 10px",textAlign:"center"}}>
              <div style={{fontSize:22,marginBottom:8}}>🔍</div>
              <div style={{fontSize:12,fontWeight:600,color:C.t2,marginBottom:4}}>No labs match filters</div>
              <div style={{fontSize:11,color:C.t3,marginBottom:12,lineHeight:1.5}}>Try widening the time range or changing the category</div>
              <button onClick={function(){setCat("all");setTimeRange("all");setYearFilter("all");}} style={{fontSize:11,fontWeight:700,color:C.acc,background:C.wh,border:"1px solid "+C.acc,borderRadius:8,padding:"5px 12px"}}>Reset Filters</button>
            </div>
          )}
            {years.map(function(yr){
              var isOpen=openYears.includes(yr);
              var items=grouped[yr];
              var multiYear=years.length>1;
              return(
                <div key={yr} style={{marginBottom:4}}>
                  {multiYear&&(
                    <div onClick={function(){toggleYear(yr);}} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 6px",borderRadius:8,cursor:"pointer",userSelect:"none",marginBottom:isOpen?3:0}}>
                      <span style={{fontSize:10,color:C.t3,display:"inline-block",transition:"transform 0.15s ease-out",transform:isOpen?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
                      <span style={{fontSize:11,fontWeight:700,color:C.t2,fontFamily:"DM Mono,monospace"}}>{yr}</span>
                      <span style={{fontSize:10,color:C.t3}}>({items.length})</span>
                    </div>
                  )}
                  {(isOpen||!multiYear)&&(
                    <div style={{display:"flex",flexDirection:"column",gap:3}}>
                      {items.map(function(l){
                        var active=sel===l.id;
                        return(
                          <div key={l.id} onClick={function(){setSel(l.id);}} style={{padding:"8px 10px",borderRadius:8,cursor:"pointer",background:active?C.acc:C.wh,border:"none",boxShadow:active?"none":"0 1px 3px rgba(0,0,0,0.07)",transition:"all 0.15s"}}>
                            <div style={{fontSize:12,fontWeight:600,color:active?C.wh:C.tx,marginBottom:2,lineHeight:1.3}}>{l.panel}</div>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                              <span style={{fontSize:10,fontFamily:"DM Mono,monospace",color:active?"rgba(255,255,255,0.6)":C.t3}}>{fmt(l.date)}</span>
                              {l.category==="xray"&&<span style={{fontSize:11,opacity:active?0.75:0.5}}>🦴</span>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
        {}
        <div style={{flex:1,overflowY:"auto",background:"#E8EDF4"}}>
          {!selPanel&&(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%"}}>
              <EmptyState icon="🧪" title="Select a panel" sub="Choose a lab panel from the list to view results."/>
            </div>
          )}
          {selPanel&&(
            <div style={{padding:16}}>
              <div style={{background:C.wh,borderRadius:12,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:15,fontWeight:700,color:C.tx,fontFamily:"Sora,sans-serif"}}>{selPanel.panel}</div>
                <div style={{fontSize:12,color:C.t3,marginTop:2}}>{fmt(selPanel.date)} · {selPanel.orderedBy}</div>
              </div>
              {selPanel.category==="xray"&&<XRayViewer panel={selPanel}/>}
              {selPanel.items&&selPanel.items.length>0&&(
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{background:C.off}}>
                      {["Test","Result","Unit","Reference","Status"].map(function(h){return <th key={h} style={{padding:"8px 10px",textAlign:"left",fontSize:11,fontWeight:700,color:C.t3,letterSpacing:"0.06em",textTransform:"uppercase",borderBottom:"1px solid "+C.br}}>{h}</th>;})}
                    </tr>
                  </thead>
                  <tbody>
                    {selPanel.items.map(function(item,i){return(
                      <tr key={item.name} style={{background:i%2===0?C.wh:"#FAFBFC"}}>
                        <td style={{padding:"8px 10px",fontWeight:500,color:C.tx,borderBottom:"1px solid "+C.br}}>{item.name}</td>
                        <td style={{padding:"8px 10px",fontFamily:"DM Mono,monospace",fontWeight:600,color:item.status==="normal"?C.tx:(item.status==="elevated"||item.status==="abnormal"?C.er:C.acc),borderBottom:"1px solid "+C.br}}>{item.value}</td>
                        <td style={{padding:"8px 10px",color:C.t3,fontFamily:"DM Mono,monospace",fontSize:12,borderBottom:"1px solid "+C.br}}>{item.unit}</td>
                        <td style={{padding:"8px 10px",color:C.t2,fontFamily:"DM Mono,monospace",fontSize:12,borderBottom:"1px solid "+C.br}}>{item.range}</td>
                        <td style={{padding:"8px 10px",borderBottom:"1px solid "+C.br}}><StatusBadge status={item.status}/></td>
                      </tr>
                    );})}
                  </tbody>
                </table>
              )}
              </div>
            </div>
          )}
        </div>
      </div>
      {labToast&&<Toast msg={labToast} onHide={function(){setLabToast(null);}}/>}
    </div>
  );
}</script>

<script type="text/babel">
function PaymentWizard({visit,petName,petIcon,onClose,onDone,staff,onSendReceipt}){
  const [done,setDone]=useState(false);
  const [receiptToast,setReceiptToast]=useState(null);
  const [meth,setMeth]=useState("");
  const [cash,setCash]=useState("");
  const [ref,setRef]=useState("");
  const [meta]=useState(function(){var n=new Date();return{ref:"REF-"+Math.floor(10000+Math.random()*90000),date:n.toLocaleDateString("en-GB")+" "+n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0")};});
  const [processing,setProcessing]=useState(false);
  const [procStep,setProcStep]=useState(0);
  const TERM_STEPS=["Connecting to terminal...","Authorising card...","Processing payment...","Transaction approved"];
  const total=visit.balance||visit.charges||0;
  const cashN=parseFloat(cash)||0;
  const chg=meth==="cash"&&cashN>=total&&cash?cashN-total:null;
  const canConfirm=meth&&(meth!=="cash"||cashN>=total);
  const METHS=[
    {id:"cash",sym:"$",label:"Cash",sub:"Physical payment"},
    {id:"credit",sym:"▭",label:"Credit Card",sub:"Manual Entry"},
    {id:"bank",sym:"⇄",label:"Other",sub:"Bank Transfer / Check"},
    {id:"tap",sym:"◎",label:"Tap / Chip",sub:"Use Payment Terminal"},
  ];
  const methObj=METHS.find(function(m){return m.id===meth;})||{label:""};
  const OL={position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(15,23,42,0.6)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:24};
  const BOX={background:C.wh,borderRadius:16,width:"100%",maxWidth:620,boxShadow:"0 28px 80px rgba(0,0,0,0.28)",maxHeight:"93vh",overflowY:"auto"};
  const STEPS=["Link sent","Payment received","Marked in system","Invoice Sent"];
  useEffect(function(){if(!processing||done)return;if(procStep>=TERM_STEPS.length-1){const t=setTimeout(function(){setDone(true);setProcessing(false);},900);return function(){clearTimeout(t);};}const t=setTimeout(function(){setProcStep(function(s){return s+1;});},1200);return function(){clearTimeout(t);};},[processing,procStep,done]);
  if(done){
    return(
      <div style={OL}>
        <div style={Object.assign({},BOX,{maxWidth:560})}>
          <div style={{padding:"20px 28px",borderBottom:"1px solid "+C.br}}>
            <div style={{fontSize:17,fontWeight:700,color:C.tx,fontFamily:"Sora,sans-serif"}}>Payment Confirmation</div>
          </div>
          <div style={{padding:"28px 32px"}}>
            <div style={{background:C.off,borderRadius:16,padding:"26px 24px",marginBottom:20}}>
              <div style={{textAlign:"center",marginBottom:22}}>
                <div style={{fontSize:20,fontWeight:800,color:C.tx,fontFamily:"Sora,sans-serif",marginBottom:5}}>Payment Confirmed!</div>
                <div style={{fontSize:13,color:C.t2}}>The payment of ₪{total.toFixed(2)} has been completed successfully.</div>
              </div>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"center",gap:0,marginBottom:22}}>
                {STEPS.map(function(s,i){return(
                  <React.Fragment key={s}>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,minWidth:72}}>
                      <div style={{width:34,height:34,borderRadius:"50%",border:"2px solid "+C.acc,display:"flex",alignItems:"center",justifyContent:"center",color:C.acc,fontSize:14,fontWeight:700,background:C.wh}}>✓</div>
                      <div style={{fontSize:10,color:C.t2,textAlign:"center",maxWidth:68,lineHeight:1.35,fontWeight:500}}>{s}</div>
                    </div>
                    {i<STEPS.length-1&&<div style={{width:28,height:2,background:C.br,flexShrink:0,marginTop:16}}/>}
                  </React.Fragment>
                );})}
              </div>
              <div style={{background:C.wh,border:"1px solid "+C.br,borderRadius:12,padding:"14px 18px"}}>
                <div style={{fontSize:13,fontWeight:700,color:C.tx,marginBottom:10}}>Details</div>
                <div style={{fontSize:13,color:C.t2,marginBottom:8}}>{petIcon} {petName}</div>
                {[["Amount Paid","₪"+total.toFixed(2)],["Payment method",methObj.label],["Date and time",meta.date],["Staff",staff?staff.name:STAFF[0].name],["Reference number",meta.ref]].map(function(row){return(
                  <div key={row[0]} style={{display:"flex",gap:8,fontSize:12,color:C.t2,marginBottom:3,lineHeight:1.5}}>
                    <span style={{minWidth:126,flexShrink:0}}>{row[0]}:</span>
                    <span style={{fontWeight:600,color:C.tx}}>{row[1]}</span>
                  </div>
                );})}
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <button onClick={function(){window.print();}} style={{flex:1,padding:"10px 6px",background:C.wh,color:C.tx,border:"1px solid "+C.br,borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer"}}>Print receipt</button>
              <button onClick={function(){setReceiptToast("Receipt downloaded");}} style={{flex:1,padding:"10px 6px",background:C.wh,color:C.tx,border:"1px solid "+C.br,borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer"}}>Download receipt</button>
              <button onClick={function(){if(onSendReceipt)onSendReceipt();else setReceiptToast("Receipt sent to client");}} style={{flex:1,padding:"10px 6px",background:C.wh,color:C.acc,border:"1px solid "+C.acc,borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer"}}>Send receipt again</button>
            </div>
            {receiptToast&&<Toast msg={receiptToast} onHide={function(){setReceiptToast(null);}}/>}
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <button onClick={onDone} style={{padding:"11px 24px",background:C.sb,color:C.wh,border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>Client Discharged</button>
            </div>
          </div>
        </div>
      </div>
    );
  }
  if(processing){
    const pct=procStep/(TERM_STEPS.length-1)*100;
    return(
      <div style={OL}>
        <div style={Object.assign({},BOX,{maxWidth:480})}>
          <div style={{display:"flex",alignItems:"center",padding:"18px 28px",borderBottom:"1px solid "+C.br}}>
            <div>
              <div style={{fontSize:17,fontWeight:700,color:C.tx,fontFamily:"Sora,sans-serif"}}>Processing Payment</div>
              <div style={{fontSize:11,color:C.t3,fontFamily:"DM Mono,monospace",marginTop:3}}>{petIcon} {petName} · {"₪"}{total.toFixed(2)}</div>
            </div>
          </div>
          <div style={{margin:"20px 28px 0",background:C.sb,borderRadius:12,padding:"16px 20px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:14,fontWeight:600,color:C.wh}}>{TERM_STEPS[procStep]}</span>
              {procStep<TERM_STEPS.length-1&&<span style={{fontSize:11,color:"rgba(255,255,255,0.38)",fontFamily:"DM Mono,monospace"}}>{(TERM_STEPS.length-1-procStep)+" step"+(TERM_STEPS.length-2-procStep>0?"s":"")+" left"}</span>}
            </div>
            <div style={{position:"relative",height:8,background:"rgba(255,255,255,0.12)",borderRadius:4,overflow:"hidden"}}>
              {TERM_STEPS.map(function(_,i){return(<div key={i} style={{position:"absolute",top:"50%",left:i===0?"3px":i===TERM_STEPS.length-1?"calc(100% - 3px)":(i/(TERM_STEPS.length-1)*100)+"%",transform:"translateY(-50%)",width:6,height:6,borderRadius:"50%",background:procStep>i?"rgba(255,255,255,0.85)":procStep===i?"rgba(255,255,255,0.55)":"rgba(255,255,255,0.18)",zIndex:3}}/>);})}
              <div style={{position:"absolute",top:0,left:0,bottom:0,width:pct+"%",background:pct>60?"linear-gradient(90deg,"+C.acc+","+C.gn+")":pct>30?"linear-gradient(90deg,"+C.acc+","+C.cy+")":C.acc,borderRadius:4,transition:"width 0.5s ease"}}/>
            </div>
          </div>
          <div style={{margin:"16px 28px 24px"}}>
            {TERM_STEPS.map(function(s,i){return(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:i<TERM_STEPS.length-1?"1px solid "+C.br:"none"}}>
                <div style={{width:24,height:24,borderRadius:"50%",flexShrink:0,background:procStep>i?C.gn:procStep===i?C.acc:"#E2E7EF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:procStep>=i?C.wh:C.t3,fontWeight:700,transition:"background 0.3s"}}>{procStep>i?"\u2713":(i+1)}</div>
                <span style={{fontSize:13,fontWeight:procStep===i?600:400,color:procStep>=i?C.tx:C.t3,transition:"color 0.3s"}}>{s}</span>
                {procStep===i&&<div style={{width:7,height:7,borderRadius:"50%",background:C.acc,marginLeft:"auto",animation:"alertpulse 1s ease-in-out infinite"}}/>}
              </div>
            );})}
          </div>
        </div>
      </div>
    );
  }
  return(
    <div style={OL} onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div style={BOX}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 28px",borderBottom:"1px solid "+C.br}}>
          <div>
            <div style={{fontSize:17,fontWeight:700,color:C.tx,fontFamily:"Sora,sans-serif"}}>Collect Payment</div>
            <div style={{fontSize:11,color:C.t3,fontFamily:"DM Mono,monospace",marginTop:3}}>{petIcon} {petName} · {visit.id}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,color:C.t3,cursor:"pointer",lineHeight:1,padding:4}}>×</button>
        </div>
        <div style={{padding:"16px 28px",borderBottom:"1px solid "+C.br}}>
          <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Pricing info:</div>
          <div style={{border:"1px solid "+C.br,borderRadius:8,overflow:"hidden"}}>
            <div style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:C.off,borderBottom:"1px solid "+C.br}}>
              <span style={{fontSize:11,fontWeight:700,color:C.t3,letterSpacing:"0.05em",textTransform:"uppercase"}}>Service</span>
              <span style={{fontSize:11,fontWeight:700,color:C.t3,letterSpacing:"0.05em",textTransform:"uppercase"}}>Price</span>
            </div>
            {(visit.chargeItems||[]).map(function(ci,i){return(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:ci.isHeader?"9px 10px":"6px 10px",background:ci.isHeader?C.off:C.wh,borderBottom:"1px solid "+C.br}}>
                <span style={{fontSize:ci.isHeader?13:12,color:ci.isHeader?C.tx:C.t2,fontWeight:ci.isHeader?600:400}}>{ci.label}</span>
                <span style={{fontSize:ci.isHeader?13:12,color:ci.isHeader?C.tx:C.t2,fontWeight:ci.isHeader?600:400,fontFamily:"DM Mono,monospace",flexShrink:0,marginLeft:16}}>₪{ci.amount.toFixed(2)}</span>
              </div>
            );})}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",gap:16,paddingTop:10}}>
            <span style={{fontSize:12,color:C.t2}}>Total Due</span>
            <span style={{fontSize:20,fontWeight:800,color:C.er,fontFamily:"DM Mono,monospace"}}>₪{total.toFixed(2)}</span>
          </div>
        </div>
        <div style={{padding:"16px 28px 22px"}}>
          <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>In-Clinic Payment Options</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {METHS.map(function(m){
              const on=meth===m.id;
              return(
                <button key={m.id} onClick={function(){setMeth(m.id);}} style={{padding:"13px 16px",background:on?"#EFF6FF":C.wh,border:"2px solid "+(on?C.acc:C.br),borderRadius:12,display:"flex",alignItems:"center",gap:12,cursor:"pointer",transition:"all 0.12s",textAlign:"left"}}>
                  <div style={{width:38,height:38,borderRadius:8,background:on?"#DBEAFE":C.off,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontSize:17,color:on?C.acc:C.t2,fontFamily:"DM Mono,monospace",lineHeight:1}}>{m.sym}</span>
                  </div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:on?C.acc:C.tx}}>{m.label}</div>
                    <div style={{fontSize:11,color:on?C.acc:C.t3,marginTop:1}}>{m.sub}</div>
                  </div>
                </button>
              );
            })}
          </div>
          {meth==="cash"&&(
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:10,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Cash Received (₪)</label>
              <input type="number" value={cash} onChange={function(e){setCash(e.target.value);}} placeholder="0.00" style={{width:"100%",padding:"10px 14px",border:"1px solid "+(cash?C.acc:C.br),borderRadius:8,fontSize:20,fontFamily:"DM Mono,monospace",background:C.wh,color:C.tx,boxSizing:"border-box"}}/>
              {chg!==null&&(<div style={{background:"#DCFCE7",border:"1px solid #BBF7D0",borderRadius:8,padding:"10px 14px",marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:"#166534",fontWeight:600}}>Change</span><span style={{fontSize:18,fontWeight:800,color:"#166634",fontFamily:"DM Mono,monospace"}}>₪{chg.toFixed(2)}</span></div>)}
            </div>
          )}
          {(meth==="credit"||meth==="bank")&&(
            <div style={{marginBottom:14}}>
              {meth==="bank"&&(<div style={{background:C.off,borderRadius:8,padding:"10px 14px",marginBottom:10,fontSize:12,color:C.t2,fontFamily:"DM Mono,monospace",lineHeight:1.8}}><b style={{color:C.tx,display:"block",marginBottom:4}}>Bank Details</b>Bank Leumi · Branch 800<br/>Account: 12-345678 · Ref: {visit.id}</div>)}
              <label style={{display:"block",fontSize:10,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>{meth==="credit"?"Terminal Ref # (optional)":"Transfer Confirmation #"}</label>
              <input type="text" value={ref} onChange={function(e){setRef(e.target.value);}} placeholder={meth==="credit"?"e.g. 12345678":"Confirmation number"} style={{width:"100%",padding:"10px 14px",border:"1px solid "+C.br,borderRadius:8,fontSize:13,fontFamily:"DM Mono,monospace",background:C.wh,color:C.tx,boxSizing:"border-box"}}/>
            </div>
          )}
          {meth==="tap"&&(
            <div style={{background:"#EFF6FF",borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:20,color:C.acc,flexShrink:0}}>◎</span>
              <div><div style={{fontSize:13,fontWeight:600,color:C.tx}}>Use payment terminal</div><div style={{fontSize:11,color:C.t2,marginTop:2}}>Tap card or insert chip</div></div>
            </div>
          )}
          <button disabled={!canConfirm} onClick={function(){if(meth==="credit"||meth==="tap"){setProcessing(true);}else{setDone(true);}}} style={{width:"100%",padding:"13px 0",background:canConfirm?C.gn:"#CBD5E1",color:C.wh,border:"none",borderRadius:8,fontSize:14,fontWeight:700,cursor:canConfirm?"pointer":"not-allowed",marginBottom:8,transition:"background 0.15s"}}>
            {meth?"Confirm · ₪"+total.toFixed(2)+" · "+methObj.label:"Select a payment method"}
          </button>
          <button onClick={function(){setReceiptToast("Payment link sent via WhatsApp");}} style={{width:"100%",padding:"8px 0",background:"transparent",color:C.t3,border:"none",fontSize:11,cursor:"pointer",textDecoration:"underline"}}>Send payment link instead (WhatsApp / SMS)</button>
          {receiptToast&&<Toast msg={receiptToast} onHide={function(){setReceiptToast(null);}}/>}
        </div>
      </div>
    </div>
  );
}

function BillingTab({pets,staff,paidIds,onMarkPaid,visitsByPet,onInvoiceSent}){
  const [petFilter,setPetFilter]=useState("all");
  const [toast,setToast]=useState(null);
  const [wizardVisit,setWizardVisit]=useState(null);
  const [expandedBill,setExpandedBill]=useState(null);
  const [showSendInvoice,setShowSendInvoice]=useState(false);
  const [extraBills,setExtraBills]=useState([]);

  function markPaidIds(ids,paidVisits){
    onMarkPaid(function(p){return p.concat(ids);});
    var today=new Date().toISOString().slice(0,10);
    var newEntries=[];
    var pvs=paidVisits||[];
    if(pvs.length>1){
      // Combined payment — one row, multiple pets
      var totalAmt=pvs.reduce(function(s,v){return s+(v.balance||0);},0);
      var combinedPets=pvs.map(function(v){return {petIcon:v.petIcon||"\uD83D\uDC3E",petName:v.petName||""};});
      var anyInsured=pvs.some(function(v){var p=pets.find(function(p){return p.id===v.petId;})||{};return !!p.insurance;});
      var combinedItems=pvs.reduce(function(acc,v){
        acc.push({label:(v.petIcon||"")+" "+v.petName+" \u2014 "+v.type,amount:v.balance||0,isHeader:true});
        if(v.chargeItems&&v.chargeItems.length>0){v.chargeItems.forEach(function(ci){acc.push({label:"\u00a0\u00a0\u00a0\u00a0"+ci.label,amount:ci.amount,isSub:true});});}
        return acc;
      },[]);
      newEntries=[{id:"INV-"+Date.now(),date:today,desc:"Combined Payment",amount:totalAmt,paid:totalAmt,status:"paid",petId:pvs[0].petId,petName:pvs.map(function(v){return v.petName;}).join(", "),petIcon:"\uD83D\uDC3E",petInsured:anyInsured,petColor:"",isCombined:true,combinedPets:combinedPets,chargeItems:combinedItems}];
    } else if(pvs.length===1){
      // Single pet — full itemization
      var v=pvs[0];
      var pet=pets.find(function(p){return p.id===v.petId;})||{};
      newEntries=[{id:"INV-"+Date.now()+"-0",date:today,desc:v.type||"Visit",amount:v.balance||0,paid:v.balance||0,status:"paid",petId:v.petId||pet.id,petName:v.petName||"",petIcon:v.petIcon||"\uD83D\uDC3E",petInsured:!!pet.insurance,petColor:v.petColor||"",chargeItems:v.chargeItems||[]}];
    }
    if(newEntries.length)setExtraBills(function(prev){return prev.concat(newEntries);});
    setToast("Payment recorded");
  }

  const unpaidVisits=pets.reduce(function(acc,p){
    var pvs=visitsByPet&&visitsByPet[p.id]?visitsByPet[p.id]:p.visits;
    return acc.concat(pvs.filter(function(v){return v.balance&&v.balance>0&&paidIds.indexOf(v.id)<0;}).map(function(v){return Object.assign({},v,{petId:p.id,petName:p.name,petIcon:p.icon,petColor:p.color});}));
  },[]);
  const filteredUnpaid=petFilter==="all"?unpaidVisits:unpaidVisits.filter(function(v){return v.petId===petFilter;});
  const pendingTotal=filteredUnpaid.reduce(function(s,v){return s+(v.balance||0);},0);

  const allBills=pets.reduce(function(acc,p){
    return acc.concat(p.billing.map(function(b){return {id:b.id,date:b.date,desc:b.desc,amount:b.amount,paid:b.paid,status:b.status,petId:p.id,petName:p.name,petIcon:p.icon,petInsured:!!p.insurance,petColor:p.color};}));
  },[]).concat(extraBills);
  const filtered=petFilter==="all"?allBills:allBills.filter(function(b){return b.petId===petFilter;});
  const histBilled=filtered.reduce(function(s,b){return s+b.amount;},0);
  const histPaid=filtered.reduce(function(s,b){return s+b.paid;},0);
  const visitBilled=filteredUnpaid.reduce(function(s,v){return s+(v.charges||v.balance||0);},0);
  const trueBilled=histBilled+visitBilled;
  const truePaid=histPaid;
  const trueOutstanding=(histBilled-histPaid)+pendingTotal;

  const petTotals=pets.map(function(p){
    var bills=allBills.filter(function(b){return b.petId===p.id;});
    var hBilled=bills.reduce(function(s,b){return s+b.amount;},0);
    var hPaid=bills.reduce(function(s,b){return s+b.paid;},0);
    var openVisits=unpaidVisits.filter(function(v){return v.petId===p.id;});
    var visitOwe=openVisits.reduce(function(s,v){return s+(v.balance||0);},0);
    var visitCharged=openVisits.reduce(function(s,v){return s+(v.charges||v.balance||0);},0);
    return {pet:p,histBilled:hBilled,histPaid:hPaid,visitOwe:visitOwe,visitCharged:visitCharged,outstanding:(hBilled-hPaid)+visitOwe,openVisits:openVisits};
  });

  const sorted=filtered.slice().sort(function(a,b){return b.date.localeCompare(a.date);});

  return(
    <div style={{padding:"16px 20px",overflowY:"auto",height:"100%",background:"#E8EDF4"}}>
      {/* Layer 1: Pet filter pills */}
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <button onClick={function(){setPetFilter("all");}} style={{padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:600,background:petFilter==="all"?C.acc:C.off,color:petFilter==="all"?C.wh:C.t2,border:"1px solid "+(petFilter==="all"?C.acc:C.br)}}>All Pets</button>
        {petTotals.map(function(row){
          var active=petFilter===row.pet.id;
          return(
            <button key={row.pet.id} onClick={function(){setPetFilter(row.pet.id);}} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:600,background:active?C.acc:C.off,color:active?C.wh:C.t2,border:"1px solid "+(active?C.acc:C.br)}}>
              <span>{row.pet.icon}</span>
              <span>{row.pet.name}</span>
              {row.outstanding>0&&<span style={{background:C.er,color:C.wh,padding:"1px 5px",borderRadius:99,fontSize:10,fontFamily:"DM Mono,monospace"}}>₪{row.outstanding.toFixed(0)}</span>}
              {row.pet.insurance&&<span title="Pet insured" style={{cursor:"help"}}>🛡</span>}
            </button>
          );
        })}
      </div>

      {/* Stat cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
        {[
          {label:"Total Billed",val:"₪"+(petFilter==="all"?trueBilled:histBilled+filteredUnpaid.reduce(function(s,v){return s+(v.charges||v.balance||0);},0)).toFixed(0),color:C.tx},
          {label:"Paid",val:"₪"+truePaid.toFixed(0),color:C.gn},
          {label:"Outstanding",val:"₪"+trueOutstanding.toFixed(0),color:trueOutstanding>0?C.er:C.gn},
        ].map(function(item){return(
          <div key={item.label} style={{background:C.wh,border:"none",borderRadius:12,padding:"12px 14px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <div style={{fontSize:11,color:C.t3,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>{item.label}</div>
            <div style={{fontSize:20,fontWeight:700,color:item.color,fontFamily:"DM Mono,monospace"}}>{item.val}</div>
          </div>
        );})}
      </div>

      {/* Outstanding Balance + Pending Payments — unified card */}
      <div style={{background:pendingTotal>0?"#FFF5F5":C.wh,border:"1px solid "+(pendingTotal>0?"#FECACA":C.br),borderRadius:12,padding:20,marginBottom:16}}>
        {/* Balance header row */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:pendingTotal>0?16:0}}>
          <div>
            <div style={{fontSize:11,color:pendingTotal>0?C.er:C.t3,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{pendingTotal>0?"Outstanding Balance":"Balance"}</div>
            <div style={{fontSize:36,fontWeight:800,color:pendingTotal>0?C.er:C.gn,fontFamily:"Sora,sans-serif",lineHeight:1}}>₪{pendingTotal.toFixed(2)}</div>
          </div>
          {pendingTotal===0&&<div style={{fontSize:14,color:C.gn,fontWeight:600}}>All invoices paid ✓</div>}
          {pendingTotal>0&&(
            <div style={{display:"flex",gap:8,flexShrink:0}}>
              <button onClick={function(){setShowSendInvoice(true);}} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 16px",background:C.wh,color:C.acc,border:"1px solid "+C.acc,borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>📤 Send Invoice</button>
              <button onClick={function(){
                var combinedItems=filteredUnpaid.reduce(function(acc,v){
                    acc.push({label:(v.petIcon||"")+" "+v.petName+" \u2014 "+v.type,amount:v.balance||0,isHeader:true});
                    if(v.chargeItems&&v.chargeItems.length>0){v.chargeItems.forEach(function(ci){acc.push({label:"\u00a0\u00a0\u00a0\u00a0"+ci.label,amount:ci.amount,isSub:true});});}
                    return acc;
                  },[]);
                  var combined={id:"COMBINED",type:filteredUnpaid.length===1?filteredUnpaid[0].type:"Combined Payment",
                  petName:filteredUnpaid.length===1?filteredUnpaid[0].petName:"All Patients",
                  petIcon:filteredUnpaid.length===1?filteredUnpaid[0].petIcon:"🐾",
                  balance:pendingTotal,charges:pendingTotal,
                  chargeItems:combinedItems,
                  _combinedIds:filteredUnpaid.map(function(v){return v.id;})};
                setWizardVisit(combined);
              }} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 18px",background:C.sb,color:C.wh,border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>
                {"💳 Collect ₪"+pendingTotal.toFixed(0)}
              </button>
            </div>
          )}
        </div>
        {/* Pending visit rows */}
        {filteredUnpaid.length>0&&(
          <div>
            <div style={{fontSize:10,fontWeight:700,color:C.er,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Pending ({filteredUnpaid.length}) — click to see breakdown</div>
            {filteredUnpaid.map(function(v){
              var isExp=expandedBill===v.id;
              return(
                <div key={v.id} style={{background:C.wh,borderRadius:8,marginBottom:6,border:"1px solid "+(isExp?C.acc+"66":"#FECACA"),overflow:"hidden"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer"}} onClick={function(){setExpandedBill(isExp?null:v.id);}}>
                    <span style={{fontSize:18}}>{v.petIcon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:C.tx}}>{v.petName} — {v.type}</div>
                      <div style={{fontSize:11,color:C.t3,fontFamily:"DM Mono,monospace"}}>{v.id} · {fmt(v.date)}{v.vet?" · "+v.vet:""}</div>
                    </div>
                    <span style={{fontSize:11,color:C.t3,marginRight:4}}>{isExp?"▲":"▼"}</span>
                    <span style={{fontSize:15,fontWeight:700,color:C.er,fontFamily:"DM Mono,monospace"}}>₪{(v.balance||0).toFixed(0)}</span>
                  </div>
                  {isExp&&(
                    <div style={{borderTop:"1px solid "+C.br,padding:"10px 14px 12px 42px",background:"#FAFBFC"}}>
                      {v.chargeItems&&v.chargeItems.length>0?(
                        <div>
                          {v.chargeItems.map(function(ci,idx){return(
                            <div key={idx} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.t2,padding:"3px 0",borderBottom:idx<v.chargeItems.length-1?"1px dashed "+C.br:"none"}}>
                              <span>{ci.label}</span>
                              <span style={{fontFamily:"DM Mono,monospace",color:C.tx,fontWeight:600}}>₪{(ci.amount||0).toFixed(0)}</span>
                            </div>
                          );})}
                          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:700,color:C.er,marginTop:8,paddingTop:6,borderTop:"1px solid "+C.br}}>
                            <span>Total</span>
                            <span style={{fontFamily:"DM Mono,monospace"}}>₪{(v.balance||0).toFixed(0)}</span>
                          </div>
                        </div>
                      ):(
                        <div style={{fontSize:12,color:C.t3,fontStyle:"italic"}}>No itemized breakdown — ₪{(v.balance||0).toFixed(0)} total</div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Layer 3: Payment history */}
      <div style={{fontSize:11,fontWeight:700,color:C.t3,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Payment History</div>
      <div style={{background:C.wh,border:"1px solid "+C.br,borderRadius:12,overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:C.off}}>
              {["Pet","Invoice","Date","Description","Amount","Paid","Status"].map(function(h){return <th key={h} style={{padding:"9px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:C.t3,letterSpacing:"0.06em",textTransform:"uppercase",borderBottom:"1px solid "+C.br}}>{h}</th>;})}
            </tr>
          </thead>
          <tbody>
            {sorted.map(function(b,i){
              return(
                <tr key={b.id} style={{background:i%2===0?C.wh:"#FAFBFC"}}>
                  <td style={{padding:"9px 12px",borderBottom:"1px solid "+C.br}}>
                    {b.isCombined&&b.combinedPets?(
                      <span style={{display:"inline-flex",gap:4,alignItems:"center"}}>
                        {b.combinedPets.map(function(cp,ci){return(<span key={ci} style={{display:"inline-flex",alignItems:"center",gap:2,fontSize:12,color:C.t2}}><span style={{fontSize:14}}>{cp.petIcon}</span>{cp.petName}{ci<b.combinedPets.length-1&&<span style={{color:C.t3,margin:"0 2px"}}>+</span>}</span>);}) }
                      </span>
                    ):(
                      <span><span style={{fontSize:15}}>{b.petIcon}</span><span style={{fontSize:12,color:C.t2,marginLeft:5}}>{b.petName}</span></span>
                    )}
                  </td>
                  <td style={{padding:"9px 12px",fontFamily:"DM Mono,monospace",fontSize:12,color:C.t2,borderBottom:"1px solid "+C.br}}>{b.id}</td>
                  <td style={{padding:"9px 12px",fontFamily:"DM Mono,monospace",fontSize:12,color:C.t2,borderBottom:"1px solid "+C.br}}>{fmt(b.date)}</td>
                  <td style={{padding:"9px 12px",color:C.tx,borderBottom:"1px solid "+C.br}}>
                    <div style={{fontWeight:600,fontSize:13}}>{b.desc}</div>
                    {b.isCombined&&b.chargeItems&&b.chargeItems.length>0&&(

<script type="text/babel">

function VisitsTab({pet,triggerNew,staff,initialVisits,paidIds,onVisitSaved,onNvpChange,nvpPreload}){
  const [visits,setVisits]=useState(initialVisits||pet.visits);
  const [expanded,setExpanded]=useState(null);
  const [search,setSearch]=useState("");

  const [nvpDirty,setNvpDirty]=useState(false);
  const [vetFilter,setVetFilter]=useState("all");
  const [showNew,setShowNew]=useState(false);
  useEffect(function(){if(onNvpChange)onNvpChange(showNew,nvpDirty);},[showNew,nvpDirty]);
  const _trigRef=useRef(triggerNew);
  useEffect(function(){
    if(triggerNew===_trigRef.current)return;
    _trigRef.current=triggerNew;
    if(triggerNew>0)setShowNew(true);
  },[triggerNew]);
  useEffect(function(){
    var updated=initialVisits||pet.visits;
    setVisits(updated);
    setEditingVisit(function(ev){
      if(!ev)return ev;
      var fresh=updated.find(function(v){return v.id===ev.id;});
      return fresh||ev;
    });
  },[initialVisits]);
  const [toast,setToast]=useState(null);
  const [hoveredId,setHoveredId]=useState(null);
  const [editingVisit,setEditingVisit]=useState(null);

    if(typeFilter==="Procedure / Dental"){r=r.filter(function(v){return v.type==="Procedure"||v.type==="Dental";});}

    if(vetFilter!=="all")r=r.filter(function(v){return v.vet===vetFilter;});

      return [v,...prev];
    });

            />

        <div style={{display:"flex",alignItems:"center",gap:8}}>

            </div>
            {multiVet&&(
              <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                <button onClick={function(){setVetFilter("all");}} style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:vetFilter==="all"?C.cy:C.off,color:vetFilter==="all"?C.wh:C.t2,border:"1px solid "+(vetFilter==="all"?C.cy:C.br),fontFamily:"Outfit,sans-serif",cursor:"pointer"}}>All Vets</button>
                {allVets.map(function(v){const active=vetFilter===v;return(<button key={v} onClick={function(){setVetFilter(v);}} style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:active?C.cy:C.off,color:active?C.wh:C.t2,border:"1px solid "+(active?C.cy:C.br),fontFamily:"Outfit,sans-serif",cursor:"pointer"}}>{v.replace("Dr. ","")}</button>);})}
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"6px 20px 20px"}}>
        <StaffNotesPanel pet={pet} staff={staff}/>
        {!filtered.length&&(
          !visits.length

            :<EmptyState icon="🔍" title="No visits match this filter" sub="Try adjusting your search or filters." action="Clear All" onAction={clearAll}/>
        )}
        {filtered.map(function(v){
          const open=expanded===v.id;
          const paid=!!(paidIds&&paidIds.indexOf(v.id)>=0);

          const inProg=v.status==="in_progress"&&!paid;
          const completedUnpaid=v.status==="completed"&&!paid&&v.balance>0;
          return(
            <div key={v.id} className="vc-card" onMouseEnter={function(){setHoveredId(v.id);}} onMouseLeave={function(){setHoveredId(null);}} style={{background:C.wh,borderRadius:16,marginBottom:10,overflow:"hidden",borderLeft:"3px solid "+(open?C.acc:inProg?"#D97706":completedUnpaid?"#FBBF24":"#BFDBFE"),boxShadow:inProg?"0 0 0 1px rgba(217,119,6,0.1),0 6px 20px rgba(217,119,6,0.08),0 1px 4px rgba(0,0,0,0.04)":open?"0 0 0 2px "+C.acc+",0 6px 20px rgba(37,99,168,0.1)":hoveredId===v.id?"0 8px 24px rgba(0,0,0,0.1),0 1px 4px rgba(0,0,0,0.05)":"0 1px 4px rgba(0,0,0,0.06)",transform:(!open&&hoveredId===v.id)?"translateY(-2px)":"translateY(0)"}}>

                    {v.tests&&v.tests.length>0&&<span title={v.tests.join(", ")} style={{fontSize:10,fontWeight:600,color:C.t3,background:C.off,border:"1px solid "+C.br,borderRadius:4,padding:"1px 5px",cursor:"default",fontFamily:"Outfit,sans-serif"}}>Lab</span>}
                    {(v.vaxGiven&&v.vaxGiven.length>0||(v.type==="Vaccination"&&(!v.vaxGiven||!v.vaxGiven.length)))&&<span title={v.vaxGiven&&v.vaxGiven.length>0?"Vaccines given: "+v.vaxGiven.join(", "):"Vaccination visit"} style={{fontSize:10,fontWeight:600,color:C.gn,background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:4,padding:"1px 5px",cursor:"default",fontFamily:"Outfit,sans-serif"}}>💉 Vax</span>}

                    </div>

                    <div style={{marginBottom:10}}>

                      {v.meds.map(function(m,i){return(
                        <div key={i} style={{fontSize:12,color:C.tx,background:C.off,padding:"5px 10px",borderRadius:8,border:"1px solid "+C.br,marginBottom:4,fontFamily:"Outfit,sans-serif"}}>

                        </div>
                      );})}

                      </div>

                    </div>
                  )}
                  {v.chargeItems&&v.chargeItems.length>0&&(
                    <div style={{marginBottom:12}}>

                      <table style={{width:"100%",borderCollapse:"collapse",borderRadius:8,overflow:"hidden",border:"1px solid "+C.br}}>
                        <tbody>
                          {v.chargeItems.map(function(c,i){return(<tr key={c.label} style={{background:i%2===0?C.wh:C.off}}><td style={{padding:"6px 10px",fontSize:13,color:C.t2,fontFamily:"Outfit,sans-serif",borderBottom:"1px solid "+C.br}}>{c.label}</td><td style={{padding:"6px 10px",fontSize:13,fontFamily:"DM Mono,monospace",color:C.tx,textAlign:"right",borderBottom:"1px solid "+C.br}}>₪{c.amount.toFixed(2)}</td></tr>);})}
                          <tr style={{background:C.off,borderTop:"2px solid "+C.br}}>
                            <td style={{padding:"8px 10px",fontSize:13,fontWeight:700,color:C.tx,fontFamily:"Outfit,sans-serif"}}>Total</td>
                            <td style={{padding:"8px 10px",fontSize:14,fontWeight:700,fontFamily:"DM Mono,monospace",color:C.tx,textAlign:"right"}}>₪{v.charges.toFixed(2)}</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  )}
                  <div style={{marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,fontFamily:"DM Mono,monospace",color:C.t3}}>{v.id}</span>
                    <div style={{display:"flex",gap:6}}>
                      {inProg&&<button onClick={function(e){e.stopPropagation();openEdit(v);}} style={{padding:"6px 14px",background:C.am,color:C.wh,border:"none",borderRadius:8,fontSize:12,fontWeight:700,fontFamily:"Outfit,sans-serif",cursor:"pointer"}}>▶ Continue Visit</button>}
                      {done&&<button onClick={function(e){e.stopPropagation();openEdit(v);}} style={{padding:"6px 14px",background:C.off,color:C.t2,border:"1px solid "+C.br,borderRadius:8,fontSize:12,fontWeight:600,fontFamily:"Outfit,sans-serif",cursor:"pointer"}}>✏️ View / Edit</button>}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {(showNew||editingVisit)&&<NewVisitPanel pet={pet} onClose={function(){setShowNew(false);setEditingVisit(null);setNvpDirty(false);}} onSave={handleSave} initialData={editingVisit||(showNew?nvpPreload:null)} editingId={editingVisit?editingVisit.id:null} onDirtyChange={function(d){setNvpDirty(d);}}/>}
    
      {toast&&<Toast msg={toast} onHide={function(){setToast(null);}}/>}</div>
  );
}
